name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross

      - name: Configure linker for aarch64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        env:
          OPENSSL_STATIC: "1"
          OPENSSL_DIR: "/usr"
          PKG_CONFIG_ALLOW_CROSS: "1"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --all-features --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          BINARY="evnx"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BINARY="evnx.exe"
          fi
          cp target/${{ matrix.target }}/release/$BINARY dist/evnx-${{ matrix.target }}${BINARY##evnx}
          cd dist

          # Create tar.gz for all targets
          tar -czf evnx-${{ matrix.target }}.tar.gz evnx-${{ matrix.target }}${BINARY##evnx}
          sha256sum evnx-${{ matrix.target }}.tar.gz > evnx-${{ matrix.target }}.tar.gz.sha256

          # Create ZIP for Windows (required by Scoop and Winget)
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            if command -v powershell &> /dev/null; then
              powershell -Command "Compress-Archive -Path 'evnx-${{ matrix.target }}${BINARY##evnx}' -DestinationPath 'evnx-${{ matrix.target }}.zip' -Force"
            else
              zip -q evnx-${{ matrix.target }}.zip evnx-${{ matrix.target }}${BINARY##evnx} 2>/dev/null || echo "ZIP creation skipped"
            fi
            sha256sum evnx-${{ matrix.target }}.zip > evnx-${{ matrix.target }}.zip.sha256 2>/dev/null || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evnx-${{ matrix.target }}
          path: dist/*
          retention-days: 5

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir release-assets
          find artifacts -name "*.tar.gz*" -exec cp {} release-assets/ \;
          find artifacts -name "*.zip*"    -exec cp {} release-assets/ \;
          echo "Release assets:"
          ls -lh release-assets/

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          cat > release_notes.md << EOF
          # evnx v${{ steps.version.outputs.VERSION }}

          ## Installation

          ### Linux / macOS (shell script)
          \`\`\`bash
          curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash
          \`\`\`

          ### Homebrew (macOS and Linux)
          \`\`\`bash
          brew install urwithajit9/evnx/evnx
          \`\`\`

          ### Scoop (Windows, user-local)
          \`\`\`powershell
          scoop bucket add evnx https://github.com/urwithajit9/scoop-evnx
          scoop install evnx
          \`\`\`

          ### Winget (Windows, system-wide)
          \`\`\`powershell
          winget install urwithajit9.evnx
          \`\`\`

          ### npm / Node.js
          \`\`\`bash
          npm install -g @evnx/cli
          \`\`\`

          ### Python (pipx)
          \`\`\`bash
          pipx install evnx
          \`\`\`

          ### Cargo
          \`\`\`bash
          cargo install evnx
          \`\`\`

          ## Checksums

          SHA256 checksums are provided for each binary. Verify after download:
          \`\`\`bash
          sha256sum -c evnx-*.tar.gz.sha256
          \`\`\`
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: release_notes.md
          draft: false
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Update Homebrew tap ────────────────────────────────────────────────────
  update-homebrew-tap:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Fetch SHA256 values from release assets
        id: sha256
        run: |
          BASE="https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}"

          SHA_AARCH64_DARWIN=$(curl -fsSL "${BASE}/evnx-aarch64-apple-darwin.tar.gz.sha256" | awk '{print $1}')
          SHA_X86_64_DARWIN=$(curl -fsSL "${BASE}/evnx-x86_64-apple-darwin.tar.gz.sha256" | awk '{print $1}')
          SHA_AARCH64_LINUX=$(curl -fsSL "${BASE}/evnx-aarch64-unknown-linux-gnu.tar.gz.sha256" | awk '{print $1}')
          SHA_X86_64_LINUX=$(curl -fsSL "${BASE}/evnx-x86_64-unknown-linux-musl.tar.gz.sha256" | awk '{print $1}')

          echo "aarch64_darwin=$SHA_AARCH64_DARWIN" >> $GITHUB_OUTPUT
          echo "x86_64_darwin=$SHA_X86_64_DARWIN" >> $GITHUB_OUTPUT
          echo "aarch64_linux=$SHA_AARCH64_LINUX" >> $GITHUB_OUTPUT
          echo "x86_64_linux=$SHA_X86_64_LINUX" >> $GITHUB_OUTPUT

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: urwithajit9/homebrew-evnx
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-evnx

      - name: Update Formula
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p homebrew-evnx/Formula

          cat > homebrew-evnx/Formula/evnx.rb << EOF
          class Evnx < Formula
            desc "CLI tool for managing .env files — validation, secret scanning, format conversion"
            homepage "https://www.evnx.dev"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/urwithajit9/evnx/releases/download/v#{version}/evnx-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha256.outputs.aarch64_darwin }}"
              end
              on_intel do
                url "https://github.com/urwithajit9/evnx/releases/download/v#{version}/evnx-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha256.outputs.x86_64_darwin }}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/urwithajit9/evnx/releases/download/v#{version}/evnx-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.sha256.outputs.aarch64_linux }}"
              end
              on_intel do
                url "https://github.com/urwithajit9/evnx/releases/download/v#{version}/evnx-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${{ steps.sha256.outputs.x86_64_linux }}"
              end
            end

            def install
              on_macos do
                on_arm   { bin.install "evnx-aarch64-apple-darwin" => "evnx" }
                on_intel { bin.install "evnx-x86_64-apple-darwin"  => "evnx" }
              end
              on_linux do
                on_arm   { bin.install "evnx-aarch64-unknown-linux-gnu"  => "evnx" }
                on_intel { bin.install "evnx-x86_64-unknown-linux-musl"  => "evnx" }
              end
            end

            def caveats
              <<~EOS
                Run 'evnx --help' to get started.
                Documentation: https://www.evnx.dev/guides
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/evnx --version")
            end
          end
          EOF

      - name: Commit and push Formula update
        run: |
          cd homebrew-evnx
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/evnx.rb
          git diff --staged --quiet || git commit -m "chore: update evnx to v${{ steps.version.outputs.VERSION }}"
          git push

  # ── Update Scoop bucket ────────────────────────────────────────────────────
  # This job is intentionally part of release.yml rather than a separate
  # scoop-update.yml workflow. A GitHub Release created by GITHUB_TOKEN inside
  # a workflow does not fire the `release: published` event for other workflows,
  # so a standalone scoop-update.yml triggered by that event would never run.
  update-scoop-bucket:
    name: Update Scoop bucket
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Fetch ZIP SHA256 from release assets
        id: sha256
        run: |
          BASE="https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}"
          SHA=$(curl -fsSL "${BASE}/evnx-x86_64-pc-windows-msvc.zip.sha256" | awk '{print $1}')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Checkout Scoop bucket
        uses: actions/checkout@v4
        with:
          repository: urwithajit9/scoop-evnx
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          path: scoop-bucket

      - name: Update manifest
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA="${{ steps.sha256.outputs.sha }}"
          mkdir -p scoop-bucket/bucket

          # The architecture.url uses ${VERSION} — the actual version number
          # substituted by this shell step (e.g. "0.3.6").
          # The autoupdate.url uses \$version — a literal "$version" string
          # written into the JSON file so Scoop can use it as its own template
          # variable for future auto-updates via `scoop update`.
          cat > scoop-bucket/bucket/evnx.json << EOF
          {
            "version": "${VERSION}",
            "description": "CLI tool for managing .env files — validation, secret scanning, format conversion",
            "homepage": "https://www.evnx.dev",
            "license": "MIT",
            "notes": "Run 'evnx --help' to get started. Docs: https://www.evnx.dev/guides",
            "architecture": {
              "64bit": {
                "url": "https://github.com/urwithajit9/evnx/releases/download/v${VERSION}/evnx-x86_64-pc-windows-msvc.zip",
                "hash": "sha256:${SHA}",
                "bin": [["evnx-x86_64-pc-windows-msvc.exe", "evnx"]]
              }
            },
            "checkver": { "github": "https://github.com/urwithajit9/evnx" },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/urwithajit9/evnx/releases/download/v\$version/evnx-x86_64-pc-windows-msvc.zip",
                  "hash": { "url": "\$url.sha256", "find": "^([a-f0-9]+)\\s" }
                }
              }
            }
          }
          EOF

      - name: Commit and push
        run: |
          cd scoop-bucket
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/evnx.json
          git diff --staged --quiet || git commit -m "chore: update evnx to v${{ steps.version.outputs.VERSION }}"
          git push

  # ── Publish to Winget ──────────────────────────────────────────────────────
  # Same reasoning as update-scoop-bucket: runs here rather than in a separate
  # winget-publish.yml to avoid the GITHUB_TOKEN cascade trigger limitation.
  publish-winget:
    name: Publish to Winget
    needs: release
    runs-on: windows-latest
    steps:
      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download wingetcreate
        run: Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" -OutFile "wingetcreate.exe"

      - name: Submit to winget-pkgs
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.WINGETCREATE_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $installerUrl = "https://github.com/urwithajit9/evnx/releases/download/v$version/evnx-x86_64-pc-windows-msvc.zip"

          # FIRST SUBMISSION: creates the package entry in winget-pkgs for the
          # first time. After the first PR is merged by the winget-pkgs team,
          # replace this block with the "update" command in the comment below.
          # .\wingetcreate.exe new $installerUrl `
          #   --version $version `
          #   --publisher "Ajit Kumar" `
          #   --license "MIT" `
          #   --package-name "evnx" `
          #   --short-description "CLI tool for managing .env files — validation, secret scanning, format conversion" `
          #   --submit `
          #   --token $env:GITHUB_TOKEN

          # SUBSEQUENT RELEASES: comment out the block above and uncomment below.
          .\wingetcreate.exe update urwithajit9.evnx `
            --version $version `
            --urls $installerUrl `
            --submit `
            --token $env:GITHUB_TOKEN