name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross

      - name: Configure linker for aarch64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        env:
          # If any transitive dep still pulls openssl, vendor it
          # (no-op if you've switched to rustls)
          OPENSSL_STATIC: "1"
          OPENSSL_DIR: "/usr"
          PKG_CONFIG_ALLOW_CROSS: "1"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --all-features --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          BINARY="evnx"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BINARY="evnx.exe"
          fi
          cp target/${{ matrix.target }}/release/$BINARY dist/evnx-${{ matrix.target }}${BINARY##evnx}
          cd dist
          tar -czf evnx-${{ matrix.target }}.tar.gz evnx-${{ matrix.target }}${BINARY##evnx}
          sha256sum evnx-${{ matrix.target }}.tar.gz > evnx-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evnx-${{ matrix.target }}
          path: dist/*
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir release-assets
          find artifacts -name "*.tar.gz*" -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          cat > release_notes.md << EOF
          # evnx v${{ steps.version.outputs.VERSION }}

          ## Installation

          ### Linux / macOS (shell script)
          \`\`\`bash
          curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash
          \`\`\`

          ### npm / Node.js
          \`\`\`bash
          npm install -g @evnx/cli
          npx @evnx/cli --version
          \`\`\`

          ### Python (pipx — recommended for CLI tools)
          \`\`\`bash
          pipx install evnx
          \`\`\`

          ### Cargo
          \`\`\`bash
          cargo install evnx
          \`\`\`

          ## Checksums

          SHA256 checksums are provided for each binary. Verify after download:
          \`\`\`bash
          sha256sum -c evnx-*.tar.gz.sha256
          \`\`\`
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: release_notes.md
          draft: false
          generate_release_notes: true      
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}