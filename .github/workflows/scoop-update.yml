name: Update Scoop Bucket

on:
  release:
    types: [published]

jobs:
  update-scoop:
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Fetch SHA256
        id: sha256
        run: |
          BASE="https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}"
          SHA=$(curl -fsSL "${BASE}/evnx-x86_64-pc-windows-msvc.tar.gz.sha256" | awk '{print $1}')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Checkout Scoop bucket
        uses: actions/checkout@v4
        with:
          repository: urwithajit9/scoop-evnx
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          path: scoop-bucket

      - name: Update manifest
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA="${{ steps.sha256.outputs.sha }}"

          cat > scoop-bucket/bucket/evnx.json << EOF
          {
            "version": "$VERSION",
            "description": "CLI tool for managing .env files — validation, secret scanning, format conversion",
            "homepage": "https://www.evnx.dev",
            "license": "MIT",
            "notes": "Run 'evnx --help' to get started. Docs: https://www.evnx.dev/guides",
            "architecture": {
              "64bit": {
                "url": "https://github.com/urwithajit9/evnx/releases/download/v\$version/evnx-x86_64-pc-windows-msvc.tar.gz",
                "hash": "sha256:$SHA",
                "bin": [["evnx.exe", "evnx"]]
              }
            },
            "checkver": { "github": "https://github.com/urwithajit9/evnx" },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/urwithajit9/evnx/releases/download/v\$version/evnx-x86_64-pc-windows-msvc.tar.gz",
                  "hash": { "url": "\$url.sha256", "find": "^([a-f0-9]+)\\s" }
                }
              }
            }
          }
          EOF

      - name: Commit and push
        run: |
          cd scoop-bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/evnx.json
          git diff --staged --quiet || git commit -m "chore: update evnx to v${VERSION}"
          git push