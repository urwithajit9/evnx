# .github/workflows/winget-publish.yml
name: Publish to Winget

on:
  release:
    types: [published]

jobs:
  winget-submit:
    runs-on: windows-latest
    steps:
      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download wingetcreate
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" -OutFile "wingetcreate.exe"

      - name: Submit to winget-pkgs (Create or Update)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.WINGETCREATE_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $installerUrl = "https://github.com/urwithajit9/evnx/releases/download/v$version/evnx-x86_64-pc-windows-msvc.zip"

          # First time: use "new", subsequent: use "update"
          # For first submission, uncomment the "new" command and comment "update"

          # 🔹 FIRST SUBMISSION ONLY (uncomment this block):
          .\wingetcreate.exe new $installerUrl `
            --version $version `
            --publisher "Ajit Kumar" `
            --license "MIT" `
            --package-name "evnx" `
            --short-description "CLI tool for managing .env files — validation, secret scanning, format conversion" `
            --submit `
            --token $env:GITHUB_TOKEN

          # # 🔹 SUBSEQUENT UPDATES (use this after first PR is merged):
          # .\wingetcreate.exe update urwithajit9.evnx `
          #   --version $version `
          #   --urls $installerUrl `
          #   --submit `
          #   --token $env:GITHUB_TOKEN