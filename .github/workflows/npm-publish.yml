name: Publish to npm

# Triggers automatically after release.yml completes on a v* tag push.
# Can also be triggered manually via workflow_dispatch to recover from failures
# without cutting a new release tag.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'release.yml run ID (the number in the Actions URL for that run)'
        required: true
      version:
        description: 'Version to publish without v prefix (e.g. 0.3.0)'
        required: true

permissions:
  contents: read
  id-token: write  # Required for npm provenance attestation

jobs:
  check:
    name: Check upstream success
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      version: ${{ steps.check.outputs.version }}
      run_id: ${{ steps.check.outputs.run_id }}
    steps:
      - name: Resolve trigger source
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Triggered manually"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "run_id=${{ github.event.inputs.run_id }}" >> $GITHUB_OUTPUT
            echo "Will publish version: ${{ github.event.inputs.version }} from run: ${{ github.event.inputs.run_id }}"
          else
            CONCLUSION="${{ github.event.workflow_run.conclusion }}"
            HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
            RUN_ID="${{ github.event.workflow_run.id }}"

            echo "Upstream conclusion: $CONCLUSION"
            echo "Head branch/tag: $HEAD_BRANCH"
            echo "Run ID: $RUN_ID"

            if [[ "$CONCLUSION" == "success" && "$HEAD_BRANCH" =~ ^v[0-9] ]]; then
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "version=${HEAD_BRANCH#v}" >> $GITHUB_OUTPUT
              echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
              echo "Will publish version: ${HEAD_BRANCH#v}"
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "Skipping npm publish (conclusion=$CONCLUSION, ref=$HEAD_BRANCH)"
            fi
          fi

  publish:
    name: Publish to npm
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    env:
      VERSION: ${{ needs.check.outputs.version }}
      RELEASE_RUN_ID: ${{ needs.check.outputs.run_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # ── Download artifacts from the release.yml run ─────────────────────────
      # Uses RELEASE_RUN_ID so both automatic and manual triggers point to the
      # correct release run regardless of how this workflow was invoked.
      - name: Download all release artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          run_id: ${{ env.RELEASE_RUN_ID }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          path: downloaded-artifacts/

      - name: Show downloaded artifacts
        run: find downloaded-artifacts/ -type f | sort

      # ── Extract binaries from tarballs ─────────────────────────────────────
      - name: Extract binaries
        run: |
          mkdir -p extracted/

          declare -A ARTIFACT_MAP=(
            ["evnx-x86_64-unknown-linux-musl"]="evnx-linux-x64"
            ["evnx-aarch64-unknown-linux-gnu"]="evnx-linux-arm64"
            ["evnx-x86_64-apple-darwin"]="evnx-darwin-x64"
            ["evnx-aarch64-apple-darwin"]="evnx-darwin-arm64"
            ["evnx-x86_64-pc-windows-msvc"]="evnx-win32-x64"
          )

          for artifact_folder in "${!ARTIFACT_MAP[@]}"; do
            npm_name="${ARTIFACT_MAP[$artifact_folder]}"
            tarball="downloaded-artifacts/${artifact_folder}/${artifact_folder}.tar.gz"

            if [[ ! -f "$tarball" ]]; then
              echo "ERROR: Expected tarball not found: $tarball"
              echo "Contents of downloaded-artifacts/${artifact_folder}/:"
              ls -la "downloaded-artifacts/${artifact_folder}/" || true
              exit 1
            fi

            echo "Extracting $tarball → extracted/$npm_name"
            mkdir -p "extracted/$npm_name"
            tar -xzf "$tarball" -C "extracted/$npm_name/"

            echo "Extracted contents of extracted/$npm_name/:"
            ls -la "extracted/$npm_name/"

            if [[ "$npm_name" == *"win32"* ]]; then
              # Use find — robust regardless of what the binary is named inside the tarball
              EXE_FILE=$(find "extracted/$npm_name/" -maxdepth 1 -name "*.exe" | head -1)
              if [[ -z "$EXE_FILE" ]]; then
                echo "ERROR: No .exe found in extracted/$npm_name/ after extraction"
                exit 1
              fi
              echo "Found Windows binary: $EXE_FILE"
              mv "$EXE_FILE" "extracted/$npm_name/evnx.exe"
            else
              # Prefer exact artifact name, fall back to first non-dotfile
              BIN_FILE="extracted/$npm_name/${artifact_folder}"
              if [[ ! -f "$BIN_FILE" ]]; then
                BIN_FILE=$(find "extracted/$npm_name/" -maxdepth 1 -type f ! -name ".*" | head -1)
              fi
              if [[ -z "$BIN_FILE" ]]; then
                echo "ERROR: No binary found in extracted/$npm_name/ after extraction"
                exit 1
              fi
              echo "Found binary: $BIN_FILE"
              mv "$BIN_FILE" "extracted/$npm_name/evnx"
              chmod +x "extracted/$npm_name/evnx"
            fi
          done

          echo "All extracted binaries:"
          find extracted/ -type f | sort

      # ── Build platform package directory structure ─────────────────────────
      - name: Create platform package structures
        run: |
          PLATFORMS=(
            "evnx-linux-x64:linux:x64:evnx"
            "evnx-linux-arm64:linux:arm64:evnx"
            "evnx-darwin-x64:darwin:x64:evnx"
            "evnx-darwin-arm64:darwin:arm64:evnx"
            "evnx-win32-x64:win32:x64:evnx.exe"
          )

          for entry in "${PLATFORMS[@]}"; do
            IFS=':' read -r pkg_name os cpu binary <<< "$entry"
            pkg_dir="npm-publish/packages/$pkg_name"

            mkdir -p "$pkg_dir/bin"

            cp "extracted/$pkg_name/$binary" "$pkg_dir/bin/$binary"
            chmod +x "$pkg_dir/bin/$binary" || true

            cat > "$pkg_dir/package.json" << EOF
          {
            "name": "@evnx/$pkg_name",
            "version": "$VERSION",
            "description": "evnx CLI binary for $os/$cpu",
            "os": ["$os"],
            "cpu": ["$cpu"],
            "bin": {
              "evnx": "bin/$binary"
            },
            "files": ["bin/$binary", "README.md"],
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "https://github.com/urwithajit9/evnx.git"
            }
          }
          EOF

            echo "Created $pkg_dir"
          done

      # ── Create the main wrapper package ────────────────────────────────────
      - name: Create wrapper package
        run: |
          mkdir -p npm-publish/evnx/bin

          cat > npm-publish/evnx/install.js << 'INSTALLEOF'
          #!/usr/bin/env node
          "use strict";

          const fs   = require("fs");
          const path = require("path");

          const PLATFORM_PACKAGES = {
            "linux-x64":    "@evnx/evnx-linux-x64",
            "linux-arm64":  "@evnx/evnx-linux-arm64",
            "darwin-x64":   "@evnx/evnx-darwin-x64",
            "darwin-arm64": "@evnx/evnx-darwin-arm64",
            "win32-x64":    "@evnx/evnx-win32-x64",
          };

          function getBinaryPath() {
            const key = `${process.platform}-${process.arch}`;
            const pkg = PLATFORM_PACKAGES[key];

            if (!pkg) {
              throw new Error(
                `evnx: Unsupported platform: ${process.platform}/${process.arch}\n` +
                `Supported: ${Object.keys(PLATFORM_PACKAGES).join(", ")}\n` +
                `Install manually: https://github.com/urwithajit9/evnx/releases`
              );
            }

            let pkgJsonPath;
            try {
              pkgJsonPath = require.resolve(`${pkg}/package.json`);
            } catch (e) {
              throw new Error(
                `evnx: Binary package ${pkg} not installed.\n` +
                `This usually means your platform wasn't detected correctly at install time.\n` +
                `Try: npm install ${pkg}\n` +
                `Or install manually: https://github.com/urwithajit9/evnx/releases`
              );
            }

            const pkgDir  = path.dirname(pkgJsonPath);
            const binName = process.platform === "win32" ? "evnx.exe" : "evnx";
            const binPath = path.join(pkgDir, "bin", binName);

            if (!fs.existsSync(binPath)) {
              throw new Error(`evnx: Binary not found at expected path: ${binPath}`);
            }

            return binPath;
          }

          try {
            const binaryPath = getBinaryPath();
            const binDir     = path.join(__dirname, "bin");
            fs.mkdirSync(binDir, { recursive: true });

            if (process.platform === "win32") {
              const shim = `@echo off\r\n"${binaryPath}" %*\r\n`;
              fs.writeFileSync(path.join(binDir, "evnx.cmd"), shim);
            } else {
              const shim     = `#!/bin/sh\nexec "${binaryPath}" "$@"\n`;
              const shimPath = path.join(binDir, "evnx");
              fs.writeFileSync(shimPath, shim);
              fs.chmodSync(shimPath, 0o755);
            }

            console.log(`evnx installed for ${process.platform}/${process.arch}`);
          } catch (err) {
            process.stderr.write(`\nWARNING: ${err.message}\n\n`);
            process.exit(0);
          }
          INSTALLEOF

          cat > npm-publish/evnx/package.json << EOF
          {
            "name": "@evnx/cli",
            "version": "$VERSION",
            "description": "CLI tool for managing .env files — validation, secret scanning, format conversion",
            "keywords": ["dotenv", "env", "secrets", "cli", "security", "devtools", "environment"],
            "author": "Ajit Kumar <support@evnx.dev>",
            "license": "MIT",
            "homepage": "https://www.evnx.dev",
            "repository": {
              "type": "git",
              "url": "https://github.com/urwithajit9/evnx.git"
            },
            "bugs": {
              "url": "https://github.com/urwithajit9/evnx/issues"
            },
            "bin": {
              "evnx": "bin/evnx"
            },
            "scripts": {
              "postinstall": "node install.js"
            },
            "optionalDependencies": {
              "@evnx/evnx-linux-x64":    "$VERSION",
              "@evnx/evnx-linux-arm64":  "$VERSION",
              "@evnx/evnx-darwin-x64":   "$VERSION",
              "@evnx/evnx-darwin-arm64": "$VERSION",
              "@evnx/evnx-win32-x64":    "$VERSION"
            },
            "engines": {
              "node": ">=14"
            },
            "files": [
              "bin/",
              "install.js",
              "README.md"
            ]
          }
          EOF

          # Placeholder bin/evnx — install.js replaces this at postinstall time
          printf '#!/bin/sh\necho "evnx: run npm install to complete setup" >&2\nexit 1\n' \
            > npm-publish/evnx/bin/evnx
          chmod +x npm-publish/evnx/bin/evnx

          echo "Wrapper package ready:"
          find npm-publish/evnx -type f | sort

      # ── Inject READMEs — runs AFTER package dirs are created above ──────────
      - name: Inject README files into npm packages
        run: |
          cp README.md npm-publish/evnx/README.md

          for pkg_dir in npm-publish/packages/*/; do
            pkg_name=$(basename "$pkg_dir")
            cat > "${pkg_dir}README.md" << EOF
          # @evnx/${pkg_name}

          This is an internal platform-specific binary package for the evnx CLI.

          **Do not install this directly.** Install the main package instead:

          \`\`\`bash
          npm install -g @evnx/cli
          \`\`\`

          See https://www.evnx.dev for documentation.
          EOF
          done

          echo "READMEs injected:"
          find npm-publish/ -name "README.md" | sort

      # ── Dry run validation ──────────────────────────────────────────────────
      - name: Validate all packages (dry run)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "=== Platform packages ==="
          for pkg_dir in npm-publish/packages/*/; do
            echo "--- $pkg_dir ---"
            cat "$pkg_dir/package.json"
            (cd "$pkg_dir" && npm publish --dry-run --access public)
            echo "✓ dry run passed"
          done

          echo "=== Wrapper package ==="
          cat npm-publish/evnx/package.json
          (cd npm-publish/evnx && npm publish --dry-run --access public)
          echo "✓ dry run passed"

      # ── Publish platform packages first ────────────────────────────────────
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg_dir in npm-publish/packages/*/; do
            pkg_name=$(node -p "require('./${pkg_dir}package.json').name")
            echo "Publishing $pkg_name..."
            (cd "$pkg_dir" && npm publish --access public --provenance) || \
            echo "⚠ $pkg_name already published, skipping"
          done

      - name: Wait for registry replication
        run: sleep 15

      - name: Publish wrapper package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          (cd npm-publish/evnx && npm publish --access public --provenance)
          echo "✓ Published @evnx/cli@$VERSION"

      # ── Smoke test ──────────────────────────────────────────────────────────
      - name: Smoke test installation
        run: |
          npm install -g @evnx/cli@$VERSION
          evnx --version
          echo "✓ Smoke test passed"

      # ── Append npm note to the GitHub Release ──────────────────────────────
      - name: Add npm install note to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$VERSION"
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/$TAG --jq '.id')

          if [[ -n "$RELEASE_ID" ]]; then
            EXISTING_BODY=$(gh api repos/${{ github.repository }}/releases/$RELEASE_ID --jq '.body')

            NPM_NOTE="

          ### npm / Node.js
          \`\`\`bash
          npm install -g @evnx/cli          # global install
          npx @evnx/cli --version           # zero-install usage
          npm install --save-dev @evnx/cli  # project dev dependency
          \`\`\`
          "

            gh api --method PATCH \
              repos/${{ github.repository }}/releases/$RELEASE_ID \
              --field "body=${EXISTING_BODY}${NPM_NOTE}"

            echo "✓ Updated release notes"
          fi