:fs;\n\nuse crate::core::Parser;\n\npub fn run(direction: String, placeholder: bool, verbose: bool) -\u003e Result\u003c()\u003e {\n    if verbose {\n        println!(\"{}\", \"Running sync in verbose mode\".dimmed());\n    }\n\n    println!(\n        \"\\n{}\",\n        \"┌─ Sync .env ↔ .env.example ──────────────────────────┐\".cyan()\n    );\n    println!(\n        \"{}\\n\",\n        \"└──────────────────────────────────────────────────────┘\".cyan()\n    );\n\n    match direction.as_str() {\n        \"forward\" =\u003e sync_forward(placeholder, verbose),\n        \"reverse\" =\u003e sync_reverse(placeholder, verbose),\n        _ =\u003e {\n            eprintln!(\"{} Invalid direction: {}\", \"✗\".red(), direction);\n            eprintln!(\"Valid directions: forward, reverse\");\n            std::process::exit(1);\n        }\n    }\n}\n\n/// Sync .env → .env.example (add new vars to example)\nfn sync_forward(use_placeholders: bool, _verbose: bool) -\u003e Result\u003c()\u003e {\n    // Parse both files\n    let parser = Parser::default();\n\n    let env_file = parser.parse_file(\".env\").context(\"Failed to parse .env\")?;\n\n    let example_file = match parser.parse_file(\".env.example\") {\n        Ok(f) =\u003e f,\n        Err(_) =\u003e {\n            println!(\"{} .env.example not found, creating from .env\", \"ℹ️\".cyan());\n\n            if use_placeholders {\n                convert_to_example(\u0026env_file.vars)?;\n            } else {\n                fs::copy(\".env\", \".env.example\")?;\n            }\n\n            println!(\"{} Created .env.example\", \"✓\".green());\n            return Ok(());\n        }\n    };\n\n    // Find variables in .env but not in .env.example\n    let env_keys: HashSet\u003c_\u003e = env_file.vars.keys().collect();\n    let example_keys: HashSet\u003c_\u003e = example_file.vars.keys().collect();\n\n    let missing: Vec\u003c_\u003e = env_keys.difference(\u0026example_keys).cloned().collect();\n\n    if missing.is_empty() {\n        println!(\"{} .env.example is up to date\", \"✓\".green());\n        return Ok(());\n    }\n\n    println!(\n        \"{}\",\n        \"Found variables in .env that are missing from .env.example:\".bold()\n    );\n    for key in \u0026missing {\n        println!(\"  • {}\", key.yellow());\n    }\n    println!();\n\n    // Ask how to add them\n    let choices = vec![\n        \"Yes, add with placeholder values\",\n        \"Yes, add with actual values (not recommended)\",\n        \"Let me choose individually\",\n        \"No, skip\",\n    ];\n\n    let selection = Select::new()\n        .with_prompt(\"Add these to .env.example?\")\n        .items(\u0026choices)\n        .default(0)\n        .interact()?;\n\n    match selection {\n        0 =\u003e add_with_placeholders(\u0026missing, \u0026env_file.vars)?,\n        1 =\u003e add_with_actual_values(\u0026missing, \u0026env_file.vars)?,\n        2 =\u003e add_interactively(\u0026missing, \u0026env_file.vars)?,\n        3 =\u003e {\n            println!(\"{} No changes made\", \"ℹ️\".cyan());\n            return Ok(());\n        }\n        _ =\u003e unreachable!(),\n    }\n\n    // Optionally add a comment\n    if Confirm::new()\n        .with_prompt(\"Add a comment explaining these variables?\")\n        .default(true)\n        .interact()?\n    {\n        let comment: String = Input::new()\n            .with_prompt(\"Comment\")\n            .default(\"Additional configuration\".to_string())\n            .interact_text()?;\n\n        let mut content = fs::read_to_string(\".env.example\")?;\n        content.push_str(\u0026format!(\"\\n# {}\\n\", comment));\n        fs::write(\".env.example\", content)?;\n    }\n\n    println!(\"\\n{} Updated .env.example\", \"✓\".green());\n    println!(\"{} Added {} variables\", \"✓\".green(), missing.len());\n    println!(\"\\n{}\", \"Remember to commit .env.example to Git.\".yellow());\n\n    Ok(())\n}\n\n/// Sync .env.example → .env (add missing vars to .env)\nfn sync_reverse(_use_placeholders: bool, _verbose: bool) -\u003e Result\u003c()\u003e {\n    let parser = Parser::default();\n\n    let example_file = parser\n        .parse_file(\".env.example\")\n        .context(\"Failed to parse .env.example\")?;\n\n    let env_file = match parser.parse_file(\".env\") {\n        Ok(f) =\u003e f,\n        Err(_) =\u003e {\n            println!(\"{} .env not found, creating from .env.example\", \"ℹ️\".cyan());\n            fs::copy(\".env.example\", \".env\")?;\n            println!(\"{} Created .env\", \"✓\".green());\n            println!(\n                \"\\n{}\",\n                \"Replace placeholder values with real credentials!\"\n                    .yellow()\n                    .bold()\n            );\n            return Ok(());\n        }\n    };\n\n    // Find variables in .env.example but not in .env\n    let env_keys: HashSet\u003c_\u003e = env_file.vars.keys().collect();\n    let example_keys: HashSet\u003c_\u003e = example_file.vars.keys().collect();\n\n    let missing: Vec\u003c_\u003e = example_keys.difference(\u0026env_keys).cloned().collect();\n\n    if missing.is_empty() {\n        println!(\"{} .env is up to date\", \"✓\".green());\n        return Ok(());\n    }\n\n    println!(\n        \"{}\",\n        \"Found variables in .env.example that are missing from .env:\".bold()\n    );\n    for key in \u0026missing {\n        println!(\"  • {}\", key.yellow());\n    }\n    println!();\n\n    // Ask how to add them\n    let choices = vec![\n        \"Yes, with placeholder values\",\n        \"Yes, prompt me for real values\",\n        \"Let me choose individually\",\n        \"No, skip\",\n    ];\n\n    let selection = Select::new()\n        .with_prompt(\"Add to .env?\")\n        .items(\u0026choices)\n        .default(0)\n        .interact()?;\n\n    match selection {\n        0 =\u003e {\n            // Add with placeholder values\n            let mut content = fs::read_to_string(\".env\")?;\n            content.push_str(\"\\n# Synced from .env.example\\n\");\n            for key in \u0026missing {\n                if let Some(value) = example_file.vars.get(*key) {\n                    content.push_str(\u0026format!(\"{}={}\\n\", key, value));\n                }\n            }\n            fs::write(\".env\", content)?;\n        }\n        1 =\u003e {\n            // Prompt for real values\n            let mut content = fs::read_to_string(\".env\")?;\n            content.push_str(\"\\n# Synced from .env.example\\n\");\n            for key in \u0026missing {\n                let example_value = example_file\n                    .vars\n                    .get(*key)\n                    .map(|s| s.as_str())\n                    .unwrap_or(\"\");\n\n                let value: String = Input::new()\n                    .with_prompt(format!(\"Value for {}\", key))\n                    .default(example_value.to_string())\n                    .interact_text()?;\n\n                content.push_str(\u0026format!(\"{}={}\\n\", key, value));\n            }\n            fs::write(\".env\", content)?;\n        }\n        2 =\u003e {\n            // Choose individually\n            let selected = MultiSelect::new()\n                .with_prompt(\"Select variables to add\")\n                .items(\u0026missing)\n                .interact()?;\n\n            let mut content = fs::read_to_string(\".env\")?;\n            content.push_str(\"\\n# Synced from .env.example\\n\");\n            for \u0026idx in \u0026selected {\n                let key = missing[idx];\n                if let Some(value) = example_file.vars.get(key) {\n                    content.push_str(\u0026format!(\"{}={}\\n\", key, value));\n                }\n            }\n            fs::write(\".env\", content)?;\n        }\n        3 =\u003e {\n            println!(\"{} No changes made\", \"ℹ️\".cyan());\n            return Ok(());\n        }\n        _ =\u003e unreachable!(),\n    }\n\n    println!(\"\\n{} Updated .env\", \"✓\".green());\n    println!(\"{} Added {} variables\", \"✓\".green(), missing.len());\n\n    Ok(())\n}\n\n/// Add variables with placeholder values\nfn add_with_placeholders(\n    keys: \u0026[\u0026String],\n    values: \u0026std::collections::HashMap\u003cString, String\u003e,\n) -\u003e Result\u003c()\u003e {\n    let mut content = fs::read_to_string(\".env.example\")?;\n    content.push_str(\"\\n# Synced from .env\\n\");\n\n    for key in keys {\n        let placeholder = generate_placeholder(key, values.get(*key));\n        content.push_str(\u0026format!(\"{}={}\\n\", key, placeholder));\n    }\n\n    fs::write(\".env.example\", content)?;\n    Ok(())\n}\n\n/// Add variables with actual values\nfn add_with_actual_values(\n    keys: \u0026[\u0026String],\n    values: \u0026std::collections::HashMap\u003cString, String\u003e,\n) -\u003e Result\u003c()\u003e {\n    let mut content = fs::read_to_string(\".env.example\")?;\n    content.push_str(\"\\n# Synced from .env\\n\");\n\n    for key in keys {\n        if let Some(value) = values.get(*key) {\n            content.push_str(\u0026format!(\"{}={}\\n\", key, value));\n        }\n    }\n\n    fs::write(\".env.example\", content)?;\n    Ok(())\n}\n\n/// Add variables interactively\nfn add_interactively(\n    keys: \u0026[\u0026String],\n    values: \u0026std::collections::HashMap\u003cString, String\u003e,\n) -\u003e Result\u003c()\u003e {\n    let selected = MultiSelect::new()\n        .with_prompt(\"Select variables to add\")\n        .items(keys)\n        .interact()?;\n\n    let mut content = fs::read_to_string(\".env.example\")?;\n    content.push_str(\"\\n# Synced from .env\\n\");\n\n    for \u0026idx in \u0026selected {\n        let key = keys[idx];\n        let placeholder = generate_placeholder(key, values.get(key));\n        content.push_str(\u0026format!(\"{}={}\\n\", key, placeholder));\n    }\n\n    fs::write(\".env.example\", content)?;\n    Ok(())\n}\n\n/// Convert actual values to placeholders for .env.example\nfn convert_to_example(vars: \u0026std::collections::HashMap\u003cString, String\u003e) -\u003e Result\u003c()\u003e {\n    let mut content = String::new();\n    content.push_str(\"# Generated from .env\\n\");\n    content.push_str(\"# Replace all placeholder values with real credentials\\n\\n\");\n\n    for (key, value) in vars {\n        let placeholder = generate_placeholder(key, Some(value));\n        content.push_str(\u0026format!(\"{}={}\\n\", key, placeholder));\n    }\n\n    fs::write(\".env.example\", content)?;\n    Ok(())\n}\n\n/// Generate a placeholder value based on the key name\nfn generate_placeholder(key: \u0026str, value: Option\u003c\u0026String\u003e) -\u003e String {\n    let key_upper = key.to_uppercase();\n\n    // Check for specific patterns\n    if key_upper.contains(\"SECRET\") || key_upper.contains(\"KEY\") || key_upper.contains(\"TOKEN\") {\n        return \"YOUR_KEY_HERE\".to_string();\n    }\n\n    if key_upper.contains(\"PASSWORD\") || key_upper.contains(\"PASS\") {\n        return \"YOUR_PASSWORD_HERE\".to_string();\n    }\n\n    if key_upper.contains(\"URL\") {\n        if let Some(v) = value {\n            // Try to preserve structure\n            if v.contains(\"postgresql://\") {\n                return \"postgresql://user:password@localhost:5432/dbname\".to_string();\n            }\n            if v.contains(\"redis://\") {\n                return \"redis://localhost:6379/0\".to_string();\n            }\n            if v.contains(\"http://\") || v.contains(\"https://\") {\n                return \"https://your-api-url-here.com\".to_string();\n            }\n        }\n        return \"YOUR_URL_HERE\".to_string();\n    }\n\n    if key_upper.contains(\"PORT\") {\n        return \"8000\".to_string();\n    }\n\n    if key_upper.contains(\"DEBUG\") {\n        return \"True\".to_string();\n    }\n\n    if key_upper.contains(\"HOST\") {\n        return \"localhost\".to_string();\n    }\n\n    // Default placeholder\n    \"YOUR_VALUE_HERE\".to_string()\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_generate_placeholder() {\n        assert_eq!(generate_placeholder(\"SECRET_KEY\", None), \"YOUR_KEY_HERE\");\n        assert_eq!(generate_placeholder(\"API_TOKEN\", None), \"YOUR_KEY_HERE\");\n        assert_eq!(\n            generate_placeholder(\"DB_PASSWORD\", None),\n            \"YOUR_PASSWORD_HERE\"\n        );\n        assert_eq!(generate_placeholder(\"PORT\", None), \"8000\");\n        assert_eq!(generate_placeholder(\"DEBUG\", None), \"True\");\n        assert_eq!(generate_placeholder(\"RANDOM_VAR\", None), \"YOUR_VALUE_HERE\");\n    }\n\n    #[test]\n    fn test_generate_placeholder_with_value() {\n        let url = \"postgresql://user:pass@localhost:5432/db\".to_string();\n        assert!(generate_placeholder(\"DATABASE_URL\", Some(\u0026url)).contains(\"postgresql\"));\n\n        let redis = \"redis://localhost:6379/0\".to_string();\n        assert!(generate_placeholder(\"REDIS_URL\", Some(\u0026redis)).contains(\"redis\"));\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ajit","Documents","dotenv-space-cli","src","commands","sync.rs"],"content":"//! Sync command — keep `.env` and `.env.example` in sync.\n//!\n//! # Purpose\n//!\n//! This command helps maintain consistency between local environment files\n//! (`.env`) and team template files (`.env.example`). It supports bidirectional\n//! synchronization with smart placeholder generation and safety features.\n//!\n//! # Safety Features\n//!\n//! - **Default behavior uses placeholders**: Never accidentally commit secrets\n//! - **Atomic file writes**: Prevents corruption from interrupted operations\n//! - **Permission checks**: Warns if `.env` has overly permissive file modes\n//! - **Dry-run mode**: Preview changes before applying them\n//! - **CI-friendly flags**: `--force` skips prompts for automation\n//!\n//! # ⚠️ Security Warning\n//!\n//! The \"add with actual values\" option in forward sync can expose secrets\n//! if `.env.example` is committed to version control. This option:\n//!\n//! 1. Shows an explicit red warning prompt before proceeding\n//! 2. Is automatically disabled when `--force` is used in CI environments\n//! 3. Logs a security audit message when selected\n//!\n//! Always prefer placeholder values for template files.\n//!\n//! # Usage Examples\n//!\n//! ```bash\n//! # Basic forward sync (add new .env vars to .env.example with placeholders)\n//! evnx sync --direction forward\n//!\n//! # Reverse sync with interactive value prompts\n//! evnx sync --direction reverse\n//!\n//! # Preview changes without writing (dry-run)\n//! evnx sync --dry-run\n//!\n//! # CI/CD usage: skip prompts, use placeholders\n//! evnx sync --force --placeholder\n//!\n//! # Custom placeholder templates\n//! evnx sync --template-config ./placeholders.json\n//! ```\n//!\n//! # File Permissions\n//!\n//! The `.env` file should have restrictive permissions (`0o600` or `rw-------`).\n//! This command will warn if permissions are too permissive, as loose permissions\n//! could allow other users on the system to read sensitive credentials.\n\nuse anyhow::{Context, Result};\nuse colored::*;\nuse dialoguer::{Confirm, Input, MultiSelect, Select};\nuse serde::{Deserialize, Serialize};\nuse std::collections::{HashMap, HashSet};\nuse std::fs;\nuse std::io::Write;\nuse std::path::{Path, PathBuf};\nuse tempfile::NamedTempFile;\n\nuse crate::cli::{NamingPolicy, SyncDirection};\nuse crate::core::Parser;\nuse crate::utils::ui;\n\n/// Configuration for custom placeholder templates\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct PlaceholderConfig {\n    /// Pattern-to-placeholder mappings (regex pattern → placeholder string)\n    #[serde(default)]\n    pub patterns: HashMap\u003cString, String\u003e,\n\n    /// Default placeholder for unmatched keys\n    #[serde(default = \"default_placeholder\")]\n    pub default: String,\n\n    /// Keys that should always use actual values (use with extreme caution)\n    #[serde(default)]\n    pub allow_actual: Vec\u003cString\u003e,\n}\n\nfn default_placeholder() -\u003e String {\n    String::from(\"YOUR_VALUE_HERE\")\n}\n\nimpl PlaceholderConfig {\n    /// Load configuration from a JSON file\n    pub fn from_path\u003cP: AsRef\u003cPath\u003e\u003e(path: P) -\u003e Result\u003cSelf\u003e {\n        let content = fs::read_to_string(path).context(\"Failed to read placeholder config file\")?;\n        serde_json::from_str(\u0026content).context(\"Failed to parse placeholder config as JSON\")\n    }\n}\n\nimpl Default for PlaceholderConfig {\n    fn default() -\u003e Self {\n        Self {\n            patterns: HashMap::new(),\n            default: String::from(\"YOUR_VALUE_HERE\"),\n            allow_actual: Vec::new(),\n        }\n    }\n}\n\n/// Result of a sync operation (for dry-run preview)\n#[derive(Debug, Clone)]\npub struct SyncPreview {\n    pub target_file: String,\n    pub action: SyncAction,\n    pub variables: Vec\u003cVarChange\u003e,\n    pub warnings: Vec\u003cString\u003e,\n}\n\n#[derive(Debug, Clone, PartialEq)]\npub enum SyncAction {\n    Add,\n    Update,\n    Remove,\n    NoChange,\n}\n\n#[derive(Debug, Clone)]\npub struct VarChange {\n    pub key: String,\n    pub old_value: Option\u003cString\u003e,\n    pub new_value: String,\n    pub is_placeholder: bool,\n}\n\n/// Main entry point for the sync command\npub fn run(\n    direction: SyncDirection,\n    placeholder: bool,\n    verbose: bool,\n    dry_run: bool,\n    force: bool,\n    template_config: Option\u003cPathBuf\u003e,\n    naming_policy: NamingPolicy,\n) -\u003e Result\u003c()\u003e {\n    if verbose {\n        println!(\n            \"{}\",\n            format!(\"Running sync in verbose mode [direction={direction}, dry_run={dry_run}, force={force}]\").dimmed()\n        );\n    }\n\n    // Load custom placeholder config if provided\n    let config = template_config\n        .as_ref()\n        .map(PlaceholderConfig::from_path)\n        .transpose()?\n        .unwrap_or_default();\n\n    ui::print_header(\n        \"Sync .env ↔ .env.example\",\n        Some(\u0026format!(\"Direction: {}\", direction)),\n    );\n\n    // Check file permissions before proceeding\n    check_env_permissions(\".env\")?;\n\n    match direction {\n        SyncDirection::Forward =\u003e {\n            sync_forward(placeholder, verbose, dry_run, force, \u0026config, naming_policy)\n        }\n        SyncDirection::Reverse =\u003e {\n            sync_reverse(placeholder, verbose, dry_run, force, \u0026config, naming_policy)\n        }\n    }\n}\n\n/// Check if .env file has appropriate permissions (0o600 recommended)\nfn check_env_permissions(path: \u0026str) -\u003e Result\u003c()\u003e {\n    let metadata = match fs::metadata(path) {\n        Ok(m) =\u003e m,\n        Err(_) =\u003e return Ok(()), // File doesn't exist yet, skip check\n    };\n\n    #[cfg(unix)]\n    {\n        use std::os::unix::fs::PermissionsExt;\n        let perms = metadata.permissions().mode();\n        // Check if group or others have any permissions\n        if perms \u0026 0o077 != 0 {\n            ui::warning(format!(\n                \"{} has permissive permissions (0o{:o}). Consider: chmod 600 {}\",\n                path,\n                perms \u0026 0o777,\n                path\n            ));\n            ui::info(\"Overly permissive .env files may expose secrets to other users\");\n        }\n    }\n\n    // On Windows, we could check ACLs, but that's complex; skip for now\n    Ok(())\n}\n\n/// Validate environment variable naming convention\nfn validate_var_name(key: \u0026str, policy: NamingPolicy) -\u003e Result\u003c(), String\u003e {\n    // Standard convention: UPPERCASE with underscores, optional prefix\n    // Examples: DATABASE_URL, API_SECRET_KEY, MY_APP_DEBUG\n    let is_standard = regex::Regex::new(r\"^[A-Z][A-Z0-9_]*$\")\n        .ok()\n        .map(|re| re.is_match(key))\n        .unwrap_or(true); // If regex fails, be permissive\n\n    if !is_standard {\n        match policy {\n            NamingPolicy::Error =\u003e {\n                return Err(format!(\n                    \"Non-standard variable name '{}'. Expected: UPPERCASE_WITH_UNDERSCORES\",\n                    key\n                ));\n            }\n            NamingPolicy::Warn =\u003e {\n                ui::warning(format!(\n                    \"Variable '{}' doesn't follow convention (UPPERCASE_WITH_UNDERSCORES)\",\n                    key\n                ));\n            }\n            NamingPolicy::Ignore =\u003e {} // Silent\n        }\n    }\n    Ok(())\n}\n\n/// Atomic write: write to temp file, then rename to target\nfn atomic_write\u003cP: AsRef\u003cPath\u003e\u003e(path: P, content: \u0026str) -\u003e Result\u003c()\u003e {\n    let path = path.as_ref();\n    let temp = NamedTempFile::new_in(path.parent().unwrap_or_else(|| Path::new(\".\")))?;\n\n    // Write content to temp file\n    temp.as_file().write_all(content.as_bytes())?;\n    temp.as_file().sync_all()?; // Ensure data is on disk\n\n    // Atomic rename\n    temp.persist(path)?;\n\n    // Set restrictive permissions on .env files\n    if path.file_name() == Some(std::ffi::OsStr::new(\".env\")) {\n        #[cfg(unix)]\n        {\n            use std::os::unix::fs::PermissionsExt;\n            let mut perms = fs::metadata(path)?.permissions();\n            perms.set_mode(0o600);\n            fs::set_permissions(path, perms)?;\n        }\n    }\n\n    Ok(())\n}\n\n/// Forward sync: .env → .env.example\n#[allow(clippy::too_many_arguments)]\nfn sync_forward(\n    use_placeholders: bool,\n    verbose: bool,\n    dry_run: bool,\n    force: bool,\n    config: \u0026PlaceholderConfig,\n    naming_policy: NamingPolicy,\n) -\u003e Result\u003c()\u003e {\n    let parser = Parser::default();\n\n    let env_file = parser.parse_file(\".env\").context(\"Failed to parse .env\")?;\n\n    let example_file = match parser.parse_file(\".env.example\") {\n        Ok(f) =\u003e f,\n        Err(_) =\u003e {\n            ui::info(\".env.example not found, creating from .env\");\n\n            let preview = if use_placeholders {\n                convert_to_example_preview(\u0026env_file.vars, config)?\n            } else {\n                // Direct copy preview\n                env_file\n                    .vars\n                    .iter()\n                    .map(|(k, v)| VarChange {\n                        key: k.clone(),\n                        old_value: None,\n                        new_value: v.clone(),\n                        is_placeholder: false,\n                    })\n                    .collect()\n            };\n\n            if dry_run {\n                print_preview(\u0026SyncPreview {\n                    target_file: \".env.example\".into(),\n                    action: SyncAction::Add,\n                    variables: preview,\n                    warnings: vec![\"New file would be created\".into()],\n                });\n                return Ok(());\n            }\n\n            if use_placeholders {\n                convert_to_example(\u0026env_file.vars, config)?;\n            } else {\n                atomic_write(\".env.example\", \u0026fs::read_to_string(\".env\")?)?;\n            }\n\n            ui::success(\"Created .env.example\");\n            return Ok(());\n        }\n    };\n\n    // Find variables in .env but not in .env.example\n    let env_keys: HashSet\u003c_\u003e = env_file.vars.keys().collect();\n    let example_keys: HashSet\u003c_\u003e = example_file.vars.keys().collect();\n    let missing: Vec\u003c_\u003e = env_keys.difference(\u0026example_keys).cloned().collect();\n\n    if missing.is_empty() {\n        ui::success(\".env.example is up to date\");\n        return Ok(());\n    }\n\n    // Validate naming conventions\n    let mut warnings = Vec::new();\n    for key in \u0026missing {\n        if let Err(msg) = validate_var_name(key, naming_policy) {\n            if naming_policy == NamingPolicy::Error {\n                ui::error(\u0026msg);\n                std::process::exit(1);\n            }\n            warnings.push(msg);\n        }\n    }\n\n    ui::print_box(\n        \"Variables to Add\",\n        \u0026format!(\n            \"Found {} variable(s) in .env missing from .env.example:\\n{}\",\n            missing.len(),\n            missing\n                .iter()\n                .map(|k| format!(\"  • {}\", key_highlight(k)))\n                .collect::\u003cVec\u003c_\u003e\u003e()\n                .join(\"\\n\")\n        ),\n    );\n\n    for warning in \u0026warnings {\n        ui::warning(warning);\n    }\n\n    // Handle CI/CD mode (force)\n    if force {\n        // In force mode, always use placeholders for safety\n        ui::info(\"Force mode: using placeholder values and skipping prompts\");\n        let preview = add_with_placeholders_preview(\u0026missing, \u0026env_file.vars, config)?;\n        if dry_run {\n            print_preview(\u0026SyncPreview {\n                target_file: \".env.example\".into(),\n                action: SyncAction::Add,\n                variables: preview,\n                warnings: vec![],\n            });\n            return Ok(());\n        }\n        add_with_placeholders(\u0026missing, \u0026env_file.vars, config)?;\n        ui::success(format!(\"Added {} variables to .env.example\", missing.len()));\n        return Ok(());\n    }\n\n    // Interactive mode\n    let choices = vec![\n        \"Yes, add with placeholder values (recommended)\",\n        \"Yes, add with actual values ⚠️ SECURITY RISK\",\n        \"Let me choose individually\",\n        \"No, skip\",\n    ];\n\n    let selection = Select::new()\n        .with_prompt(\"Add these to .env.example?\")\n        .items(\u0026choices)\n        .default(0)\n        .interact()?;\n\n    match selection {\n        0 =\u003e {\n            // Placeholder values (safe default)\n            let preview = add_with_placeholders_preview(\u0026missing, \u0026env_file.vars, config)?;\n            if dry_run {\n                print_preview(\u0026SyncPreview {\n                    target_file: \".env.example\".into(),\n                    action: SyncAction::Add,\n                    variables: preview,\n                    warnings: vec![],\n                });\n                return Ok(());\n            }\n            add_with_placeholders(\u0026missing, \u0026env_file.vars, config)?;\n        }\n        1 =\u003e {\n            // ⚠️ Actual values — show prominent warning\n            ui::print_box(\n                \"⚠️  SECURITY WARNING\",\n                \"Adding actual values to .env.example may expose secrets if \\\n                 this file is committed to version control.\\n\\n\\\n                 Only proceed if you are certain .env.example is gitignored \\\n                 or contains no sensitive data.\",\n            );\n\n            // Require explicit confirmation\n            let confirm = Confirm::new()\n                .with_prompt(\"Are you absolutely sure you want to add ACTUAL VALUES?\")\n                .default(false)\n                .interact()?;\n\n            if !confirm {\n                ui::info(\"Aborted: values not added\");\n                return Ok(());\n            }\n\n            // Log security event (could send to audit log in production)\n            if verbose {\n                eprintln!(\n                    \"[AUDIT] User added actual values to .env.example for keys: {:?}\",\n                    missing\n                );\n            }\n\n            let preview = add_with_actual_values_preview(\u0026missing, \u0026env_file.vars)?;\n            if dry_run {\n                print_preview(\u0026SyncPreview {\n                    target_file: \".env.example\".into(),\n                    action: SyncAction::Add,\n                    variables: preview,\n                    warnings: vec![\"⚠️ Actual values would be written (security risk)\".into()],\n                });\n                return Ok(());\n            }\n            add_with_actual_values(\u0026missing, \u0026env_file.vars)?;\n        }\n        2 =\u003e {\n            // Interactive selection\n            let preview = add_interactively_preview(\u0026missing, \u0026env_file.vars, config)?;\n            if dry_run {\n                print_preview(\u0026SyncPreview {\n                    target_file: \".env.example\".into(),\n                    action: SyncAction::Add,\n                    variables: preview,\n                    warnings: vec![],\n                });\n                return Ok(());\n            }\n            add_interactively(\u0026missing, \u0026env_file.vars, config)?;\n        }\n        3 =\u003e {\n            ui::info(\"No changes made\");\n            return Ok(());\n        }\n        _ =\u003e unreachable!(),\n    }\n\n    // Skip comment prompt in dry-run\n    if !dry_run\n        \u0026\u0026 Confirm::new()\n            .with_prompt(\"Add a comment explaining these variables?\")\n            .default(true)\n            .interact()?\n    {\n        let comment: String = Input::new()\n            .with_prompt(\"Comment\")\n            .default(\"Additional configuration\".to_string())\n            .interact_text()?;\n\n        let mut content = fs::read_to_string(\".env.example\")?;\n        content.push_str(\u0026format!(\"\\n# {}\\n\", comment));\n        atomic_write(\".env.example\", \u0026content)?;\n    }\n\n    ui::success(format!(\n        \"Updated .env.example (+{} variables)\",\n        missing.len()\n    ));\n\n    ui::print_next_steps(\u0026[\n        \"Review .env.example to ensure no secrets were added\",\n        \"Commit .env.example to Git (never commit .env)\",\n        \"Share changes with your team\",\n    ]);\n\n    Ok(())\n}\n\n/// Reverse sync: .env.example → .env\n#[allow(clippy::too_many_arguments)]\nfn sync_reverse(\n    _use_placeholders: bool,\n    verbose: bool,\n    dry_run: bool,\n    force: bool,\n    config: \u0026PlaceholderConfig,\n    naming_policy: NamingPolicy,\n) -\u003e Result\u003c()\u003e {\n    if verbose {\n        eprintln!(\"[DEBUG] Running reverse sync\");\n    }\n    let parser = Parser::default();\n\n    let example_file = parser\n        .parse_file(\".env.example\")\n        .context(\"Failed to parse .env.example\")?;\n\n    let env_file = match parser.parse_file(\".env\") {\n        Ok(f) =\u003e f,\n        Err(_) =\u003e {\n            ui::info(\".env not found, creating from .env.example\");\n\n            if dry_run {\n                let preview: Vec\u003cVarChange\u003e = example_file\n                    .vars\n                    .iter()\n                    .map(|(k, v)| VarChange {\n                        key: k.clone(),\n                        old_value: None,\n                        new_value: v.clone(),\n                        is_placeholder: is_placeholder_value(v, config),\n                    })\n                    .collect();\n                print_preview(\u0026SyncPreview {\n                    target_file: \".env\".into(),\n                    action: SyncAction::Add,\n                    variables: preview,\n                    warnings: vec![\"Replace placeholder values with real credentials!\".into()],\n                });\n                return Ok(());\n            }\n\n            atomic_write(\".env\", \u0026fs::read_to_string(\".env.example\")?)?;\n            ui::success(\"Created .env\");\n            ui::warning(\"Replace placeholder values with real credentials!\");\n            return Ok(());\n        }\n    };\n\n    // Find variables in .env.example but not in .env\n    let env_keys: HashSet\u003c_\u003e = env_file.vars.keys().collect();\n    let example_keys: HashSet\u003c_\u003e = example_file.vars.keys().collect();\n    let missing: Vec\u003c_\u003e = example_keys.difference(\u0026env_keys).cloned().collect();\n\n    if missing.is_empty() {\n        ui::success(\".env is up to date\");\n        return Ok(());\n    }\n\n    // Validate naming conventions\n    for key in \u0026missing {\n        if let Err(msg) = validate_var_name(key, naming_policy) {\n            if naming_policy == NamingPolicy::Error {\n                ui::error(\u0026msg);\n                std::process::exit(1);\n            }\n            ui::warning(\u0026msg);\n        }\n    }\n\n    ui::print_box(\n        \"Missing Variables\",\n        \u0026format!(\n            \"Found {} variable(s) in .env.example missing from .env:\\n{}\",\n            missing.len(),\n            missing\n                .iter()\n                .map(|k| format!(\"  • {}\", key_highlight(k)))\n                .collect::\u003cVec\u003c_\u003e\u003e()\n                .join(\"\\n\")\n        ),\n    );\n\n    // Handle CI/CD mode\n    if force {\n        ui::info(\"Force mode: adding with placeholder values, skipping prompts\");\n        let preview = add_from_example_preview(\u0026missing, \u0026example_file.vars, true)?;\n        if dry_run {\n            print_preview(\u0026SyncPreview {\n                target_file: \".env\".into(),\n                action: SyncAction::Add,\n                variables: preview,\n                warnings: vec![\"Remember to replace placeholders with real values\".into()],\n            });\n            return Ok(());\n        }\n        add_from_example(\u0026missing, \u0026example_file.vars, true)?;\n        ui::success(format!(\"Added {} variables to .env\", missing.len()));\n        return Ok(());\n    }\n\n    // Interactive mode\n    let choices = vec![\n        \"Yes, with placeholder values\",\n        \"Yes, prompt me for real values\",\n        \"Let me choose individually\",\n        \"No, skip\",\n    ];\n\n    let selection = Select::new()\n        .with_prompt(\"Add to .env?\")\n        .items(\u0026choices)\n        .default(0)\n        .interact()?;\n\n    let use_placeholders = match selection {\n        0 =\u003e true,\n        1 =\u003e false,\n        2 =\u003e {\n            // Individual selection preview\n            let preview =\n                add_from_example_interactive_preview(\u0026missing, \u0026example_file.vars, config)?;\n            if dry_run {\n                print_preview(\u0026SyncPreview {\n                    target_file: \".env\".into(),\n                    action: SyncAction::Add,\n                    variables: preview,\n                    warnings: vec![],\n                });\n                return Ok(());\n            }\n            add_from_example_interactive(\u0026missing, \u0026example_file.vars, config)?;\n            ui::success(\"Added selected variables to .env\");\n            return Ok(());\n        }\n        3 =\u003e {\n            ui::info(\"No changes made\");\n            return Ok(());\n        }\n        _ =\u003e unreachable!(),\n    };\n\n    let preview = add_from_example_preview(\u0026missing, \u0026example_file.vars, use_placeholders)?;\n    if dry_run {\n        print_preview(\u0026SyncPreview {\n            target_file: \".env\".into(),\n            action: SyncAction::Add,\n            variables: preview,\n            warnings: if use_placeholders {\n                vec![\"Remember to replace placeholders with real values\".into()]\n            } else {\n                vec![]\n            },\n        });\n        return Ok(());\n    }\n\n    add_from_example(\u0026missing, \u0026example_file.vars, use_placeholders)?;\n    ui::success(format!(\"Added {} variables to .env\", missing.len()));\n\n    if use_placeholders {\n        ui::warning(\"Remember to replace placeholder values with real credentials!\");\n    }\n\n    Ok(())\n}\n\n// ─────────────────────────────────────────────────────────────\n// Placeholder Generation (with custom config support)\n// ─────────────────────────────────────────────────────────────\n\n/// Generate placeholder using built-in rules + custom config\nfn generate_placeholder(key: \u0026str, value: Option\u003c\u0026String\u003e, config: \u0026PlaceholderConfig) -\u003e String {\n    // First check custom patterns from config\n    for (pattern, placeholder) in \u0026config.patterns {\n        // ✅ FIXED: Proper regex matching with case-insensitive flag\n        if let Ok(re) = regex::Regex::new(\u0026format!(\"(?i){}\", pattern)) {\n            if re.is_match(key) {\n                return placeholder.clone();\n            }\n        }\n    }\n\n    // Built-in heuristics (fallback)\n    let key_upper = key.to_uppercase();\n\n    if key_upper.contains(\"SECRET\") || key_upper.contains(\"KEY\") || key_upper.contains(\"TOKEN\") {\n        return \"YOUR_KEY_HERE\".to_string();\n    }\n\n    if key_upper.contains(\"PASSWORD\") || key_upper.contains(\"PASS\") {\n        return \"YOUR_PASSWORD_HERE\".to_string();\n    }\n\n    if key_upper.contains(\"URL\") {\n        if let Some(v) = value {\n            if v.contains(\"postgresql://\") {\n                return \"postgresql://user:password@localhost:5432/dbname\".to_string();\n            }\n            if v.contains(\"redis://\") {\n                return \"redis://localhost:6379/0\".to_string();\n            }\n            if v.contains(\"http://\") || v.contains(\"https://\") {\n                return \"https://your-api-url-here.com\".to_string();\n            }\n        }\n        return \"YOUR_URL_HERE\".to_string();\n    }\n\n    if key_upper.contains(\"PORT\") {\n        return \"8000\".to_string();\n    }\n\n    if key_upper.contains(\"DEBUG\") {\n        return \"true\".to_string();\n    }\n\n    if key_upper.contains(\"HOST\") || key_upper.contains(\"SERVER\") {\n        return \"localhost\".to_string();\n    }\n\n    // ✅ FIXED: Use config default, fallback to hardcoded default if empty\n    if config.default.is_empty() {\n        \"YOUR_VALUE_HERE\".to_string()\n    } else {\n        config.default.clone()\n    }\n}\n\n/// Check if a value looks like a placeholder\nfn is_placeholder_value(value: \u0026str, config: \u0026PlaceholderConfig) -\u003e bool {\n    value == config.default\n        || value.contains(\"YOUR_\")\n        || value.contains(\"placeholder\")\n        || value == \"localhost\"\n        || value == \"8000\"\n        || value == \"true\"\n        || value == \"false\"\n}\n\n// ─────────────────────────────────────────────────────────────\n// Add Functions (with preview support)\n// ─────────────────────────────────────────────────────────────\n\nfn add_with_placeholders(\n    keys: \u0026[\u0026String],\n    values: \u0026HashMap\u003cString, String\u003e,\n    config: \u0026PlaceholderConfig,\n) -\u003e Result\u003c()\u003e {\n    let mut content = fs::read_to_string(\".env.example\").context(\"Failed to read .env.example\")?;\n    content.push_str(\"\\n# Synced from .env\\n\");\n\n    for key in keys {\n        let placeholder = generate_placeholder(key, values.get(*key), config);\n        content.push_str(\u0026format!(\"{}={}\\n\", key, placeholder));\n    }\n\n    atomic_write(\".env.example\", \u0026content)?;\n    Ok(())\n}\n\nfn add_with_placeholders_preview(\n    keys: \u0026[\u0026String],\n    values: \u0026HashMap\u003cString, String\u003e,\n    config: \u0026PlaceholderConfig,\n) -\u003e Result\u003cVec\u003cVarChange\u003e\u003e {\n    Ok(keys\n        .iter()\n        .map(|key| {\n            let placeholder = generate_placeholder(key, values.get(*key), config);\n            VarChange {\n                key: (*key).clone(),\n                old_value: None,\n                new_value: placeholder,\n                is_placeholder: true,\n            }\n        })\n        .collect())\n}\n\nfn add_with_actual_values(keys: \u0026[\u0026String], values: \u0026HashMap\u003cString, String\u003e) -\u003e Result\u003c()\u003e {\n    let mut content = fs::read_to_string(\".env.example\")?;\n    content.push_str(\"\\n# Synced from .env [⚠️ ACTUAL VALUES]\\n\");\n\n    for key in keys {\n        if let Some(value) = values.get(*key) {\n            content.push_str(\u0026format!(\"{}={}\\n\", key, value));\n        }\n    }\n\n    atomic_write(\".env.example\", \u0026content)?;\n    Ok(())\n}\n\nfn add_with_actual_values_preview(\n    keys: \u0026[\u0026String],\n    values: \u0026HashMap\u003cString, String\u003e,\n) -\u003e Result\u003cVec\u003cVarChange\u003e\u003e {\n    Ok(keys\n        .iter()\n        .filter_map(|key| {\n            values.get(*key).map(|v| VarChange {\n                key: (*key).clone(),\n                old_value: None,\n                new_value: v.clone(),\n                is_placeholder: false,\n            })\n        })\n        .collect())\n}\n\nfn add_interactively(\n    keys: \u0026[\u0026String],\n    values: \u0026HashMap\u003cString, String\u003e,\n    config: \u0026PlaceholderConfig,\n) -\u003e Result\u003c()\u003e {\n    let selected = MultiSelect::new()\n        .with_prompt(\"Select variables to add\")\n        .items(keys)\n        .interact()?;\n\n    let mut content = fs::read_to_string(\".env.example\")?;\n    content.push_str(\"\\n# Synced from .env\\n\");\n\n    for \u0026idx in \u0026selected {\n        let key = keys[idx];\n        let placeholder = generate_placeholder(key, values.get(key), config);\n        content.push_str(\u0026format!(\"{}={}\\n\", key, placeholder));\n    }\n\n    atomic_write(\".env.example\", \u0026content)?;\n    Ok(())\n}\n\nfn add_interactively_preview(\n    keys: \u0026[\u0026String],\n    values: \u0026HashMap\u003cString, String\u003e,\n    config: \u0026PlaceholderConfig,\n) -\u003e Result\u003cVec\u003cVarChange\u003e\u003e {\n    // For preview, assume all would be selected with placeholders\n    Ok(keys\n        .iter()\n        .map(|key| {\n            let placeholder = generate_placeholder(key, values.get(*key), config);\n            VarChange {\n                key: (*key).clone(),\n                old_value: None,\n                new_value: placeholder,\n                is_placeholder: true,\n            }\n        })\n        .collect())\n}\n\nfn convert_to_example(vars: \u0026HashMap\u003cString, String\u003e, config: \u0026PlaceholderConfig) -\u003e Result\u003c()\u003e {\n    let mut content = String::new();\n    content.push_str(\"# Generated from .env\\n\");\n    content.push_str(\"# Replace all placeholder values with real credentials\\n\\n\");\n\n    for (key, value) in vars {\n        let placeholder = generate_placeholder(key, Some(value), config);\n        content.push_str(\u0026format!(\"{}={}\\n\", key, placeholder));\n    }\n\n    atomic_write(\".env.example\", \u0026content)?;\n    Ok(())\n}\n\nfn convert_to_example_preview(\n    vars: \u0026HashMap\u003cString, String\u003e,\n    config: \u0026PlaceholderConfig,\n) -\u003e Result\u003cVec\u003cVarChange\u003e\u003e {\n    Ok(vars\n        .iter()\n        .map(|(k, v)| {\n            let placeholder = generate_placeholder(k, Some(v), config);\n            VarChange {\n                key: k.clone(),\n                old_value: None,\n                new_value: placeholder,\n                is_placeholder: true,\n            }\n        })\n        .collect())\n}\n\n// Reverse sync add functions\nfn add_from_example(\n    keys: \u0026[\u0026String],\n    example_vars: \u0026HashMap\u003cString, String\u003e,\n    use_placeholders: bool,\n) -\u003e Result\u003c()\u003e {\n    let mut content = fs::read_to_string(\".env\").unwrap_or_default();\n    content.push_str(\"\\n# Synced from .env.example\\n\");\n\n    for key in keys {\n        let value = if use_placeholders {\n            // Generate safe placeholder\n            generate_placeholder(key, example_vars.get(*key), \u0026PlaceholderConfig::default())\n        } else {\n            // Prompt for real value\n            let default = example_vars.get(*key).map(|s| s.as_str()).unwrap_or(\"\");\n            Input::new()\n                .with_prompt(format!(\"Value for {}\", key))\n                .default(default.to_string())\n                .interact_text()?\n        };\n        content.push_str(\u0026format!(\"{}={}\\n\", key, value));\n    }\n\n    atomic_write(\".env\", \u0026content)?;\n    Ok(())\n}\n\nfn add_from_example_preview(\n    keys: \u0026[\u0026String],\n    example_vars: \u0026HashMap\u003cString, String\u003e,\n    use_placeholders: bool,\n) -\u003e Result\u003cVec\u003cVarChange\u003e\u003e {\n    Ok(keys\n        .iter()\n        .map(|key| {\n            let example_val = example_vars.get(*key).cloned().unwrap_or_default();\n            let new_val = if use_placeholders {\n                generate_placeholder(key, Some(\u0026example_val), \u0026PlaceholderConfig::default())\n            } else {\n                example_val.clone() // In preview, show what would be prompted\n            };\n            VarChange {\n                key: (*key).clone(),\n                old_value: None,\n                new_value: new_val,\n                is_placeholder: use_placeholders,\n            }\n        })\n        .collect())\n}\n\nfn add_from_example_interactive(\n    keys: \u0026[\u0026String],\n    example_vars: \u0026HashMap\u003cString, String\u003e,\n    config: \u0026PlaceholderConfig,\n) -\u003e Result\u003c()\u003e {\n    let selected = MultiSelect::new()\n        .with_prompt(\"Select variables to add\")\n        .items(keys)\n        .interact()?;\n\n    let mut content = fs::read_to_string(\".env\").unwrap_or_default();\n    content.push_str(\"\\n# Synced from .env.example\\n\");\n\n    for \u0026idx in \u0026selected {\n        let key = keys[idx];\n        let placeholder = generate_placeholder(key, example_vars.get(key), config);\n        content.push_str(\u0026format!(\"{}={}\\n\", key, placeholder));\n    }\n\n    atomic_write(\".env\", \u0026content)?;\n    Ok(())\n}\n\nfn add_from_example_interactive_preview(\n    keys: \u0026[\u0026String],\n    example_vars: \u0026HashMap\u003cString, String\u003e,\n    config: \u0026PlaceholderConfig,\n) -\u003e Result\u003cVec\u003cVarChange\u003e\u003e {\n    // Preview assumes all selected with placeholders\n    Ok(keys\n        .iter()\n        .map(|key| {\n            let placeholder = generate_placeholder(key, example_vars.get(*key), config);\n            VarChange {\n                key: (*key).clone(),\n                old_value: None,\n                new_value: placeholder,\n                is_placeholder: true,\n            }\n        })\n        .collect())\n}\n\n// ─────────────────────────────────────────────────────────────\n// Preview Output\n// ─────────────────────────────────────────────────────────────\n\nfn print_preview(preview: \u0026SyncPreview) {\n    ui::print_preview_header();\n\n    println!(\n        \"{}\\n\",\n        format!(\n            \"Target: {} (action: {:?})\",\n            preview.target_file, preview.action\n        )\n        .dimmed()\n    );\n\n    if preview.variables.is_empty() {\n        println!(\"{}\", \"  No changes\".dimmed());\n    } else {\n        for var in \u0026preview.variables {\n            let marker = if var.is_placeholder { \"🔒\" } else { \"⚠️\" };\n            println!(\n                \"  {} {} = {}\",\n                marker,\n                key_highlight(\u0026var.key),\n                value_preview(\u0026var.new_value, var.is_placeholder)\n            );\n        }\n    }\n\n    if !preview.warnings.is_empty() {\n        println!();\n        for warning in \u0026preview.warnings {\n            ui::warning(warning);\n        }\n    }\n\n    println!(\"\\n{}\", \"(dry-run: no files were modified)\".dimmed());\n}\n\nfn key_highlight(key: \u0026str) -\u003e ColoredString {\n    key.cyan()\n}\n\nfn value_preview(value: \u0026str, is_placeholder: bool) -\u003e ColoredString {\n    if is_placeholder {\n        value.dimmed()\n    } else {\n        value.yellow()\n    }\n}\n\n// ─────────────────────────────────────────────────────────────\n// Tests\n// ─────────────────────────────────────────────────────────────\n\n// src/commands/sync.rs - tests module\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use tempfile::TempDir;\n\n    #[test]\n    fn test_generate_placeholder_builtin_rules() {\n        let config = PlaceholderConfig::default();\n\n        assert_eq!(\n            generate_placeholder(\"SECRET_KEY\", None, \u0026config),\n            \"YOUR_KEY_HERE\"\n        );\n        assert_eq!(\n            generate_placeholder(\"API_TOKEN\", None, \u0026config),\n            \"YOUR_KEY_HERE\"\n        );\n        assert_eq!(\n            generate_placeholder(\"DB_PASSWORD\", None, \u0026config),\n            \"YOUR_PASSWORD_HERE\"\n        );\n        assert_eq!(generate_placeholder(\"PORT\", None, \u0026config), \"8000\");\n        assert_eq!(generate_placeholder(\"DEBUG_MODE\", None, \u0026config), \"true\");\n        assert_eq!(generate_placeholder(\"DB_HOST\", None, \u0026config), \"localhost\");\n        // ✅ FIXED: This should now return \"YOUR_VALUE_HERE\"\n        assert_eq!(\n            generate_placeholder(\"RANDOM_VAR\", None, \u0026config),\n            \"YOUR_VALUE_HERE\"\n        );\n    }\n\n    #[test]\n    fn test_generate_placeholder_with_url_values() {\n        let config = PlaceholderConfig::default();\n\n        let pg_url = \"postgresql://user:pass@localhost:5432/db\";\n        assert!(\n            generate_placeholder(\"DATABASE_URL\", Some(\u0026pg_url.to_string()), \u0026config)\n                .contains(\"postgresql\")\n        );\n\n        let redis_url = \"redis://localhost:6379/0\";\n        assert!(\n            generate_placeholder(\"REDIS_URL\", Some(\u0026redis_url.to_string()), \u0026config)\n                .contains(\"redis\")\n        );\n    }\n\n    #[test]\n    fn test_generate_placeholder_custom_config() {\n        let mut config = PlaceholderConfig::default();\n        // ✅ FIXED: Use proper regex pattern (without .* suffix in pattern itself)\n        config\n            .patterns\n            .insert(\"AWS_.*\".to_string(), \"aws-placeholder\".to_string());\n        config.default = \"CUSTOM_DEFAULT\".to_string();\n\n        // ✅ This should now match the custom pattern\n        assert_eq!(\n            generate_placeholder(\"AWS_SECRET\", None, \u0026config),\n            \"aws-placeholder\"\n        );\n        // ✅ This should use custom default\n        assert_eq!(\n            generate_placeholder(\"UNKNOWN_VAR\", None, \u0026config),\n            \"CUSTOM_DEFAULT\"\n        );\n    }\n\n    #[test]\n    fn test_validate_var_name() {\n        assert!(validate_var_name(\"DATABASE_URL\", NamingPolicy::Warn).is_ok());\n        assert!(validate_var_name(\"API_KEY_123\", NamingPolicy::Warn).is_ok());\n\n        // Non-standard names\n        assert!(validate_var_name(\"camelCase\", NamingPolicy::Ignore).is_ok());\n        assert!(validate_var_name(\"camelCase\", NamingPolicy::Warn).is_ok()); // warns but ok\n        assert!(validate_var_name(\"camelCase\", NamingPolicy::Error).is_err());\n    }\n\n    #[test]\n    fn test_is_placeholder_value() {\n        let config = PlaceholderConfig::default();\n\n        assert!(is_placeholder_value(\"YOUR_VALUE_HERE\", \u0026config));\n        assert!(is_placeholder_value(\"YOUR_KEY_HERE\", \u0026config));\n        assert!(is_placeholder_value(\"localhost\", \u0026config));\n        assert!(!is_placeholder_value(\"sk_live_abc123\", \u0026config));\n        assert!(!is_placeholder_value(\"production-db.example.com\", \u0026config));\n    }\n\n    #[test]\n    fn test_atomic_write_sets_permissions() {\n        let temp_dir = TempDir::new().unwrap();\n        let env_path = temp_dir.path().join(\".env\");\n\n        atomic_write(\u0026env_path, \"TEST=value\\n\").unwrap();\n\n        #[cfg(unix)]\n        {\n            use std::os::unix::fs::PermissionsExt;\n            let perms = fs::metadata(\u0026env_path).unwrap().permissions().mode();\n            assert_eq!(perms \u0026 0o777, 0o600, \"File should have 0o600 permissions\");\n        }\n    }\n\n    #[test]\n (generate_placeholder(\"APP_PORT\", None, \u0026config), \"3000\");\n    }\n}\n","traces":[{"line":83,"address":[7172064],"length":1,"stats":{"Line":0}},{"line":84,"address":[7260088],"length":1,"stats":{"Line":0}},{"line":89,"address":[6204835,6204829,6204480],"length":1,"stats":{"Line":0}},{"line":90,"address":[5750569],"length":1,"stats":{"Line":0}},{"line":91,"address":[6204750,6204687],"length":1,"stats":{"Line":0}},{"line":96,"address":[7272192,7272431,7272437],"length":1,"stats":{"Line":1}},{"line":98,"address":[7399217],"length":1,"stats":{"Line":2}},{"line":99,"address":[7184091],"length":1,"stats":{"Line":3}},{"line":100,"address":[7399293],"length":1,"stats":{"Line":3}},{"line":131,"address":[7268576,7270248,7270230],"length":1,"stats":{"Line":0}},{"line":140,"address":[7268671],"length":1,"stats":{"Line":0}},{"line":141,"address":[7269098,7269017],"length":1,"stats":{"Line":0}},{"line":148,"address":[7368367,7368447,7369281],"length":1,"stats":{"Line":0}},{"line":150,"address":[7181221],"length":1,"stats":{"Line":0}},{"line":156,"address":[7396640,7396569],"length":1,"stats":{"Line":0}},{"line":160,"address":[7396861,7397201],"length":1,"stats":{"Line":0}},{"line":162,"address":[7181876],"length":1,"stats":{"Line":0}},{"line":164,"address":[7397084],"length":1,"stats":{"Line":0}},{"line":167,"address":[7369197,7369055],"length":1,"stats":{"Line":0}},{"line":173,"address":[7264352],"length":1,"stats":{"Line":0}},{"line":174,"address":[7176337],"length":1,"stats":{"Line":0}},{"line":175,"address":[7176434],"length":1,"stats":{"Line":0}},{"line":176,"address":[7264421],"length":1,"stats":{"Line":0}},{"line":182,"address":[7264530],"length":1,"stats":{"Line":0}},{"line":184,"address":[7176538],"length":1,"stats":{"Line":0}},{"line":185,"address":[7391617],"length":1,"stats":{"Line":0}},{"line":188,"address":[7264597],"length":1,"stats":{"Line":0}},{"line":191,"address":[7176865],"length":1,"stats":{"Line":0}},{"line":196,"address":[7363619],"length":1,"stats {"Line":0}},{"line":1006,"address":[7254495],"length":1,"stats":{"Line":0}},{"line":1010,"address":[7254360,7254503],"length":1,"stats":{"Line":0}},{"line":1013,"address":[7351920],"length":1,"stats":{"Line":0}},{"line":1014,"address":[7351941],"length":1,"stats":{"Line":0}},{"line":1017,"address":[7381648],"length":1,"stats":{"Line":0}},{"line":1018,"address":[7381692],"length":1,"stats":{"Line":0}},{"line":1019,"address":[7254724],"length":1,"stats":{"Line":0}},{"line":1021,"address":[7254702],"length":1,"stats":{"Line":0}}],"covered":55,"coverable":421},{"path":["/","home","ajit","Documents","dotenv-space-cli","src","commands","template.rs"],"content":"/// Template command - generate configuration files from .env\n///\n/// Supports variable substitution with filters and transformations\nuse anyhow::{Context, Result};\nuse colored::*;\nuse std::collections::HashMap;\nuse std::fs;\n\nuse crate::core::Parser;\n\npub fn run(input: String, output: String, env: String, verbose: bool) -\u003e Result\u003c()\u003e {\n    if verbose {\n        println!(\"{}\", \"Running template in verbose mode\".dimmed());\n    }\n\n    println!(\n        \"\\n{}\",\n        \"┌─ Generate config from template ─────────────────────┐\".cyan()\n    );\n    println!(\n        \"{}\\n\",\n        \"└──────────────────────────────────────────────────────┘\".cyan()\n    );\n\n    // Parse .env file\n    let parser = Parser::default();\n    let env_file = parser\n        .parse_file(\u0026env)\n        .with_context(|| format!(\"Failed to parse {}\", env))?;\n\n    println!(\n        \"{} Loaded {} variables from {}\",\n        \"✓\".green(),\n        env_file.vars.len(),\n        env\n    );\n\n    // Read template\n    let template_content =\n        fs::read_to_string(\u0026input).with_context(|| format!(\"Failed to read template {}\", input))?;\n\n    println!(\"{} Read template from {}\", \"✓\".green(), input);\n\n    // Process template\n    let result = process_template(\u0026template_content, \u0026env_file.vars)?;\n\n    // Write output\n    fs::write(\u0026output, \u0026result).with_context(|| format!(\"Failed to write to {}\", output))?;\n\n    println!(\"{} Generated config at {}\", \"✓\".green(), output);\n\n    Ok(())\n}\n\n/// Process template with variable substitution\nfn process_template(template: \u0026str, vars: \u0026HashMap\u003cString, String\u003e) -\u003e Result\u003cString\u003e {\n    let mut result = template.to_string();\n\n    // Simple variable substitution: ${VAR} or {{VAR}}\n    for (key, value) in vars {\n        // ${VAR} style\n        let pattern = format!(\"${{{}}}\", key);\n        result = result.replace(\u0026pattern, value);\n\n        // {{VAR}} style\n        let pattern = format!(\"{{{{{}}}}}\", key);\n        result = result.replace(\u0026pattern, value);\n\n        // $VAR style (simple)\n        let pattern = format!(\"${}\", key);\n        result = result.replace(\u0026pattern, value);\n    }\n\n    // Process filters\n    result = process_filters(\u0026result, vars)?;\n\n    Ok(result)\n}\n\ntype FilterFn = fn(\u0026str) -\u003e String;\n\nfn filter_patterns() -\u003e Vec\u003c(\u0026'static str, FilterFn)\u003e {\n    vec![\n        (\"|upper\", |v| v.to_uppercase()),\n        (\"|lower\", |v| v.to_lowercase()),\n        (\"|title\", |v| {\n            let mut c = v.chars();\n            match c.next() {\n                None =\u003e String::new(),\n                Some(f) =\u003e f.to_uppercase().collect::\u003cString\u003e() + c.as_str(),\n            }\n        }),\n    ]\n}\n\n/// Process template filters\n/// Supports: {{VAR|upper}}, {{VAR|lower}}, {{VAR|bool}}, {{VAR|json}}\nfn process_filters(template: \u0026str, vars: \u0026HashMap\u003cString, String\u003e) -\u003e Result\u003cString\u003e {\n    let mut result = template.to_string();\n\n    for (key, value) in vars {\n        // Apply upper/lower/title via filter_patterns()\n        // BUG FIX: was `\u0026filter_patterns` (variable) — must be `\u0026filter_patterns()` (function call)\n        for (filter, transform) in \u0026filter_patterns() {\n            let pattern = format!(\"{{{{{}{}}}}}\", key, filter);\n            if result.contains(\u0026pattern) {\n                let transformed = transform(value);\n                result = result.replace(\u0026pattern, \u0026transformed);\n            }\n        }\n\n        // Boolean filter\n        let pattern = format!(\"{{{{{}|bool}}}}\", key);\n        if result.contains(\u0026pattern) {\n            let bool_val = value.eq_ignore_ascii_case(\"true\")\n                || value.eq_ignore_ascii_case(\"yes\")\n                || value.eq_ignore_ascii_case(\"1\");\n            result = result.replace(\u0026pattern, \u0026bool_val.to_string());\n        }\n\n        // Integer filter\n        let pattern = format!(\"{{{{{}|int}}}}\", key);\n        if result.contains(\u0026pattern) {\n            let int_val = value.parse::\u003ci64\u003e().unwrap_or(0);\n            result = result.replace(\u0026pattern, \u0026int_val.to_string());\n        }\n\n        // JSON escape filter\n        let pattern = format!(\"{{{{{}|json}}}}\", key);\n        if result.contains(\u0026pattern) {\n            let json_val = serde_json::to_string(value).unwrap_or_default();\n            // Remove surrounding quotes\n            let json_val = json_val.trim_matches('\"');\n            result = result.replace(\u0026pattern, json_val);\n        }\n    }\n\n    Ok(result)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_process_template_simple() {\n        let template = \"DATABASE_URL=${DATABASE_URL}\";\n        let mut vars = HashMap::new();\n        vars.insert(\n            \"DATABASE_URL\".to_string(),\n            \"postgresql://localhost\".to_string(),\n        );\n\n        let result = process_template(template, \u0026vars).unwrap();\n        assert_eq!(result, \"DATABASE_URL=postgresql://localhost\");\n    }\n\n    #[test]\n    fn test_process_template_double_braces() {\n        let template = \"url: {{DATABASE_URL}}\";\n        let mut vars = HashMap::new();\n        vars.insert(\n            \"DATABASE_URL\".to_string(),\n            \"postgresql://localhost\".to_string(),\n        );\n\n        let result = process_template(template, \u0026vars).unwrap();\n        assert_eq!(result, \"url: postgresql://localhost\");\n    }\n\n    #[test]\n    fn test_filter_upper() {\n        let template = \"ENV={{ENV|upper}}\";\n        let mut vars = HashMap::new();\n        vars.insert(\"ENV\".to_string(), \"production\".to_string());\n\n        let result = process_filters(template, \u0026vars).unwrap();\n        assert_eq!(result, \"ENV=PRODUCTION\");\n    }\n\n    #[test]\n    fn test_filter_bool() {\n        let template = \"debug={{DEBUG|bool}}\";\n        let mut vars = HashMap::new();\n        vars.insert(\"DEBUG\".to_string(), \"true\".to_string());\n\n        let result = process_filters(template, \u0026vars).unwrap();\n        assert_eq!(result, \"debug=true\");\n    }\n\n    #[test]\n    fn test_filter_int() {\n        let template = \"port={{PORT|int}}\";\n        let mut vars = HashMap::new();\n        vars.insert(\"PORT\".to_string(), \"8000\".to_string());\n\n        let result = process_filters(template, \u0026vars).unwrap();\n        assert_eq!(result, \"port=8000\");\n    }\n}\n","traces":[{"line":11,"address":[6316240,6319145,6318992],"length":1,"stats":{"Line":0}},{"line":12,"address":[7119172],"length":1,"stats":{"Line":0}},{"line":13,"address":[7119290,7119210],"length":1,"stats":{"Line":0}},{"line":16,"address":[7119176],"length":1,"stats":{"Line":0}},{"line":20,"address":[7119649],"length":1,"stats":{"Line":0}},{"line":26,"address":[7119808],"length":1,"stats":{"Line":0}},{"line":27,"address":[7119891,7119971,7122078],"length":1,"stats":{"Line":0}},{"line":28,"address":[6316948],"length":1,"stats":{"Line":0}},{"line":29,"address":[7119864,7119955],"length":1,"stats":{"Line":0}},{"line":31,"ad Serialize};\nuse std::collections::{HashMap, HashSet};\nuse std::path::Path;\n\nuse crate::core::{Parser, ParserConfig};\n\n#[derive(Debug, Serialize, Deserialize)]\npub struct ValidationResult {\n    pub status: String,\n    pub required_present: usize,\n    pub required_total: usize,\n    pub issues: Vec\u003cIssue\u003e,\n    pub summary: Summary,\n}\n\n#[derive(Debug, Serialize, Deserialize, Clone)]\npub struct Issue {\n    pub severity: String,\n    #[serde(rename = \"type\")]\n    pub issue_type: String,\n    pub variable: String,\n    pub message: String,\n    pub location: String,\n    pub suggestion: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Serialize, Deserialize)]\npub struct Summary {\n    pub errors: usize,\n    pub warnings: usize,\n    pub style: usize,\n}\n\npub fn run(\n    env: String,\n    example: String,\n    strict: bool,\n    fix: bool,\n    format: String,\n    exit_zero: bool,\n    verbose: bool,\n) -\u003e Result\u003c()\u003e {\n    if verbose {\n        println!(\"{}\", \"Running validate in verbose mode\".dimmed());\n    }\n\n    if format == \"pretty\" {\n        println!(\n            \"\\n{}\",\n            \"┌─ Validating environment variables ──────────────────┐\".cyan()\n        );\n        println!(\n            \"{}\",\n            \"│ Comparing .env against .env.example                 │\".cyan()\n        );\n        println!(\n            \"{}\\n\",\n            \"└──────────────────────────────────────────────────────┘\".cyan()\n        );\n    }\n\n    let mut parser_config = ParserConfig::default();\n    if strict {\n        parser_config.strict = true;\n    }\n    let parser = Parser::new(parser_config);\n\n    let example_file = parser\n        .parse_file(\u0026example)\n        .with_context(|| format!(\"Failed to parse {}\", example))?;\n\n    let env_file = parser\n        .parse_file(\u0026env)\n        .with_context(|| format!(\"Failed to parse {}\", env))?;\n\n    if verbose {\n        println!(\n            \"Parsed {} variables from {}\",\n            example_file.vars.len(),\n            example\n        );\n        println!(\"Parsed {} variables from {}\", env_file.vars.len(), env);\n    }\n\n    let mut issues = Vec::new();\n\n    // Check 1: Required variables present\n    let example_keys: HashSet\u003c_\u003e = example_file.vars.keys().collect();\n    let env_keys: HashSet\u003c_\u003e = env_file.vars.keys().collect();\n\n    let missing: Vec\u003c_\u003e = example_keys.difference(\u0026env_keys).collect();\n    for key in \u0026missing {\n        issues.push(Issue {\n            severity: \"error\".to_string(),\n            issue_type: \"missing_variable\".to_string(),\n            variable: key.to_string(),\n            message: format!(\"Missing required variable: {}\", key),\n            location: format!(\"{}:?\", env),\n            suggestion: Some(format!(\"Add {}=\u003cvalue\u003e to {}\", key, env)),\n        });\n    }\n\n    // Check 2: Extra variables in strict mode\n    if strict {\n        let extra: Vec\u003c_\u003e = env_keys.difference(\u0026example_keys).collect();\n        for key in \u0026extra {\n            issues.push(Issue {\n                severity: \"warning\".to_string(),\n                issue_type: \"extra_variable\".to_string(),\n                variable: key.to_string(),\n                message: format!(\"Extra variable not in .env.example: {}\", key),\n                location: format!(\"{}:?\", env),\n                suggestion: Some(format!(\"Add {} to {} or remove from {}\", key, example, env)),\n            });\n        }\n    }\n\n    // Check 3: Placeholder values\n    for (key, value) in \u0026env_file.vars {\n        if is_placeholder(value) {\n            let suggestion = match key.as_str() {\n                \"SECRET_KEY\" =\u003e Some(\"Run: openssl rand -hex 32\".to_string()),\n                k if k.contains(\"AWS\") =\u003e Some(\"Get from AWS Console\".to_string()),\n                k if k.contains(\"STRIPE\") =\u003e Some(\"Get from Stripe Dashboard\".to_string()),\n                _ =\u003e None,\n            };\n\n            issues.push(Issue {\n                severity: \"error\".to_string(),\n                issue_type: \"placeholder_value\".to_string(),\n                variable: key.clone(),\n                message: format!(\"{} looks like a placeholder\", key),\n                location: format!(\"{}:?\", env),\n                suggestion,\n            });\n        }\n    }\n\n    // Check 4: Boolean string trap\n    for (key, value) in \u0026env_file.vars {\n        if value == \"False\" || value == \"True\" {\n            issues.push(Issue {\n                severity: \"warning\".to_string(),\n                issue_type: \"boolean_trap\".to_string(),\n                variable: key.clone(),\n                message: format!(\"{} is set to \\\"{}\\\" (string)\", key, value),\n                location: format!(\"{}:?\", env),\n                suggestion: Some(format!(\n                    \"This is truthy in Python — use {} or 0 instead\",\n                    if value == \"False\" { \"False\" } else { \"True\" }\n                )),\n            });\n        }\n    }\n\n    // Check 5: Weak SECRET_KEY\n    if let Some(secret_key) = env_file.vars.get(\"SECRET_KEY\") {\n        if is_weak_secret_key(secret_key) {\n            issues.push(Issue {\n                severity: \"error\".to_string(),\n                issue_type: \"weak_secret\".to_string(),\n                variable: \"SECRET_KEY\".to_string(),\n                message: \"SECRET_KEY is too weak\".to_string(),\n                location: format!(\"{}:?\", env),\n                suggestion: Some(\"Run: openssl rand -hex 32\".to_string()),\n            });\n        }\n    }\n\n    // Check 6: localhost in Docker context\n    let has_docker = Path::new(\"docker-compose.yml\").exists()\n        || Path::new(\"docker-compose.yaml\").exists()\n        || Path::new(\"Dockerfile\").exists();\n\n    if has_docker {\n        for (key, value) in \u0026env_file.vars {\n            if value.contains(\"localhost\") \u0026\u0026 (key.contains(\"URL\") || key.contains(\"HOST\")) {\n                issues.push(Issue {\n                    severity: \"warning\".to_string(),\n                    issue_type: \"localhost_in_docker\".to_string(),\n                    variable: key.clone(),\n                    message: format!(\"{} uses localhost\", key),\n                    location: format!(\"{}:?\", env),\n                    suggestion: Some(\n                        \"In Docker, use service name instead (e.g., db:5432)\".to_string(),\n                    ),\n                });\n            }\n        }\n    }\n\n    // Create result\n    let errors = issues.iter().filter(|i| i.severity == \"error\").count();\n    let warnings = issues.iter().filter(|i| i.severity == \"warning\").count();\n    let style = issues.iter().filter(|i| i.severity == \"style\").count();\n\n    let result = ValidationResult {\n        status: if errors \u003e 0 {\n            \"failed\".to_string()\n        } else {\n            \"passed\".to_string()\n        },\n        required_present: env_file.vars.len().min(example_file.vars.len()),\n        required_total: example_file.vars.len(),\n        issues,\n        summary: Summary {\n            errors,\n            warnings,\n            style,\n        },\n    };\n\n    // Output\n    match format.as_str() {\n        \"json\" =\u003e output_json(\u0026result)?,\n        \"github-actions\" =\u003e output_github_actions(\u0026result)?,\n        _ =\u003e output_pretty(\u0026result, \u0026env_file.vars, \u0026example_file.vars)?,\n    }\n\n    // Handle --fix flag\n    if fix \u0026\u0026 result.summary.errors \u003e 0 {\n        println!(\"\\n{} Auto-fix is not yet implemented\", \"ℹ️\".cyan());\n        println!(\"  This will be added in a future version\");\n    }\n\n    // Exit code\n    if !exit_zero \u0026\u0026 result.summary.errors \u003e 0 {\n        std::process::exit(1);\n    }\n\n    Ok(())\n}\n\nfn output_pretty(\n    result: \u0026ValidationResult,\n    _env_vars: \u0026HashMap\u003cString, String\u003e,\n    _example_vars: \u0026HashMap\u003cString, String\u003e,\n) -\u003e Result\u003c()\u003e {\n    if result.issues.is_empty() {\n        println!(\n            \"{} All required variables present ({}/{})\",\n            \"✓\".green(),\n            result.required_present,\n            result.required_total\n        );\n        println!(\"{} No issues found\", \"✓\".green());\n        return Ok(());\n    }\n\n    if result.required_present == result.required_total {\n        println!(\n            \"{} All required variables present ({}/{})\",\n            \"✓\".green(),\n            result.required_present,\n            result.required_total\n        );\n    } else {\n        println!(\n            \"{} Missing {} required variables\",\n            \"✗\".red(),\n            result.required_total - result.required_present\n        );\n    }\n\n    println!(\"{} Found {} issues\\n\", \"✗\".red(), result.issues.len());\n\n    println!(\"{}\", \"Issues:\".bold());\n    for (i, issue) in result.issues.iter().enumerate() {\n        let icon = match issue.severity.as_str() {\n            \"error\" =\u003e \"🚨\",\n            \"warning\" =\u003e \"⚠️ \",\n            _ =\u003e \"ℹ️ \",\n        };\n\n        println!(\"  {}. {} {}\", i + 1, icon, issue.message);\n        if let Some(suggestion) = \u0026issue.suggestion {\n            println!(\"     → {}\", suggestion.dimmed());\n        }\n        println!(\"     Location: {}\", issue.location.dimmed());\n    }\n\n    println!(\"\\n{}\", \"Summary:\".bold());\n    if result.summary.errors \u003e 0 {\n        println!(\"  🚨 {} critical issues\", result.summary.errors);\n    }\n    if result.summary.warnings \u003e 0 {\n        println!(\"  ⚠️  {} warnings\", result.summary.warnings);\n    }\n    if result.summary.errors == 0 \u0026\u0026 result.summary.warnings == 0 {\n        println!(\"  {} 0 issues found\", \"✓\".green());\n    }\n\n    Ok(())\n}\n\nfn output_json(result: \u0026ValidationResult) -\u003e Result\u003c()\u003e {\n    let json = serde_json::to_string_pretty(result)?;\n    println!(\"{}\", json);\n    Ok(())\n}\n\nfn output_github_actions(result: \u0026ValidationResult) -\u003e Result\u003c()\u003e {\n    for issue in \u0026result.issues {\n        let level = match issue.severity.as_str() {\n            \"error\" =\u003e \"error\",\n            \"warning\" =\u003e \"warning\",\n            _ =\u003e \"notice\",\n        };\n\n        let location = issue.location.replace(\":?\", \"\");\n\n        println!(\"::{}  file={},line=1::{}\", level, location, issue.message);\n\n        if let Some(suggestion) = \u0026issue.suggestion {\n            println!(\n                \"::{}  file={},line=1::Suggestion: {}\",\n                level, location, suggestion\n            );\n        }\n    }\n    Ok(())\n}\n\nfn is_placeholder(value: \u0026str) -\u003e bool {\n    let lower = value.to_lowercase();\n\n    let placeholders = [\n        \"your_key_here\",\n        \"your_secret_here\",\n        \"your_token_here\",\n        \"change_me\",\n        \"changeme\",\n        \"replace_me\",\n        \"example\",\n        \"xxx\",\n        \"todo\",\n        \"generate-with\",\n    ];\n\n    placeholders.iter().any(|p| lower.contains(p))\n}\n\nfn is_weak_secret_key(key: \u0026str) -\u003e bool {\n    // Too short\n    if key.len() \u003c 32 {\n        return true;\n    }\n\n    // Common weak patterns\n    let weak = [\n        \"secret\", \"password\", \"dev\", \"test\", \"1234\", \"abcd\", \"changeme\",\n    ];\n\n    let lower = key.to_lowercase();\n    weak.iter().any(|w| lower.contains(w))\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_is_placeholder() {\n        assert!(is_placeholder(\"YOUR_KEY_HERE\"));\n        assert!(is_placeholder(\"generate-with-openssl\"));\n        assert!(!is_placeholder(\"sk_live_51Hrealkey\"));\n    }\n\n    #[test]\n    fn test_is_weak_secret_key() {\n        assert!(is_weak_secret_key(\"short\"));\n        assert!(is_weak_secret_key(\"this-is-a-test-secret-key-do-not-use\"));\n        assert!(is_weak_secret_key(\"devkeysecretpassword1234567890\"));\n        assert!(!is_weak_secret_key(\n            \"a7b9c4d1e8f2g5h3i6j0k9l8m7n6o5p4q3r2s1t0u9v8w7x6y5z4\"\n        ));\n    }\n}\n","traces":[{"line":45,"address":[6721711,6708864,6713215],"length":1,"stats":{"Line":0}},{"line":54,"address":[6352836],"length":1,"stats":{"Line":0}},{"line":55,"address":[6352888,6352971],"length":1,"stats":{"Line":0}},{"line":58,"address":[6879120,6879393],"length":1,"stats":{"Line":0}},{"line":59,"address":[6851453],"length":1,"stats":{"Line":0}},{"line":63,"address":[6851690],"length":1,"stats":{"Line":0}},{"line":67,"address":[6353600],"length":1,"stats":{"Line":0}},{"line":73,"address":[6851431],"length":1,"stats":{"Line":0}},{"line":74,"address":[6880025,6880082],"length":1,"stats":{"Line":0}},{"line":75,"address":[6880074],"length":1,"stats":{"Line":0}},{"line":77,"address":[6709947],"length":1,"stats":{"Line":0}},{"line":79,"address":[6710074,6721663,6710134],"length":1,"stats":{"Line":0}},{"line":80,"address":[6880092],"length":1,"stats":{"Line":0}},{"line":81,"address":[6970560,6970581],"length":1,"stats":{"Line":0}},{"line":83,"address":[6710497,6721623,6710437],"length":1,"stats":{"Line":0}},{"line":84,"address":[6880431],"length":1,"stats":{"Line":0}},{"line":85,"address":[6354254,6354345],"length":1,"stats":{"Line":0}},{"line":87,"address":[6354449],"length":1,"stats":{"Line":0}},{"line":88,"address":[6880818,6880731],"length":1,"stats":{"Line":0}},{"line":93,"address":[6354725],"length":1,"stats":{"Line":0}},{"line":96,"address":[6880709],"length":1,"stats":{"Line":0}},{"line":99,"address":[6354936,6355012],"length":1,"stats":{"Line":0}},{"line":100,"address":[6853395,6853327],"length":1,"stats":{"Line":0}},{"line":102,"addres
