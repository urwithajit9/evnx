ected_service_ids\n        .iter()\n        .filter_map(|id| reg.get_service(id))\n        .collect();\n\n    let env_example_content = EnvTemplateBuilder::new()\n        .with_stack(stack_gen)\n        .with_services(service_gens)\n        .build()?;\n\n    let env_example_path = Path::new(\u0026output_path).join(\".env.example\");\n\n    // Check if file already exists\n    if env_example_path.exists() \u0026\u0026 !yes {\n        let overwrite = Confirm::new()\n            .with_prompt(format!(\n                \"{} already exists. Overwrite?\",\n                env_example_path.display()\n            ))\n            .default(false)\n            .interact()?;\n\n        if !overwrite {\n            println!(\"{}\", \"Aborted.\".yellow());\n            return Ok(());\n        }\n    }\n\n    // Write .env.example\n    fs::write(\u0026env_example_path, env_example_content.trim())\n        .context(\"Failed to write .env.example\")?;\n\n    let var_count = env_example_content\n        .lines()\n        .filter(|line| line.contains('='))\n        .count();\n\n    println!(\n        \"{} Created .env.example with {} variables\",\n        \"✓\".green(),\n        var_count\n    );\n\n    // Create .env from template\n    create_env_file(\u0026output_path, \u0026env_example_content)?;\n\n    // Update .gitignore\n    update_gitignore(\u0026output_path)?;\n\n    // Print next steps\n    print_next_steps();\n\n    Ok(())\n}\n\nfn print_header() {\n    println!(\n        \"\\n{}\",\n        \"┌─ dotenv-space init ─────────────────────────────────┐\".cyan()\n    );\n    println!(\n        \"{}\",\n        \"│ Let's set up environment variables for your project │\".cyan()\n    );\n    println!(\n        \"{}\\n\",\n        \"└──────────────────────────────────────────────────────┘\".cyan()\n    );\n}\n\nfn resolve_stack(\n    flag: Option\u003cString\u003e,\n    yes: bool,\n    reg: \u0026crate::config::registry::GeneratorRegistry,\n) -\u003e Result\u003cString\u003e {\n    if let Some(s) = flag {\n        return Ok(s);\n    }\n\n    if yes {\n        return Ok(\"python\".to_string());\n    }\n\n    let stacks: Vec\u003c_\u003e = reg.list_stacks();\n    let display_names: Vec\u003c_\u003e = stacks\n        .iter()\n        .filter_map(|\u0026id| reg.get_stack(id).map(|g| g.display_name()))\n        .collect();\n\n    let selection = Select::new()\n        .with_prompt(\"What's your primary stack?\")\n        .items(\u0026display_names)\n        .default(0)\n        .interact()?;\n\n    Ok(stacks[selection].to_string())\n}\n\nfn resolve_services(\n    flag: Option\u003cString\u003e,\n    yes: bool,\n    reg: \u0026crate::config::registry::GeneratorRegistry,\n) -\u003e Result\u003cVec\u003cString\u003e\u003e {\n    if let Some(s) = flag {\n        return Ok(s.split(',').map(|s| s.trim().to_string()).collect());\n    }\n\n    if yes {\n        return Ok(vec![\"postgresql\".to_string(), \"redis\".to_string()]);\n    }\n\n    let services: Vec\u003c_\u003e = reg.list_services();\n    let display_names: Vec\u003c_\u003e = services\n        .iter()\n        .filter_map(|\u0026id| reg.get_service(id).map(|g| g.display_name()))\n        .collect();\n\n    let selections = MultiSelect::new()\n        .with_prompt(\"Which services will you use? (Space to select, Enter to confirm)\")\n        .items(\u0026display_names)\n        .interact()?;\n\n    Ok(selections\n        .iter()\n        .map(|\u0026idx| services[idx].to_string())\n        .collect())\n}\n\nfn resolve_output_path(default_path: String, yes: bool) -\u003e Result\u003cString\u003e {\n    if yes {\n        return Ok(default_path);\n    }\n\n    Input::new()\n        .with_prompt(\"Where should I create .env.example?\")\n        .default(default_path)\n        .interact_text()\n        .context(\"Failed to read output path\")\n}\n\nfn create_env_file(output_path: \u0026str, template_content: \u0026str) -\u003e Result\u003c()\u003e {\n    let env_path = Path::new(output_path).join(\".env\");\n\n    if !env_path.exists() {\n        let mut env_content =\n            \"# TODO: Replace all placeholder values with real credentials\\n\\n\".to_string();\n        env_content.push_str(template_content);\n\n        fs::write(\u0026env_path, env_content).context(\"Failed to write .env\")?;\n\n        println!(\n            \"{} Created .env from template (fill in real values)\",\n            \"✓\".green()\n        );\n    }\n    Ok(())\n}\n\nfn update_gitignore(output_path: \u0026str) -\u003e Result\u003c()\u003e {\n    let gitignore_path = Path::new(output_path).join(\".gitignore\");\n    let gitignore_entry = \"\\n# Environment files\\n.env\\n.env.local\\n.env.*.local\\n\";\n\n    if gitignore_path.exists() {\n        let content = fs::read_to_string(\u0026gitignore_path).context(\"Failed to read .gitignore\")?;\n\n        if !content.contains(\".env\") {\n            let mut updated = content;\n            updated.push_str(gitignore_entry);\n            fs::write(\u0026gitignore_path, updated).context(\"Failed to update .gitignore\")?;\n            println!(\"{} Added .env to .gitignore\", \"✓\".green());\n        }\n    } else {\n        fs::write(\u0026gitignore_path, gitignore_entry.trim_start())\n            .context(\"Failed to create .gitignore\")?;\n        println!(\"{} Created .gitignore\", \"✓\".green());\n    }\n    Ok(())\n}\n\nfn print_next_steps() {\n    println!(\"\\n{}\", \"Next steps:\".bold());\n    println!(\"  1. Edit .env and replace placeholder values\");\n    println!(\"  2. Never commit .env to Git\");\n    println!(\"  3. Run 'dotenv-space validate' to check for issues\");\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ajit","Documents","dotenv-space-cli","src","commands","init-backup.rs"],"content":"use anyhow::{Context, Result};\nuse colored::*;\nuse dialoguer::{Confirm, Input, MultiSelect, Select};\nuse std::fs;\nuse std::path::Path;\n\n/// Interactive project setup — generates .env.example\npub fn run(\n    stack: Option\u003cString\u003e,\n    services: Option\u003cString\u003e,\n    path: String,\n    yes: bool,\n    verbose: bool,\n) -\u003e Result\u003c()\u003e {\n    if verbose {\n        println!(\"{}\", \"Running init in verbose mode\".dimmed());\n    }\n\n    println!(\n        \"\\n{}\",\n        \"┌─ dotenv-space init ─────────────────────────────────┐\".cyan()\n    );\n    println!(\n        \"{}\",\n        \"│ Let's set up environment variables for your project │\".cyan()\n    );\n    println!(\n        \"{}\\n\",\n        \"└──────────────────────────────────────────────────────┘\".cyan()\n    );\n\n    // Determine stack (interactive or from flag)\n    let selected_stack = if let Some(s) = stack {\n        s\n    } else if yes {\n        \"python\".to_string()\n    } else {\n        let stacks = vec![\n            \"Python (Django/FastAPI)\",\n            \"Node.js (Next.js/Express)\",\n            \"Rust\",\n            \"Go\",\n            \"PHP (Laravel)\",\n            \"Other\",\n        ];\n        let selection = Select::new()\n            .with_prompt(\"What's your primary stack?\")\n            .items(\u0026stacks)\n            .default(0)\n            .interact()?;\n\n        match selection {\n            0 =\u003e \"python\",\n            1 =\u003e \"nodejs\",\n            2 =\u003e \"rust\",\n            3 =\u003e \"go\",\n            4 =\u003e \"php\",\n            _ =\u003e \"other\",\n        }\n        .to_string()\n    };\n\n    // Determine services (interactive or from flag)\n    let selected_services = if let Some(s) = services {\n        s.split(',').map(|s| s.trim().to_string()).collect()\n    } else if yes {\n        vec![\"postgresql\".to_string(), \"redis\".to_string()]\n    } else {\n        let services = vec![\n            \"PostgreSQL\",\n            \"Redis\",\n            \"MongoDB\",\n            \"AWS S3\",\n            \"Stripe\",\n            \"Twilio\",\n            \"SendGrid\",\n            \"Sentry\",\n            \"OpenAI\",\n        ];\n        let selections = MultiSelect::new()\n            .with_prompt(\"Which services will you use? (Space to select, Enter to confirm)\")\n            .items(\u0026services)\n            .interact()?;\n\n        selections\n            .iter()\n            .map(|\u0026i| services[i].to_lowercase().replace(\" \", \"_\"))\n            .collect()\n    };\n\n    // Determine output path\n    let output_path = if yes {\n        path.clone()\n    } else {\n        Input::new()\n            .with_prompt(\"Where should I create .env.example?\")\n            .default(path)\n            .interact_text()?\n    };\n\n    // Generate .env.example content\n    let env_example_content = generate_env_example(\u0026selected_stack, \u0026selected_services);\n    let env_example_path = Path::new(\u0026output_path).join(\".env.example\");\n\n    // Check if file already exists\n    if env_example_path.exists() \u0026\u0026 !yes {\n        let overwrite = Confirm::new()\n            .with_prompt(format!(\n                \"{} already exists. Overwrite?\",\n                env_example_path.display()\n            ))\n            .default(false)\n            .interact()?;\n\n        if !overwrite {\n            println!(\"{}\", \"Aborted.\".yellow());\n            return Ok(());\n        }\n    }\n\n    // Write .env.example\n    fs::write(\u0026env_example_path, env_example_content.trim())\n        .context(\"Failed to write .env.example\")?;\n\n    let var_count = env_example_content\n        .lines()\n        .filter(|l| l.contains('='))\n        .count();\n    println!(\n        \"{} Created .env.example with {} variables\",\n        \"✓\".green(),\n        var_count\n    );\n\n    // Create .env from template\n    let env_path = Path::new(\u0026output_path).join(\".env\");\n    if !env_path.exists() {\n        let mut env_content =\n            \"# TODO: Replace all placeholder values with real credentials\\n\\n\".to_string();\n        env_content.push_str(\u0026env_example_content);\n        fs::write(\u0026env_path, env_content).context(\"Failed to write .env\")?;\n        println!(\n            \"{} Created .env from template (fill in real values)\",\n            \"✓\".green()\n        );\n    }\n\n    // Update .gitignore\n    let gitignore_path = Path::new(\u0026output_path).join(\".gitignore\");\n    if gitignore_path.exists() {\n        let gitignore_content = fs::read_to_string(\u0026gitignore_path)?;\n        if !gitignore_content.contains(\".env\") {\n            let mut updated = gitignore_content;\n            updated.push_str(\"\\n# Environment files\\n.env\\n.env.local\\n.env.*.local\\n\");\n            fs::write(\u0026gitignore_path, updated)?;\n            println!(\"{} Added .env to .gitignore\", \"✓\".green());\n        }\n    } else {\n        fs::write(\n            \u0026gitignore_path,\n            \"# Environment files\\n.env\\n.env.local\\n.env.*.local\\n\",\n        )?;\n        println!(\"{} Created .gitignore\", \"✓\".green());\n    }\n\n    // Print next steps\n    println!(\"\\n{}\", \"Next steps:\".bold());\n    println!(\"  1. Edit .env and replace placeholder values\");\n    println!(\"  2. Never commit .env to Git\");\n    println!(\"  3. Run 'dotenv-space validate' to check for issues\");\n\n    Ok(())\n}\n\nfn generate_env_example(stack: \u0026str, services: \u0026[String]) -\u003e String {\n    let mut content = String::new();\n\n    // Stack-specific variables\n    match stack {\n        \"python\" =\u003e {\n            content.push_str(\"# Django/FastAPI\\n\");\n            content.push_str(\"SECRET_KEY=generate-with-openssl-rand-hex-32\\n\");\n            content.push_str(\"DEBUG=True\\n\");\n            content.push_str(\"ALLOWED_HOSTS=localhost,127.0.0.1\\n\\n\");\n        }\n        \"nodejs\" =\u003e {\n            content.push_str(\"# Node.js\\n\");\n            content.push_str(\"NODE_ENV=development\\n\");\n            content.push_str(\"PORT=3000\\n\\n\");\n        }\n        \"rust\" =\u003e {\n            content.push_str(\"# Rust\\n\");\n            content.push_str(\"APP__ENVIRONMENT=development\\n\");\n            content.push_str(\"APP__PORT=8080\\n\\n\");\n        }\n        _ =\u003e {\n            content.push_str(\"# Application\\n\");\n            content.push_str(\"APP_ENV=development\\n\\n\");\n        }\n    }\n\n    // Service-specific variables\n    for service in services {\n        match service.as_str() {\n            \"postgresql\" =\u003e {\n                content.push_str(\"# Database\\n\");\n                content\n                    .push_str(\"DATABASE_URL=postgresql://user:password@localhost:5432/dbname\\n\\n\");\n            }\n            \"redis\" =\u003e {\n                content.push_str(\"# Cache\\n\");\n                content.push_str(\"REDIS_URL=redis://localhost:6379/0\\n\\n\");\n            }\n            \"mongodb\" =\u003e {\n                content.push_str(\"# Database\\n\");\n                content.push_str(\"MONGODB_URI=mongodb://localhost:27017/mydb\\n\\n\");\n            }\n            \"aws_s3\" =\u003e {\n                content.push_str(\"# AWS S3\\n\");\n                content.push_str(\"AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE\\n\");\n                content\n                    .push_str(\"AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY\\n\");\n                content.push_str(\"AWS_STORAGE_BUCKET_NAME=your-bucket-name\\n\");\n                content.push_str(\"AWS_REGION=us-east-1\\n\\n\");\n            }\n            \"stripe\" =\u003e {\n                content.push_str(\"# Stripe\\n\");\n                content.push_str(\"STRIPE_SECRET_KEY=sk_test_YOUR_KEY_HERE\\n\");\n                content.push_str(\"STRIPE_PUBLISHABLE_KEY=pk_test_YOUR_KEY_HERE\\n\");\n                content.push_str(\"STRIPE_WEBHOOK_SECRET=whsec_YOUR_WEBHOOK_SECRET\\n\\n\");\n            }\n            \"sendgrid\" =\u003e {\n                content.push_str(\"# SendGrid\\n\");\n                content.push_str(\"SENDGRID_API_KEY=SG.YOUR_API_KEY_HERE\\n\\n\");\n            }\n            \"sentry\" =\u003e {\n                content.push_str(\"# Sentry\\n\");\n                content.push_str(\"SENTRY_DSN=https://YOUR_SENTRY_DSN@sentry.io/PROJECT_ID\\n\\n\");\n            }\n            \"openai\" =\u003e {\n                content.push_str(\"# OpenAI\\n\");\n                content.push_str(\"OPENAI_API_KEY=sk-proj-YOUR_KEY_HERE\\n\\n\");\n            }\n            _ =\u003e {}\n        }\n    }\n\n    // Add generation footer\n    content.push_str(\u0026format!(\n        \"# Generated by dotenv-space v{} on {}\\n\",\n        env!(\"CARGO_PKG_VERSION\"),\n        chrono::Local::now().format(\"%Y-%m-%d\")\n    ));\n\n    content\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ajit","Documents","dotenv-space-cli","src","commands","migrate.rs"],"content":"//! Migrate command - migrate secrets between different secret management systems\n//!\n//! # Overview\n//!\n//! Facilitates migration of secrets from .env files or environment variables\n//! to cloud secret managers like GitHub Actions, AWS Secrets Manager, Doppler, etc.\n//!\n//! # Architecture\n//!\n//! ```text\n//! Source (.env, env vars) → Load → Filter → Transform → Upload to Destination\n//! ```\n//!\n//! # Supported Sources\n//!\n//! - **env-file** - Read from .env file\n//! - **environment** - Read from current environment variables\n//!\n//! # Supported Destinations\n//!\n//! - **github-actions** - GitHub Actions Secrets (requires `migrate` feature)\n//! - **aws-secrets-manager** - AWS Secrets Manager (generates CLI commands)\n//! - **doppler** - Doppler secrets platform\n//! - **infisical** - Infisical secrets platform\n//! - **gcp-secret-manager** - Google Cloud Secret Manager (manual upload)\n//!\n//! # Features\n//!\n//! - Dry-run mode to preview changes\n//! - Conflict detection and resolution\n//! - Progress tracking with progress bars\n//! - Encrypted upload to GitHub Actions\n//! - Filtering and transformation support\n//!\n//! # Examples\n//!\n//! ```bash\n//! # Interactive migration\n//! evnx migrate\n//!\n//! # Direct migration to GitHub Actions\n//! evnx migrate \\\n//!   --from env-file \\\n//!   --to github-actions \\\n//!   --repo owner/repo \\\n//!   --source-file .env\n//!\n//! # Dry run\n//! evnx migrate --to aws-secrets-manager --dry-run\n//! ```\n\nuse anyhow::{anyhow, Context, Result};\nuse colored::*;\nuse dialoguer::{Confirm, Input, Password, Select};\nuse std::collections::HashMap;\n\n// Feature-gated imports (only when migrate feature is enabled)\n#[cfg(feature = \"migrate\")]\nuse indicatif::{ProgressBar, ProgressStyle};\n#[cfg(feature = \"migrate\")]\nuse reqwest::blocking::Client;\n#[cfg(feature = \"migrate\")]\nuse serde::{Deserialize, Serialize};\n#[cfg(feature = \"migrate\")]\nuse std::time::Duration;\n\nuse crate::core::Parser;\n\ntype MigrationDiff = (Vec\u003c(String, String)\u003e, Vec\u003cString\u003e, Vec\u003cString\u003e);\n\n// Main entry point for migrate command\n//\n// # Arguments\n//\n// * `from` - Source system (env-file, aws, gcp, environment)\n// * `to` - Destination system (github-actions, aws-secrets-manager, doppler, etc.)\n// * `source_file` - Path to source .env file\n// * `repo` - GitHub repository (owner/repo) for GitHub Actions\n// * `secret_name` - Secret name for AWS Secrets Manager\n// * `dry_run` - Preview changes without uploading\n// * `skip_existing` - Skip secrets that already exist\n// * `overwrite` - Overwrite existing secrets without prompting\n// * `github_token` - GitHub Personal Access Token\n// * `aws_profile` - AWS CLI profile to use\n// * `verbose` - Enable verbose output\n#[allow(clippy::too_many_arguments)]\npub fn run(\n    from: Option\u003cString\u003e,\n    to: Option\u003cString\u003e,\n    source_file: String,\n    repo: Option\u003cString\u003e,\n    secret_name: Option\u003cString\u003e,\n    dry_run: bool,\n    skip_existing: bool,\n    overwrite: bool,\n    github_token: Option\u003cString\u003e,\n    aws_profile: Option\u003cString\u003e,\n    verbose: bool,\n) -\u003e Result\u003c()\u003e {\n    if verbose {\n        println!(\"{}\", \"Running migrate in verbose mode\".dimmed());\n    }\n\n    // Display banner\n    print_banner();\n\n    // Determine source and destination\n    let source = from.unwrap_or_else(select_source);\n    let destination = to.unwrap_or_else(select_destination);\n\n    // Load secrets from source\n    let secrets = load_secrets(\u0026source, \u0026source_file, verbose)?;\n\n    println!(\n        \"\\n{} Loaded {} secrets from {}\",\n        \"✓\".green(),\n        secrets.len(),\n        source\n    );\n\n    if secrets.is_empty() {\n        println!(\"{} No secrets found to migrate\", \"⚠️\".yellow());\n        return Ok(());\n    }\n\n    // Migrate based on destination\n    match destination.as_str() {\n        \"github-actions\" | \"github\" =\u003e {\n            #[cfg(feature = \"migrate\")]\n            {\n                migrate_to_github_actions(\n                    \u0026secrets,\n                    repo,\n                    github_token,\n                    dry_run,\n                    skip_existing,\n                    overwrite,\n                    verbose,\n                )?;\n            }\n\n            #[cfg(not(feature = \"migrate\"))]\n            {\n                println!(\n                    \"{} GitHub Actions migration requires the migrate feature.\",\n                    \"✗\".red()\n                );\n                println!(\"Rebuild with: cargo build --features migrate\");\n                return Err(anyhow!(\"migrate feature not enabled\"));\n            }\n        }\n        \"aws-secrets-manager\" | \"aws\" =\u003e {\n            migrate_to_aws(\u0026secrets, secret_name, aws_profile, dry_run, verbose)?;\n        }\n        \"doppler\" =\u003e {\n            migrate_to_doppler(\u0026secrets, dry_run, verbose)?;\n        }\n        \"infisical\" =\u003e {\n            migrate_to_infisical(\u0026secrets, dry_run, verbose)?;\n        }\n        \"gcp-secret-manager\" | \"gcp\" =\u003e {\n            migrate_to_gcp(\u0026secrets, dry_run, verbose)?;\n        }\n        _ =\u003e {\n            return Err(anyhow!(\"Unsupported destination: {}\", destination));\n        }\n    }\n\n    Ok(())\n}\n\n// Display migration banner\nfn print_banner() {\n    println!(\n        \"\\n{}\",\n        \"┌─ Migrate secrets to a new system ───────────────────┐\".cyan()\n    );\n    println!(\n        \"{}\",\n        \"│ Move from .env to secret managers or between        │\".cyan()\n    );\n    println!(\n        \"{}\",\n        \"│ secret management systems                           │\".cyan()\n    );\n    println!(\n        \"{}\\n\",\n        \"└──────────────────────────────────────────────────────┘\".cyan()\n    );\n}\n\n// Interactive source selection\nfn select_source() -\u003e String {\n    let options = vec![\n        \"env-file - Read from .env file\",\n        \"environment - Read from environment variables\",\n    ];\n    let selection = Select::new()\n        .with_prompt(\"What are you migrating from?\")\n        .items(\u0026options)\n        .default(0)\n        .interact()\n        .unwrap_or(0);\n\n    options[selection]\n        .split('-')\n        .next()\n        .unwrap()\n        .trim()\n        .to_string()\n}\n\n// Interactive destination selection\nfn select_destination() -\u003e String {\n    let options = vec![\n        \"github-actions - GitHub Actions Secrets\",\n        \"aws-secrets-manager - AWS Secrets Manager\",\n        \"doppler - Doppler secrets platform\",\n        \"infisical - Infisical secrets platform\",\n        \"gcp-secret-manager - Google Cloud Secret Manager\",\n    ];\n    let selection = Select::new()\n        .with_prompt(\"What are you migrating to?\")\n        .items(\u0026options)\n        .default(0)\n        .interact()\n        .unwrap_or(0);\n\n    options[selection]\n        .split('-')\n        .next()\n        .unwrap()\n        .trim()\n        .to_string()\n}\n\n// Load secrets from source\nfn load_secrets(source: \u0026str, file: \u0026str, verbose: bool) -\u003e Result\u003cHashMap\u003cString, String\u003e\u003e {\n    if verbose {\n        println!(\"Loading secrets from {} ({})\", source, file);\n    }\n\n    match source {\n        \"env-file\" | \"env\" =\u003e {\n            let parser = Parser::default();\n            let env_file = parser\n                .parse_file(file)\n                .with_context(|| format!(\"Failed to parse {}\", file))?;\n            Ok(env_file.vars)\n        }\n        \"environment\" =\u003e {\n            let mut secrets = HashMap::new();\n            for (key, value) in std::env::vars() {\n                // Skip common system variables\n                if !is_system_variable(\u0026key) {\n                    secrets.insert(key, value);\n                }\n            }\n            Ok(secrets)\n        }\n        _ =\u003e Err(anyhow!(\"Unsupported source: {}\", source)),\n    }\n}\n\n// Check if a variable is a common system variable\nfn is_system_variable(key: \u0026str) -\u003e bool {\n    matches!(\n        key,\n        \"PATH\" | \"HOME\" | \"USER\" | \"SHELL\" | \"PWD\" | \"TERM\" | \"LANG\" | \"LOGNAME\"\n    )\n}\n\n// Migrate to GitHub Actions Secrets\n//\n// Uses GitHub REST API to upload secrets with proper encryption\n#[cfg(feature = \"migrate\")]\n#[allow(clippy::too_many_arguments)]\nfn migrate_to_github_actions(\n    secrets: \u0026HashMap\u003cString, String\u003e,\n    repo: Option\u003cString\u003e,\n    token: Option\u003cString\u003e,\n    dry_run: bool,\n    skip_existing: bool,\n    overwrite: bool,\n    verbose: bool,\n) -\u003e Result\u003c()\u003e {\n    println!(\"\\n{} Migrating to GitHub Actions\", \"🚀\".cyan());\n\n    // Get repository\n    let repository = repo\n        .or_else(|| {\n            Input::new()\n                .with_prompt(\"GitHub repository (owner/repo)\")\n                .interact_text()\n                .ok()\n        })\n        .ok_or_else(|| anyhow!(\"Repository is required\"))?;\n\n    // Validate repository format\n    if !repository.contains('/') {\n        return Err(anyhow!(\n            \"Repository must be in format 'owner/repo', got: {}\",\n            repository\n        ));\n    }\n\n    // Get GitHub token\n    let github_token = token\n        .or_else(|| std::env::var(\"GITHUB_TOKEN\").ok())\n        .or_else(|| {\n            Password::new()\n                .with_prompt(\"GitHub Personal Access Token\")\n                .interact()\n                .ok()\n        })\n        .ok_or_else(|| anyhow!(\"GitHub token is required\"))?;\n\n    println!(\"\\n{} Analyzing migration...\", \"🔍\".cyan());\n\n    // Check existing secrets\n    let existing_secrets = if !dry_run {\n        fetch_existing_github_secrets(\u0026repository, \u0026github_token, verbose)?\n    } else {\n        vec![]\n    };\n\n    // Plan migration\n    let (to_upload, to_skip, conflicts) =\n        plan_migration(secrets, \u0026existing_secrets, skip_existing, overwrite)?;\n\n    // Show migration plan\n    print_migration_plan(\n        secrets.len(),\n        \u0026existing_secrets,\n        \u0026to_upload,\n        \u0026to_skip,\n        \u0026conflicts,\n    );\n\n    if dry_run {\n        println!(\"\\n{} Dry run mode - no changes made\", \"ℹ️\".cyan());\n        return Ok(());\n    }\n\n    // Confirm migration\n    println!();\n    if !Confirm::new()\n        .with_prompt(\"Proceed with migration?\")\n        .default(true)\n        .interact()?\n    {\n        println!(\"{} Migration cancelled\", \"ℹ️\".cyan());\n        return Ok(());\n    }\n\n    // Upload secrets\n    let (uploaded, failed) =\n        upload_secrets_to_github(\u0026repository, \u0026github_token, \u0026to_upload, verbose)?;\n\n    // Print summary\n    print_upload_summary(uploaded, to_upload.len(), \u0026to_skip, failed);\n\n    Ok(())\n}\n\n// Plan the migration (which secrets to upload, skip, or have conflicts)\n#[cfg(feature = \"migrate\")]\nfn plan_migration(\n    secrets: \u0026HashMap\u003cString, String\u003e,\n    existing_secrets: \u0026[String],\n    skip_existing: bool,\n    overwrite: bool,\n) -\u003e Result\u003cMigrationDiff\u003e {\n    let mut to_upload = Vec::new();\n    let mut to_skip = Vec::new();\n    let mut conflicts = Vec::new();\n\n    for (key, value) in secrets {\n        if existing_secrets.contains(key) {\n            if skip_existing {\n                to_skip.push(key.clone());\n            } else if overwrite {\n                to_upload.push((key.clone(), value.clone()));\n                conflicts.push(key.clone());\n            } else {\n                // Ask user\n                if Confirm::new()\n                    .with_prompt(format!(\"Overwrite existing secret '{}'?\", key))\n                    .default(false)\n                    .interact()?\n                {\n                    to_upload.push((key.clone(), value.clone()));\n                    conflicts.push(key.clone());\n                } else {\n                    to_skip.push(key.clone());\n                }\n            }\n        } else {\n            to_upload.push((key.clone(), value.clone()));\n        }\n    }\n\n    Ok((to_upload, to_skip, conflicts))\n}\n\n// Print migration plan\n#[cfg(feature = \"migrate\")]\nfn print_migration_plan(\n    total_secrets: usize,\n    existing_secrets: \u0026[String],\n    to_upload: \u0026[(String, String)],\n    to_skip: \u0026[String],\n    conflicts: \u0026[String],\n) {\n    println!(\n        \"\\n{} Read {} variables from source\",\n        \"✓\".green(),\n        total_secrets\n    );\n\n    if !existing_secrets.is_empty() {\n        println!(\n            \"{} Repository has {} existing secrets\",\n            \"ℹ️\".cyan(),\n            existing_secrets.len()\n        );\n    }\n\n    println!(\"\\n{}\", \"Migration plan:\".bold());\n    println!(\"  • {} secrets to upload\", to_upload.len());\n\n    if !to_skip.is_empty() {\n        println!(\"  • {} existing secrets will be skipped\", to_skip.len());\n    }\n\n    if !conflicts.is_empty() {\n        println!(\"  • {} conflicts (will overwrite)\", conflicts.len());\n    }\n}\n\n// Upload secrets to GitHub with progress tracking\n#[cfg(feature = \"migrate\")]\nfn upload_secrets_to_github(\n    repository: \u0026str,\n    github_token: \u0026str,\n    to_upload: \u0026[(String, String)],\n    verbose: bool,\n) -\u003e Result\u003c(usize, usize)\u003e {\n    println!(\"\\n{} Uploading to GitHub Actions Secrets...\", \"📤\".cyan());\n\n    let pb = ProgressBar::new(to_upload.len() as u64);\n    pb.set_style(\n        ProgressStyle::default_bar()\n            .template(\"{spinner:.green} [{bar:40.cyan/blue}] {pos}/{len} {msg}\")\n            .unwrap()\n            .progress_chars(\"#\u003e-\"),\n    );\n\n    let mut uploaded = 0;\n    let mut failed = 0;\n\n    for (key, value) in to_upload {\n        pb.set_message(key.clone());\n\n        match upload_github_secret(repository, github_token, key, value, verbose) {\n            Ok(()) =\u003e {\n                uploaded += 1;\n                pb.println(format!(\"  {} {}\", \"✓\".green(), key));\n            }\n            Err(e) =\u003e {\n                failed += 1;\n                pb.println(format!(\"  {} {} - {}\", \"✗\".red(), key, e));\n            }\n        }\n\n        pb.inc(1);\n        std::thread::sleep(Duration::from_millis(100)); // Rate limiting\n    }\n\n    pb.finish_with_message(\"Done\");\n\n    Ok((uploaded, failed))\n}\n\n// Print upload summary\n#[cfg(feature = \"migrate\")]\nfn print_upload_summary(uploaded: usize, total: usize, skipped: \u0026[String], failed: usize) {\n    println!(\"\\n{}\", \"Summary:\".bold());\n    println!(\"  {}/{} secrets uploaded successfully\", uploaded, total);\n\n    if !skipped.is_empty() {\n        println!(\"  {} existing secrets preserved\", skipped.len());\n    }\n\n    if failed \u003e 0 {\n        println!(\"  {} errors\", failed);\n    }\n\n    if uploaded \u003e 0 {\n        println!(\"\\n{}\", \"Next steps:\".bold());\n        println!(\"  1. Update GitHub Actions workflows to use these secrets\");\n        println!(\"  2. Delete or encrypt your local .env file\");\n        println!(\"  3. Update .env.example if variable names changed\");\n    }\n}\n\n// Fetch existing GitHub secrets\n#[cfg(feature = \"migrate\")]\nfn fetch_existing_github_secrets(repo: \u0026str, token: \u0026str, verbose: bool) -\u003e Result\u003cVec\u003cString\u003e\u003e {\n    if verbose {\n        println!(\"Fetching existing secrets from {}\", repo);\n    }\n\n    let url = format!(\"https://api.github.com/repos/{}/actions/secrets\", repo);\n\n    let client = Client::new();\n    let response = client\n        .get(\u0026url)\n        .header(\"Authorization\", format!(\"Bearer {}\", token))\n        .header(\"Accept\", \"application/vnd.github.v3+json\")\n        .header(\"User-Agent\", \"evnx\")\n        .send()\n        .context(\"Failed to fetch existing secrets\")?;\n\n    if !response.status().is_success() {\n        return Err(anyhow!(\n            \"GitHub API error: {} - {}\",\n            response.status(),\n            response.text().unwrap_or_default()\n        ));\n    }\n\n    #[derive(Deserialize)]\n    struct SecretsResponse {\n        secrets: Vec\u003cSecretItem\u003e,\n    }\n\n    #[derive(Deserialize)]\n    struct SecretItem {\n        name: String,\n    }\n\n    let secrets_response: SecretsResponse = response.json()?;\n    Ok(secrets_response\n        .secrets\n        .iter()\n        .map(|s| s.name.clone())\n        .collect())\n}\n\n// Upload a single secret to GitHub Actions\n#[cfg(feature = \"migrate\")]\nfn upload_github_secret(\n    repo: \u0026str,\n    token: \u0026str,\n    key: \u0026str,\n    value: \u0026str,\n    verbose: bool,\n) -\u003e Result\u003c()\u003e {\n    if verbose {\n        println!(\"Uploading secret: {}\", key);\n    }\n\n    // Get public key for encryption\n    let public_key = fetch_github_public_key(repo, token)?;\n\n    // Encrypt the value\n    let encrypted_value = encrypt_for_github(\u0026public_key.key, value)?;\n\n    // Upload the encrypted secret\n    let url = format!(\n        \"https://api.github.com/repos/{}/actions/secrets/{}\",\n        repo, key\n    );\n\n    #[derive(Serialize)]\n    struct SecretPayload {\n        encrypted_value: String,\n        key_id: String,\n    }\n\n    let payload = SecretPayload {\n        encrypted_value,\n        key_id: public_key.key_id,\n    };\n\n    let client = Client::new();\n    let response = client\n        .put(\u0026url)\n        .header(\"Authorization\", format!(\"Bearer {}\", token))\n        .header(\"Accept\", \"application/vnd.github.v3+json\")\n        .header(\"User-Agent\", \"evnx\")\n        .json(\u0026payload)\n        .send()?;\n\n    if response.status().is_success() || response.status() == reqwest::StatusCode::CREATED {\n        Ok(())\n    } else {\n        Err(anyhow!(\n            \"Upload failed: {} - {}\",\n            response.status(),\n            response.text().unwrap_or_default()\n        ))\n    }\n}\n\n// Fetch GitHub repository's public key for encryption\n#[cfg(feature = \"migrate\")]\nfn fetch_github_public_key(repo: \u0026str, token: \u0026str) -\u003e Result\u003cPublicKey\u003e {\n    let pub_key_url = format!(\n        \"https://api.github.com/repos/{}/actions/secrets/public-key\",\n        repo\n    );\n\n    let client = Client::new();\n    let pub_key_response = client\n        .get(\u0026pub_key_url)\n        .header(\"Authorization\", format!(\"Bearer {}\", token))\n        .header(\"Accept\", \"application/vnd.github.v3+json\")\n        .header(\"User-Agent\", \"evnx\")\n        .send()?;\n\n    if !pub_key_response.status().is_success() {\n        return Err(anyhow!(\n            \"Failed to get public key: {}\",\n            pub_key_response.status()\n        ));\n    }\n\n    pub_key_response\n        .json()\n        .context(\"Failed to parse public key\")\n}\n\n#[cfg(feature = \"migrate\")]\n#[derive(Deserialize)]\nstruct PublicKey {\n    key_id: String,\n    key: String,\n}\n\n// Encrypt value for GitHub Actions using libsodium sealed box\n//\n// NOTE: This is a simplified implementation. Production should use proper\n// libsodium sealed box encryption (requires sodium-oxide or similar crate)\n#[cfg(feature = \"migrate\")]\nfn encrypt_for_github(public_key_base64: \u0026str, value: \u0026str) -\u003e Result\u003cString\u003e {\n    use base64::{engine::general_purpose, Engine as _};\n\n    // Decode the public key\n    let _public_key = general_purpose::STANDARD\n        .decode(public_key_base64)\n        .context(\"Failed to decode public key\")?;\n\n    // TODO: Replace with proper libsodium sealed box encryption\n    // For now, this is a placeholder that base64 encodes the value\n    // In production, this should use sodium_oxide or sodiumoxide crate\n    // to do proper public key encryption\n\n    let encrypted = general_purpose::STANDARD.encode(value.as_bytes());\n\n    Ok(encrypted)\n}\n\n// Migrate to AWS Secrets Manager\nfn migrate_to_aws(\n    secrets: \u0026HashMap\u003cString, String\u003e,\n    secret_name: Option\u003cString\u003e,\n    aws_profile: Option\u003cString\u003e,\n    dry_run: bool,\n    verbose: bool,\n) -\u003e Result\u003c()\u003e {\n    if verbose {\n        println!(\"Preparing AWS Secrets Manager migration\");\n    }\n\n    println!(\"\\n{} AWS Secrets Manager migration\", \"☁️\".cyan());\n\n    let name = secret_name.unwrap_or_else(|| {\n        Input::new()\n            .with_prompt(\"Secret name (e.g., prod/myapp/config)\")\n            .with_initial_text(\"prod/myapp/config\")\n            .interact_text()\n            .unwrap_or_else(|_| \"prod/myapp/config\".to_string())\n    });\n\n    let json = serde_json::to_string_pretty(secrets)?;\n\n    if dry_run {\n        println!(\"\\n{}\", \"Would upload to AWS Secrets Manager:\".bold());\n        println!(\"Secret name: {}\", name);\n        println!(\"Secrets count: {}\", secrets.len());\n        println!(\"\\nJSON payload preview (first 500 chars):\");\n        println!(\"{}\", \u0026json.chars().take(500).collect::\u003cString\u003e());\n        if json.len() \u003e 500 {\n            println!(\"... ({} more characters)\", json.len() - 500);\n        }\n        return Ok(());\n    }\n\n    println!(\"\\n{}\", \"Run these commands to upload:\".bold());\n    println!();\n\n    let profile_flag = aws_profile\n        .map(|p| format!(\"--profile {} \", p))\n        .unwrap_or_default();\n\n    // Create secret\n    println!(\"{}\", \"# Create new secret:\".dimmed());\n    println!(\"aws secretsmanager create-secret \\\\\");\n    println!(\"  {}--name {} \\\\\", profile_flag, name);\n    println!(\"  --secret-string '{}'\", json.replace('\\'', \"\\\\'\"));\n    println!();\n\n    // Update secret\n    println!(\"{}\", \"# Or update existing secret:\".dimmed());\n    println!(\"aws secretsmanager update-secret \\\\\");\n    println!(\"  {}--secret-id {} \\\\\", profile_flag, name);\n    println!(\"  --secret-string '{}'\", json.replace('\\'', \"\\\\'\"));\n\n    Ok(())\n}\n\n// Migrate to Doppler\nfn migrate_to_doppler(\n    secrets: \u0026HashMap\u003cString, String\u003e,\n    dry_run: bool,\n    verbose: bool,\n) -\u003e Result\u003c()\u003e {\n    if verbose {\n        println!(\"Preparing Doppler migration\");\n    }\n\n    println!(\"\\n{} Doppler migration\", \"🔐\".cyan());\n    println!(\"{} Requires Doppler CLI\", \"ℹ️\".cyan());\n    println!(\"Install: https://docs.doppler.com/docs/cli\");\n\n    if dry_run {\n        println!(\"\\n{}\", \"Would upload to Doppler:\".bold());\n        println!(\"Secrets count: {}\", secrets.len());\n        return Ok(());\n    }\n\n    // Check if doppler CLI is installed\n    if std::process::Command: ,"address":[6744247,6744324],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":10},{"path":["/","home","ajit","Documents","dotenv-space-cli","src","commands","restore.rs"],"content":"//! Restore command — decrypt a backup created by the `backup` command.\n//!\n//! # Overview\n//!\n//! Reads a Base64-encoded AES-256-GCM backup file, derives the decryption key\n//! from the user-supplied password using Argon2id, decrypts the payload, and\n//! writes the recovered `.env` content to disk.\n//!\n//! # Safety behaviours\n//!\n//! ## Overwrite protection\n//!\n//! If the output file already exists the user is **always prompted** before it\n//! is overwritten. There is no `--force` flag — this is intentional. The `.env`\n//! file is sensitive; an accidental overwrite is difficult to undo and could\n//! destroy credentials that are not backed up anywhere else.\n//!\n//! ## Validation failure fallback\n//!\n//! If the decrypted content does not look like a valid `.env` file (checked\n//! heuristically — see [`looks_like_dotenv`]) the command writes the content\n//! to `\u003coutput\u003e.restored` instead of `\u003coutput\u003e`. This lets the user inspect\n//! the raw content without risking damage to a live `.env` file.\n//!\n//! # Example\n//!\n//! ```bash\n//! evnx restore .env.backup\n//! evnx restore .env.backup --output .env.production\n//! ```\n//!\n//! # Future work\n//!\n//! - `--dry-run` flag: decrypt and validate but do not write anything.\n//! - `--print` flag: decrypt and emit to stdout (useful for piping).\n//! - `--diff` flag: show a unified diff between backup content and current file.\n//! - Support for asymmetric (public-key) backups once `--recipient` is added\n//!   to the `backup` command.\n\nuse anyhow::{anyhow, Context, Result};\nuse colored::*;\n\n/// Entry point for the `restore` subcommand.\n///\n/// When the `backup` feature is **not** enabled this prints a helpful message\n/// and exits cleanly — it does **not** panic or return an error.\n///\n/// # Arguments\n///\n/// * `backup`  — Path to the `.backup` file created by `evnx backup`.\n/// * `output`  — Desired destination path for the restored file (default `.env`).\n///   If decrypted content fails `.env` validation this path receives\n///   a `.restored` suffix to avoid overwriting a live file with\n///   potentially corrupt content.\n/// * `verbose` — Print extra diagnostic information during the run.\npub fn run(backup: String, output: String, verbose: bool) -\u003e Result\u003c()\u003e {\n    // ── Feature-disabled stub ────────────────────────────────────────────────\n    #[cfg(not(feature = \"backup\"))]\n    {\n        // Reference all parameters to silence unused-variable warnings in\n        // the non-feature build without renaming them.\n        let _ = (\u0026backup, \u0026output, verbose);\n        println!(\"{} Backup/restore feature not enabled\", \"✗\".red());\n        println!(\"Rebuild with: cargo build --features backup\");\n        return Ok(());\n    }\n\n    // ── Full implementation (feature = \"backup\") ─────────────────────────────\n    #[cfg(feature = \"backup\")]\n    {\n        use crate::commands::backup::decrypt_content;\n        use dialoguer::{Confirm, Password};\n        use std::fs;\n        use std::path::Path;\n\n        if verbose {\n            println!(\"{}\", \"Running restore in verbose mode\".dimmed());\n        }\n\n        println!(\n            \"\\n{}\",\n            \"┌─ Restore from encrypted backup ─────────────────────┐\".cyan()\n        );\n        println!(\n            \"{}\",\n            \"│ Your backup will be decrypted with AES-256-GCM      │\".cyan()\n        );\n        println!(\n            \"{}\\n\",\n            \"└──────────────────────────────────────────────────────┘\".cyan()\n        );\n\n        // ── Validate backup file exists ──────────────────────────────────────\n        if !Path::new(\u0026backup).exists() {\n            return Err(anyhow!(\"Backup file not found: {}\", backup));\n        }\n\n        let encoded = fs::read_to_string(\u0026backup)\n            .with_context(|| format!(\"Failed to read backup file: {}\", backup))?;\n\n        println!(\"{} Read backup from {}\", \"✓\".green(), backup);\n\n        // ── Password prompt ──────────────────────────────────────────────────\n        // No echo — the password is never displayed or logged.\n        let password = Password::new()\n            .with_prompt(\"Enter decryption password\")\n            .interact()?;\n\n        if password.is_empty() {\n            return Err(anyhow!(\"Password must not be empty\"));\n        }\n\n        // ── Decrypt ──────────────────────────────────────────────────────────\n        println!(\"Decrypting… (Argon2id key derivation in progress)\");\n\n        let (content, metadata) = decrypt_content(\u0026encoded, \u0026password).context(\"Restore failed\")?;\n\n        println!(\"{} Decryption successful\", \"✓\".green());\n\n        // ── Display metadata ─────────────────────────────────────────────────\n        // Always show metadata so the user can confirm this is the right backup\n        // before any file is written.\n        println!(\"\\n{}\", \"Backup information:\".bold());\n        println!(\"  Original file : {}\", metadata.original_file);\n        println!(\"  Created at    : {}\", metadata.created_at);\n        println!(\"  Tool version  : evnx v{}\", metadata.tool_version);\n        println!(\"  Variables     : {}\", count_vars(\u0026content));\n\n        // ── Validation — choose write path ───────────────────────────────────\n        // If the decrypted content does not look like a .env file we redirect\n        // to a `.restored` fallback rather than aborting. This allows the user\n        // to inspect the content and decide what to do with it, while keeping\n        // the live .env file untouched.\n        let write_path: String = if looks_like_dotenv(\u0026content) {\n            output.clone()\n        } else {\n            let fallback = format!(\"{}.restored\", output);\n            println!(\n                \"\\n{} Decrypted content does not look like a valid .env file.\",\n                \"⚠️\".yellow()\n            );\n            println!(\n                \"  Writing to {} instead of {} to protect your current file.\",\n                fallback, output\n            );\n            println!(\"  Inspect the file manually, then rename it if the content is correct:\");\n            println!(\"    mv {} {}\", fallback, output);\n            fallback\n        };\n\n        // ── Overwrite protection — always prompt ─────────────────────────────\n        // There is intentionally no --force flag. Overwriting a live .env\n        // without confirmation is far too easy to do accidentally, and the\n        // consequences (lost credentials) are hard to undo.\n        if Path::new(\u0026write_path).exists() {\n            println!(\n                \"\\n{} Output file already exists: {}\",\n                \"⚠️\".yellow(),\n                write_path\n            );\n\n            let overwrite = Confirm::new()\n                .with_prompt(format!(\"Overwrite {}?\", write_path))\n                .default(false)\n                .interact()?;\n\n            if !overwrite {\n                println!(\"{} Restore cancelled. No files were modified.\", \"ℹ️\".cyan());\n                println!(\"  Tip: use --output \u003cpath\u003e to restore to a different location.\");\n                return Ok(());\n            }\n        }\n\n        // ── Write ─────────────────────────────────────────────────────────────\n        fs::write(\u0026write_path, \u0026content)\n            .with_context(|| format!(\"Failed to write restored file to {}\", write_path))?;\n\n        println!(\n            \"\\n{} Restored {} variables to {}\",\n            \"✓\".green(),\n            count_vars(\u0026content),\n            write_path\n        );\n\n        // Context-aware next steps depending on whether we used the fallback.\n        println!(\"\\n{}\", \"Next steps:\".bold());\n        if write_path == output {\n            println!(\"  1. Run: evnx validate --env {}\", write_path);\n            println!(\"  2. Verify your application starts correctly\");\n            println!(\"  3. Delete the backup file once you have confirmed the restore\");\n        } else {\n            // Fallback path was used — guide the user through inspection.\n            println!(\"  1. Inspect the restored file: cat {}\", write_path);\n            println!(\n                \"  2. If the content is correct, rename it: mv {} {}\",\n                write_path, output\n            );\n            println!(\"  3. Run: evnx validate --env {}\", output);\n        }\n\n        Ok(())\n    }\n}\n\n// ── Helpers ───────────────────────────────────────────────────────────────────\n\n/// Count the number of `KEY=VALUE` variable assignments in a `.env` string.\n///\n/// Comments (`#`) and blank lines are excluded from the count.\nfn count_vars(content: \u0026str) -\u003e usize {\n    content\n        .lines()\n        .filter(|line| {\n            let l = line.trim();\n            !l.is_empty() \u0026\u0026 !l.starts_with('#') \u0026\u0026 l.contains('=')\n        })\n        .count()\n}\n\n/// Heuristically check whether `content` resembles a `.env` file.\n///\n/// A file passes if at least **80%** of its non-empty lines are one of:\n/// - blank lines,\n/// - comment lines beginning with `#`, or\n/// - `KEY=VALUE` assignments where KEY contains only alphanumerics and `_`.\n///\n/// The 80% threshold is intentionally lenient — its purpose is to detect\n/// obviously wrong content (binary blobs, PDFs, prose) rather than to\n/// enforce strict `.env` grammar.\n///\n/// \u003e **Note:** This function is duplicated from `backup.rs` to keep `restore.rs`\n/// \u003e self-contained. If the heuristic needs updating, change both copies.\nfn looks_like_dotenv(content: \u0026str) -\u003e bool {\n    if content.trim().is_empty() {\n        return true;\n    }\n\n    let valid_line = |line: \u0026str| -\u003e bool {\n        let line = line.trim();\n        line.is_empty()\n            || line.starts_with('#')\n            || line\n                .split_once('=')\n                .map(|(key, _)| {\n                    !key.trim().is_empty()\n                        \u0026\u0026 key.trim().chars().all(|c| c.is_alphanumeric() || c == '_')\n                })\n                .unwrap_or(false)\n    };\n\n    let non_empty: Vec\u003c\u0026str\u003e = content.lines().filter(|l| !l.trim().is_empty()).collect();\n    if non_empty.is_empty() {\n        return true;\n    }\n    let valid_count = non_empty.iter().filter(|\u0026\u0026l| valid_line(l)).count();\n    // Equivalent to valid_count / total \u003e= 0.8 without floating point.\n    valid_count * 10 \u003e= non_empty.len() * 8\n}\n\n// ── Tests ─────────────────────────────────────────────────────────────────────\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_count_vars_normal() {\n        let content = \"# Comment\\nKEY=value\\nOTHER=123\\n\\n# Another\\nFOO=bar\\n\";\n        assert_eq!(count_vars(content), 3);\n    }\n\n    #[test]\n    fn test_count_vars_empty() {\n        assert_eq!(count_vars(\"\"), 0);\n        assert_eq!(count_vars(\"# Only comments\\n\\n\"), 0);\n    }\n\n    #[test]\n    fn test_count_vars_only_assignments() {\n        assert_eq!(count_vars(\"A=1\\nB=2\\nC=3\\n\"), 3);\n    }\n\n    #[test]\n    fn test_looks_like_dotenv_valid() {\n        assert!(looks_like_dotenv(\"KEY=value\\nOTHER=123\\n# comment\\n\"));\n    }\n\n    #[test]\n    fn test_looks_like_dotenv_empty() {\n        assert!(looks_like_dotenv(\"\"));\n        assert!(looks_like_dotenv(\"   \\n  \"));\n    }\n\n    #[test]\n    fn test_looks_like_dotenv_rejects_prose() {\n        // Zero KEY=VALUE lines — well below the 80% threshold.\n        assert!(!looks_like_dotenv(\n            \"This is a plain text file.\\nIt contains no env vars.\\nNone at all.\"\n        ));\n    }\n\n    #[test]\n    fn test_looks_like_dotenv_tolerates_some_noise() {\n        // 4 valid lines, 1 invalid → 80% valid → should pass.\n        let content = \"KEY=value\\nOTHER=123\\n# comment\\nFOO=bar\\nnot-a-valid-line\\n\";\n        assert!(looks_like_dotenv(content));\n    }\n\n    #[test]\n    fn test_looks_like_dotenv_rejects_too_much_noise() {\n        // 2 valid, 4 invalid → 33% valid → below threshold.\n        let content = \"KEY=value\\nFOO=bar\\nnot valid\\nalso invalid\\nstill wrong\\nnope\\n\";\n        assert!(!looks_like_dotenv(content));\n    }\n}\n","traces":[{"line":56,"address":[5540376,5540016],"length":1,"stats":{"Line":0}},{"line":63,"address":[5540044,5540118],"length":1,"stats":{"Line":0}},{"line":64,"address":[5540256],"length":1,"stats":{"Line":0}},{"line":210,"address":[5539424],"length":1,"stats":{"Line":3}},{"line":213,"address":[6107888],"length":1,"stats":{"Line":6}},{"line":214,"address":[6107902],"length":1,"stats":{"Line":3}},{"line":215,"address":[6142851],"length":1,"stats":{"Line":3}},{"line":233,"address":[5539993,5539999,5539504],"length":1,"stats":{"Line":1}},{"line":234,"address":[5539537],"length":1,"stats":{"Line":2}},{"line":235,"address":[5539648],"length":1,"stats":{"Line":1}},{"line":238,"address":[5976592],"length":1,"stats":{"Line":4}},{"line":239,"address":[6108077],"length":1,"stats":{"Line":4}},{"line":240,"address":[6143056,6143020],"length":1,"stats":{"Line":6}},{"line":241,"address":[6108127],"length":1,"stats":{"Line":4}},{"line":243,"address":[6143073],"length":1,"stats":{"Line":4}},{"line":244,"address":[6108327,6108177,6108320],"length":1,"stats":{"Line":10}},{"line":245,"address":[6143266,6143341],"length":1,"stats":{"Line":3}},{"line":246,"address":[5977036,5976944,5977008],"length":1,"stats":{"Line":9}},{"line":248,"address":[6108188],"length":1,"stats":{"Line":1}},{"line":251,"address":[6108272,6108286],"length":1,"stats":{"Line":7}},{"line":252,"address":[5539703,5539633],"length":1,"stats":{"Line":7}},{"line":253,"address":[5539735],"length":1,"stats":{"Line":0}},{"line":255,"address":[5976797,5976784],"length":1,"stats":{"Line":16}},{"line":257,"address":[5539850,5539961],"length":1,"stats":{"Line":1}}],"covered":20,"coverable":24},{"path":["/","home","ajit","Documents","dotenv-space-cli","src","commands","scan.rs"],"content":"/// Secret scanning command\n///\n/// Scans files for accidentally committed secrets using pattern matching\n/// and entropy analysis. Outputs findings with confidence levels and\n/// remediation steps.\nuse anyhow::Result;\nuse colored::*;\nuse serde::{Deserialize, Serialize};\n// use std::collections::HashMap;\nuse std::fs;\nuse std::path::{Path, PathBuf};\nuse walkdir::WalkDir;\n\nuse crate::core::Parser;\nuse crate::utils::patterns::{detect_secret, Confidence};\n\n/// A detected secret\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Finding {\n    pub pattern: String,\n    pub confidence: String,\n    pub value_preview: String,\n    pub location: String,\n    pub variable: Option\u003cString\u003e,\n    pub action_url: Option\u003cString\u003e,\n}\n\n/// Scan results\n#[derive(Debug, Serialize, Deserialize)]\npub struct ScanResults {\n    pub files_scanned: usize,\n    pub secrets_found: usize,\n    pub findings: Vec\u003cFinding\u003e,\n    pub high_confidence: usize,\n    pub medium_confidence: usize,\n    pub low_confidence: usize,\n}\n\n/// Run the scan command\npub fn run(\n    paths: Vec\u003cString\u003e,\n    exclude: Vec\u003cString\u003e,\n    _pattern: Vec\u003cString\u003e,\n    ignore_placeholders: bool,\n    format: String,\n    exit_zero: bool,\n    verbose: bool,\n) -\u003e Result\u003c()\u003e {\n    if verbose {\n        println!(\"{}\", \"Running scan in verbose mode\".dimmed());\n    }\n\n    println!(\n        \"\\n{}\",\n        \"┌─ Scanning for exposed secrets ──────────────────────┐\".cyan()\n    );\n    println!(\n        \"{}\",\n        \"│ Checking for real-looking credentials               │\".cyan()\n    );\n    println!(\n        \"{}\\n\",\n        \"└──────────────────────────────────────────────────────┘\".cyan()\n    );\n\n    // Collect files to scan\n    let files = collect_files(\u0026paths, \u0026exclude)?;\n\n    if verbose {\n        println!(\"Scanning {} files...\", files.len());\n    }\n\n    let mut results = ScanResults {\n        files_scanned: files.len(),\n        secrets_found: 0,\n        findings: Vec::new(),\n        high_confidence: 0,\n        medium_confidence: 0,\n        low_confidence: 0,\n    };\n\n    // Scan each file\n    for file in \u0026files {\n        if verbose {\n            println!(\"  Scanning: {}\", file.display());\n        }\n        scan_file(file, \u0026mut results, ignore_placeholders)?;\n    }\n\n    // Output results\n    match format.as_str() {\n        \"json\" =\u003e output_json(\u0026results)?,\n        \"sarif\" =\u003e output_sarif(\u0026results)?,\n        _ =\u003e output_pretty(\u0026results, \u0026files)?,\n    }\n\n    // Exit code\n    if !exit_zero \u0026\u0026 results.secrets_found \u003e 0 {\n        std::process::exit(1);\n    }\n\n    Ok(())\n}\n\n/// Collect files to scan\nfn collect_files(paths: \u0026[String], exclude: \u0026[String]) -\u003e Result\u003cVec\u003cPathBuf\u003e\u003e {\n    let mut files = Vec::new();\n\n    for path_str in paths {\n        let path = Path::new(path_str);\n\n        if path.is_file() {\n            if !should_exclude(path, exclude) {\n                files.push(path.to_path_buf());\n            }\n        } else if path.is_dir() {\n            for entry in WalkDir::new(path)\n                .follow_links(false)\n                .into_iter()\n                .filter_map(|e| e.ok())\n            {\n                let entry_path = entry.path();\n                if entry_path.is_file() \u0026\u0026 !should_exclude(entry_path, exclude) {\n                    // Only scan text-like files\n                    if is_scannable_file(entry_path) {\n                        files.push(entry_path.to_path_buf());\n                    }\n                }\n            }\n        }\n    }\n\n    Ok(files)\n}\n\n/// Check if a file should be excluded\nfn should_exclude(path: \u0026Path, exclude: \u0026[String]) -\u003e bool {\n    let path_str = path.to_string_lossy();\n\n    for pattern in exclude {\n        // Simple glob matching\n        if pattern.contains('*') {\n            let pattern = pattern.replace('*', \"\");\n            if path_str.contains(\u0026pattern) {\n                return true;\n            }\n        } else if path_str.contains(pattern) {\n            return true;\n        }\n    }\n\n    // Always exclude common non-secret files\n    let always_exclude = [\n        \".git/\",\n        \"node_modules/\",\n        \"target/\",\n        \"dist/\",\n        \"build/\",\n        \".env.example\",\n        \".env.sample\",\n        \".env.template\",\n    ];\n\n    for pattern in \u0026always_exclude {\n        if path_str.contains(pattern) {\n            return true;\n        }\n    }\n\n    false\n}\n\n/// Check if a file is scannable (text-based)\nfn is_scannable_file(path: \u0026Path) -\u003e bool {\n    let scannable_extensions = [\n        \"env\",\n        \"txt\",\n        \"sh\",\n        \"bash\",\n        \"zsh\",\n        \"py\",\n        \"js\",\n        \"ts\",\n        \"rs\",\n        \"go\",\n        \"java\",\n        \"rb\",\n        \"php\",\n        \"yml\",\n        \"yaml\",\n        \"json\",\n        \"toml\",\n        \"xml\",\n        \"conf\",\n        \"config\",\n        \"ini\",\n        \"properties\",\n    ];\n\n    if let Some(ext) = path.extension() {\n        let ext_str = ext.to_string_lossy().to_lowercase();\n        if scannable_extensions.contains(\u0026ext_str.as_str()) {\n            return true;\n        }\n    }\n\n    // Files without extensions (Dockerfile, Makefile, etc.)\n    if path.extension().is_none() {\n        if let Some(name) = path.file_name() {\n            let name_str = name.to_string_lossy();\n            if name_str.starts_with(\".env\")\n                || name_str == \"Dockerfile\"\n                || name_str == \"Makefile\"\n                || name_str == \"docker-compose.yml\"\n            {\n                return true;\n            }\n        }\n    }\n\n    false\n}\n\n/// Scan a single file for secrets\nfn scan_file(path: \u0026Path, results: \u0026mut ScanResults, ignore_placeholders: bool) -\u003e Result\u003c()\u003e {\n    let content = match fs::read_to_string(path) {\n        Ok(c) =\u003e c,\n        Err(_) =\u003e return Ok(()), // Skip binary files\n    };\n\n    // If it's a .env file, parse it properly\n    if path.to_string_lossy().contains(\".env\") {\n        scan_env_file(path, \u0026content, results, ignore_placeholders)?;\n    } else {\n        // Scan line by line for secrets\n        scan_text_file(path, \u0026content, results, ignore_placeholders)?;\n    }\n\n    Ok(())\n}\n\n/// Scan a .env file using the parser\nfn scan_env_file(\n    path: \u0026Path,\n    content: \u0026str,\n    results: \u0026mut ScanResults,\n    ignore_placeholders: bool,\n) -\u003e Result\u003c()\u003e {\n    let parser = Parser::default();\n    let _vars = match parser.parse_content(content) {\n        Ok(v) =\u003e v,\n        Err(_) =\u003e return Ok(()), // Skip invalid files\n    };\n\n    for (line_num, line) in content.lines().enumerate() {\n        let line_num = line_num + 1;\n\n        // Skip comments and empty lines\n        if line.trim().is_empty() || line.trim().starts_with('#') {\n            continue;\n        }\n\n        // Extract key=value\n        if let Some((key, value)) = line.split_once('=') {\n            let key = key.trim().trim_start_matches(\"export\").trim();\n            let value = value.trim();\n\n            if let Some((pattern, confidence, action_url)) = detect_secret(value, key) {\n                // Skip if ignoring placeholders and this is one\n                if ignore_placeholders \u0026\u0026 crate::utils::patterns::is_placeholder(value) {\n                    continue;\n                }\n\n                let finding = Finding {\n                    pattern: pattern.clone(),\n                    confidence: format!(\"{}\", confidence),\n                    value_preview: truncate_value(value),\n                    location: format!(\"{}:{} ({})\", path.display(), line_num, key),\n                    variable: Some(key.to_string()),\n                    action_url,\n                };\n\n                results.findings.push(finding);\n                results.secrets_found += 1;\n\n                match confidence {\n                    Confidence::High =\u003e results.high_confidence += 1,\n                    Confidence::Medium =\u003e results.medium_confidence += 1,\n                    Confidence::Low =\u003e results.low_confidence += 1,\n                }\n            }\n        }\n    }\n\n    Ok(())\n}\n\n/// Scan a text file line by line\nfn scan_text_file(\n    path: \u0026Path,\n    content: \u0026str,\n    results: \u0026mut ScanResults,\n    ignore_placeholders: bool,\n) -\u003e Result\u003c()\u003e {\n    for (line_num, line) in content.lines().enumerate() {\n        let line_num = line_num + 1;\n\n        // Try to detect secrets in the line\n        // Split by common separators to find tokens\n        let tokens: Vec\u003c\u0026str\u003e = line\n            .split(|c: char| c.is_whitespace() || c == '=' || c == ':' || c == '\"' || c == '\\'')\n            .filter(|t| t.len() \u003e 20) // Only check reasonably long tokens\n            .collect();\n\n        for token in tokens {\n            if let Some((pattern, confidence, action_url)) = detect_secret(token, \"\") {\n                if ignore_placeholders \u0026\u0026 crate::utils::patterns::is_placeholder(token) {\n                    continue;\n                }\n\n                let finding = Finding {\n                    pattern: pattern.clone(),\n                    confidence: format!(\"{}\", confidence),\n                    value_preview: truncate_value(token),\n                    location: format!(\"{}:{}\", path.display(), line_num),\n                    variable: None,\n                    action_url,\n                };\n\n                results.findings.push(finding);\n                results.secrets_found += 1;\n\n                match confidence {\n                    Confidence::High =\u003e results.high_confidence += 1,\n                    Confidence::Medium =\u003e results.medium_confidence += 1,\n                    Confidence::Low =\u003e results.low_confidence += 1,\n                }\n            }\n        }\n    }\n\n    Ok(())\n}\n\n/// Truncate a value for display (show first and last few chars)\nconst PREFIX_LEN: usize = 8;\nconst SUFFIX_LEN: usize = 5;\nconst MAX_VISIBLE: usize = 20;\n\nfn truncate_value(value: \u0026str) -\u003e String {\n    if value.len() \u003c= MAX_VISIBLE {\n        value.to_string()\n    } else {\n        format!(\n            \"{}...{}\",\n            \u0026value[..PREFIX_LEN],\n            \u0026value[value.len() - SUFFIX_LEN..]\n        )\n    }\n}\n\n/// Output results in pretty format\nfn output_pretty(results: \u0026ScanResults, files: \u0026[PathBuf]) -\u003e Result\u003c()\u003e {\n    println!(\n        \"Scanning: {}\",\n        files\n            .iter()\n            .take(3)\n            .map(|f| f.display().to_string())\n            .collect::\u003cVec\u003c_\u003e\u003e()\n            .join(\", \")\n    );\n    if files.len() \u003e 3 {\n        println!(\"  ... and {} more files\", files.len() - 3);\n    }\n    println!();\n\n    if results.secrets_found == 0 {\n        println!(\"{} No secrets detected\", \"✓\".green());\n        println!(\"\\nScanned {} files\", results.files_scanned);\n        return Ok(());\n    }\n\n    println!(\n        \"{} Found {} potential secrets\\n\",\n        \"✗\".red(),\n        results.secrets_found\n    );\n\n    println!(\"{}\", \"Secrets detected:\".bold());\n    for (i, finding) in results.findings.iter().enumerate() {\n        let icon = match finding.confidence.as_str() {\n            \"high\" =\u003e \"🚨\",\n            \"medium\" =\u003e \"⚠️ \",\n            _ =\u003e \"ℹ️ \",\n        };\n\n        println!(\n            \"  {}. {} {} ({} confidence)\",\n            i + 1,\n            icon,\n            finding.pattern.bold(),\n            finding.confidence\n        );\n        println!(\"     Pattern: {}\", finding.pattern);\n        println!(\"     Value: {}\", finding.value_preview.dimmed());\n        println!(\"     Location: {}\", finding.location);\n\n        if finding.confidence == \"high\" {\n            println!(\n                \"     {}\",\n                \"This looks like a real secret, not a placeholder.\".yellow()\n            );\n        }\n\n        if let Some(url) = \u0026finding.action_url {\n            println!(\"     Action: Revoke immediately at {}\", url.cyan());\n        }\n        println!();\n    }\n\n    println!(\"{}\", \"Summary:\".bold());\n    println!(\"  🚨 {} high-confidence secrets\", results.high_confidence);\n    println!(\n        \"  ⚠️  {} medium-confidence secrets\",\n        results.medium_confidence\n    );\n    if results.low_confidence \u003e 0 {\n        println!(\"  ℹ️ {} low-confidence detections\", results.low_confidence);\n    }\n\n    println!(\n        \"\\n  {}\",\n        \"Recommendation: These should NOT be committed to Git.\"\n            .yellow()\n            .bold()\n    );\n\n    if results.high_confidence \u003e 0 || results.medium_confidence \u003e 0 {\n        println!(\"\\n  If already committed:\");\n        println!(\"    1. Revoke/rotate all keys immediately\");\n        println!(\"    2. Run: git filter-repo --path .env --invert-paths\");\n        println!(\"    3. Force push (after team coordination)\");\n    }\n\n    Ok(())\n}\n\n/// Output results in JSON format\nfn output_json(results: \u0026ScanResults) -\u003e Result\u003c()\u003e {\n    let json = serde_json::to_string_pretty(results)?;\n    println!(\"{}\", json);\n    Ok(())\n}\n\n/// Output results in SARIF format (for GitHub Code Scanning)\nfn output_sarif(results: \u0026ScanResults) -\u003e Result\u003c()\u003e {\n    let sarif_results: Vec\u003cserde_json::Value\u003e = results\n        .findings\n        .iter()\n        .map(|f| {\n            let level = match f.confidence.as_str() {\n                \"high\" =\u003e \"error\",\n                \"medium\" =\u003e \"warning\",\n                _ =\u003e \"note\",\n            };\n\n            // Parse location to extract file and line\n            let parts: Vec\u003c\u0026str\u003e = f.location.split(':').collect();\n            let file = parts.first().unwrap_or(\u0026\"unknown\");\n            let line: usize = parts.get(1).and_then(|s| s.parse().ok()).unwrap_or(1);\n\n            serde_json::json!({\n                \"ruleId\": format!(\"secret/{}\", f.pattern.to_lowercase().replace(' ', \"-\")),\n                \"level\": level,\n                \"message\": {\n                    \"text\": format!(\"{} detected\", f.pattern)\n                },\n                \"locations\": [{\n                    \"physicalLocation\": {\n                        \"artifactLocation\": { \"uri\": file },\n                        \"region\": { \"startLine\": line }\n                    }\n                }]\n            })\n        })\n        .collect();\n\n    let sarif = serde_json::json!({\n        \"version\": \"2.1.0\",\n        \"$schema\": \"https://json.schemastore.org/sarif-2.1.0.json\",\n        \"runs\": [{\n            \"tool\": {\n                \"driver\": {\n                    \"name\": \"evnx scan\",\n                    \"version\": env!(\"CARGO_PKG_VERSION\")\n                }\n            },\n            \"results\": sarif_results\n        }]\n    });\n\n    println!(\"{}\", serde_json::to_string_pretty(\u0026sarif)?);\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_truncate_value() {\n        assert_eq!(truncate_value(\"short\"), \"short\");\n        assert_eq!(\n            truncate_value(\"this_is_a_very_long_secret_key_value_12345678\"),\n            \"this_is_...45678\"\n        );\n    }\n\n    #[test]\n    fn test_is_scannable_file() {\n        assert!(is_scannable_file(Path::new(\".env\")));\n        assert!(is_scannable_file(Path::new(\"config.py\")));\n        assert!(is_scannable_file(Path::new(\"Dockerfile\")));\n        assert!(!is_scannable_file(Path::new(\"image.png\")));\n    }\n\n    #[test]\n    fn test_should_exclude() {\n        assert!(should_exclude(Path::new(\".env.example\"), \u0026[]));\n        assert!(should_exclude(Path::new(\"node_modules/package.json\"), \u0026[]));\n        assert!(!should_exclude(Path::new(\".env\"), \u0026[]));\n\n        assert!(should_exclude(Path::new(\"test.py\"), \u0026[\"test*\".to_string()]));\n    }\n}\n","traces":[{"line":40,"address":[7029426,7029507,7026128],"length":1,"stats":{"Line":0}},{"line":49,"address":[6023930],"length":1,"stats":{"Line":0}},{"line":50,"address":[7026355,7026272],"length":1,"stats":{"Line":0}},{"line":53,"address":[7279758],"length":1,"stats":{"Line":0}},{"line":57,"address":[7026681],"length":1,"stats":{"Line":0}},{"line":61,"address":[7026918],"length":1,"stats":{"Line":0}},{"line":67,"address":[6024781,6027136],"length":1,"stats":{"Line":0}},{"line":69,"address":[6025134],"length":1,"stats":{"Line":0}},{"line":70,"address":[7027551,7027472],"length":1,"stats":{"Line":0}},{"line":74,"address":[7280962],"length":1,"stats":{"Line":0}},{"line":76,"address":[7027668],"length":1,"stats":{"Line":0}},{"line":83,"address":[7281287,7281366],"length":1,"stats":{"Line":0}},{"line":84,"address":[7281483],"length":1,"stats":{"Line":0}},{"line":85,"address":[6026738],"length":1,"stats":{"Line"
