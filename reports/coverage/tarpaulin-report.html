<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

V)).unwrap();\n        });\n    });\n}\n\nfn bench_parser_large(c: \u0026mut Criterion) {\n    let mut group = c.benchmark_group(\"parser_large\");\n\n    for size in [100, 500, 1000].iter() {\n        let env_content = generate_large_env(*size);\n        group.bench_with_input(BenchmarkId::from_parameter(size), size, |b, _| {\n            let parser = Parser::default();\n            b.iter(|| {\n                parser.parse_content(black_box(\u0026env_content)).unwrap();\n            });\n        });\n    }\n\n    group.finish();\n}\n\nfn bench_parser_with_expansion(c: \u0026mut Criterion) {\n    let content = r#\"\nBASE=http://localhost\nAPI_URL=${BASE}/api\nFULL_URL=${API_URL}/v1\nNESTED=${FULL_URL}/nested\n\"#;\n\n    c.bench_function(\"parser_with_expansion\", |b| {\n        let parser = Parser::default();\n        b.iter(|| {\n            parser.parse_content(black_box(content)).unwrap();\n        });\n    });\n}\n\nfn bench_parser_no_expansion(c: \u0026mut Criterion) {\n    let content = r#\"\nBASE=http://localhost\nAPI_URL=${BASE}/api\nFULL_URL=${API_URL}/v1\nNESTED=${FULL_URL}/nested\n\"#;\n\n    c.bench_function(\"parser_no_expansion\", |b| {\n        let mut config = ParserConfig::default();\n        config.allow_expansion = false;\n        let parser = Parser::new(config);\n        b.iter(|| {\n            parser.parse_content(black_box(content)).unwrap();\n        });\n    });\n}\n\n// ============================================================================\n// SECRET SCANNING BENCHMARKS\n// ============================================================================\n\nfn bench_secret_detection(c: \u0026mut Criterion) {\n    use dotenv_space::utils::patterns::detect_secret;\n\n    let test_cases = vec![\n        (\"AWS_KEY\", \"AKIA4OZRMFJ3VREALKEY\"),\n        (\"STRIPE\", \"sk_live_51Habc123def456ghi789jkl\"),\n        (\"GITHUB\", \"ghp_abc123def456ghi789jkl012mno345pqr678\"),\n        (\"NORMAL\", \"just-a-normal-value\"),\n    ];\n\n    c.bench_function(\"secret_detection\", |b| {\n        b.iter(|| {\n            for (key, value) in \u0026test_cases {\n                detect_secret(black_box(value), black_box(key));\n            }\n        });\n    });\n}\n\nfn bench_entropy_calculation(c: \u0026mut Criterion) {\n    use dotenv_space::utils::patterns::calculate_entropy;\n\n    let test_strings = vec![\"aaaaaaa\", \"abcdefg\", \"a1b2c3d4e5f6g7h8\", \"aB3$xY9!zQ2#mK7\"];\n\n    c.bench_function(\"entropy_calculation\", |b| {\n        b.iter(|| {\n            for s in \u0026test_strings {\n                calculate_entropy(black_box(s));\n            }\n        });\n    });\n}\n\n// ============================================================================\n// CONVERTER BENCHMARKS\n// ============================================================================\n\nfn bench_convert_to_json(c: \u0026mut Criterion) {\n    use dotenv_space::core::converter::{ConvertOptions, Converter};\n    use dotenv_space::formats::json::JsonConverter;\n\n    let mut vars = HashMap::new();\n    for i in 0..50 {\n        vars.insert(format!(\"KEY_{}\", i), format!(\"value_{}\", i));\n    }\n\n    c.bench_function(\"convert_to_json\", |b| {\n        let converter = JsonConverter;\n        let options = ConvertOptions::default();\n        b.iter(|| {\n            converter\n                .convert(black_box(\u0026vars), black_box(\u0026options))\n                .unwrap();\n        });\n    });\n}\n\nfn bench_convert_with_filtering(c: \u0026mut Criterion) {\n    use dotenv_space::core::converter::{ConvertOptions, Converter};\n    use dotenv_space::formats::json::JsonConverter;\n\n    let mut vars = HashMap::new();\n    for i in 0..50 {\n        vars.insert(format!(\"AWS_{}\", i), format!(\"value_{}\", i));\n        vars.insert(format!(\"DB_{}\", i), format!(\"value_{}\", i));\n    }\n\n    c.bench_function(\"convert_with_filtering\", |b| {\n        let converter = JsonConverter;\n        let mut options = ConvertOptions::default();\n        options.include_pattern = Some(\"AWS_*\".to_string());\n        b.iter(|| {\n            converter\n                .convert(black_box(\u0026vars), black_box(\u0026options))\n                .unwrap();\n        });\n    });\n}\n\n// ============================================================================\n// VALIDATION BENCHMARKS\n// ============================================================================\n\nfn bench_placeholder_detection(c: \u0026mut Criterion) {\n    let test_values = vec![\n        \"YOUR_KEY_HERE\",\n        \"sk_test_CHANGE_ME\",\n        \"generate-with-openssl\",\n        \"sk_live_51Hrealkey\",\n        \"postgresql://localhost:5432/db\",\n    ];\n\n    c.bench_function(\"placeholder_detection\", |b| {\n        b.iter(|| {\n            for value in \u0026test_values {\n                // Simulate placeholder check logic\n                let lower = value.to_lowercase();\n                let _is_placeholder = lower.contains(\"your_key_here\")\n                    || lower.contains(\"change_me\")\n                    || lower.contains(\"generate-with\");\n            }\n        });\n    });\n}\n\ncriterion_group!(\n    parser_benches,\n    bench_parser_small,\n    bench_parser_medium,\n    bench_parser_large,\n    bench_parser_with_expansion,\n    bench_parser_no_expansion\n);\n\ncriterion_group!(\n    scanner_benches,\n    bench_secret_detection,\n    bench_entropy_calculation\n);\n\ncriterion_group!(\n    converter_benches,\n    bench_convert_to_json,\n    bench_convert_with_filtering\n);\n\ncriterion_group!(validation_benches, bench_placeholder_detection);\n\ncriterion_main!(\n    parser_benches,\n    scanner_benches,\n    converter_benches,\n    validation_benches\n);\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ajit","Documents","dotenv-space-cli","src","cli.rs"],"content":"//! CLI argument parsing for evnx.\n//!\n//! Uses clap derive macros for type-safe argument handling.\n\nuse clap::{Args, Parser, Subcommand, ValueEnum};\n\n// ─────────────────────────────────────────────────────────────\n// AddTarget: Subcommands for `evnx add`\n// ─────────────────────────────────────────────────────────────\n\n/// Target for adding environment variables.\n#[derive(Subcommand, Debug, Clone)]\npub enum AddTarget {\n    /// Add variables for a specific service.\n    ///\n    /// Example: evnx add service postgresql\n    Service {\n        /// Service ID (e.g., \"postgresql\", \"redis\", \"stripe\").\n        #[arg()]\n        service: String,\n    },\n\n    /// Add variables for a framework.\n    ///\n    /// Example: evnx add framework --language python django\n    Framework {\n        /// Language ID (e.g., \"python\", \"javascript_typescript\").\n        #[arg(long, short)]\n        language: String,\n\n        /// Framework ID (e.g., \"django\", \"nextjs\", \"axum_actix\").\n        #[arg()]\n        framework: String,\n    },\n\n    /// Add variables from a stack blueprint (without overwriting existing).\n    ///\n    /// Example: evnx add blueprint t3_modern\n    Blueprint {\n        /// Blueprint ID (e.g., \"t3_modern\", \"rust_high_perf\").\n        #[arg()]\n        blueprint: String,\n    },\n\n    /// Add custom variables interactively.\n    Custom,\n}\n\n// ------------------------------------\n// sync related Enum and implementation\n// -------------------------------------\n\n/// Direction for sync operation\n#[derive(Debug, Clone, Copy, PartialEq, Eq, ValueEnum, Default)]\npub enum SyncDirection {\n    /// Sync .env → .env.example (add new vars to template)\n    #[default]\n    Forward,\n    /// Sync .env.example → .env (add missing vars to local env)\n    Reverse,\n}\n\nimpl std::fmt::Display for SyncDirection {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            SyncDirection::Forward =\u003e write!(f, \"forward\"),\n            SyncDirection::Reverse =\u003e write!(f, \"reverse\"),\n        }\n    }\n}\n\n/// Keep .env and .env.example in sync.\n#[derive(Args, Debug)]\npub struct SyncArgs {\n    /// Direction of sync operation\n    #[arg(long, value_enum, default_value_t = SyncDirection::Forward)]\n    pub direction: SyncDirection,\n\n    /// Use placeholder values when adding new variables\n    #[arg(long)]\n    pub placeholder: bool,\n\n    /// Preview changes without writing to files\n    #[arg(long, short = 'n')]\n    pub dry_run: bool,\n\n    /// Skip interactive prompts (for CI/CD usage)\n    #[arg(long, short = 'f')]\n    pub force: bool,\n\n    /// Path to custom placeholder template config (JSON)\n    #[arg(long, value_name = \"PATH\")]\n    pub template_config: Option\u003cstd::path::PathBuf\u003e,\n\n    /// Warn on non-standard env var naming (default: warn)\n    #[arg(long, value_enum, default_value_t = NamingPolicy::Warn)]\n    pub naming_policy: NamingPolicy,\n}\n\n/// Policy for handling non-standard environment variable names\n#[derive(Debug, Clone, Copy, PartialEq, Eq, clap::ValueEnum, Default)]\npub enum NamingPolicy {\n    /// Warn but continue (default)\n    #[default]\n    Warn,\n    /// Treat non-standard names as errors\n    Error,\n    /// Ignore naming conventions entirely\n    Ignore,\n}\n\n// ─────────────────────────────────────────────────────────────\n// Cli: Top-level CLI structure\n// ─────────────────────────────────────────────────────────────\n\n/// evnx — Manage .env files with validation, secret scanning, and format conversion.\n#[derive(Parser)]\n#[command(\n    name = \"evnx\",\n    about = \"Manage .env files — validation, secret scanning, and format conversion\",\n    version,\n    author,\n    propagate_version = true,\n    arg_required_else_help = true\n)]\npub struct Cli {\n    /// Subcommand to execute.\n    #[command(subcommand)]\n    pub command: Commands,\n\n    /// Enable verbose output.\n    #[arg(short, long, global = true)]\n    pub verbose: bool,\n\n    /// Suppress non-essential output.\n    #[arg(short, long, global = true)]\n    pub quiet: bool,\n\n    /// Disable colored output.\n    #[arg(long, global = true)]\n    pub no_color: bool,\n}\n\n// ─────────────────────────────────────────────────────────────\n// Commands: All available subcommands\n// ─────────────────────────────────────────────────────────────\n\n#[derive(Subcommand, Debug)]\npub enum Commands {\n    /// Interactive project setup — generates .env.example.\n    ///\n    /// Three modes available:\n    /// • Blank: Create empty .env files (add variables later with `evnx add`)\n    /// • Blueprint: Use a pre-configured stack like \"T3 Turbo\" or \"Rust High-Perf\"\n    /// • Architect: Build your stack step-by-step (language → framework → services → infra)\n    Init {\n        /// Output path for .env files.\n        #[arg(long, default_value = \".\")]\n        path: String,\n\n        /// Skip all prompts and use defaults.\n        #[arg(short, long)]\n        yes: bool,\n    },\n\n    /// Add environment variables to existing .env files.\n    ///\n    /// Subcommands:\n    /// • service: Add vars for a service (e.g., postgresql)\n    /// • framework: Add vars for a framework (e.g., django)\n    /// • blueprint: Add vars from a stack blueprint\n    /// • custom: Interactive custom variable addition\n    Add {\n        #[command(subcommand)]\n        target: AddTarget,\n\n        /// Output path (default: current directory).\n        #[arg(long, short, default_value = \".\", global = true)]\n        path: String,\n\n        /// Skip confirmation prompts.\n        #[arg(long, short, global = true)]\n        yes: bool,\n    },\n\n    /// Check .env against .env.example, find issues.\n    Validate {\n        #[arg(long, default_value = \".env\")]\n        env: String,\n        #[arg(long, default_value = \".env.example\")]\n        example: String,\n        #[arg(long)]\n        strict: bool,\n        #[arg(long)]\n        fix: bool,\n        #[arg(long, default_value = \"pretty\")]\n        format: String,\n        #[arg(long)]\n        exit_zero: bool,\n    },\n\n    /// Detect secrets that look real (AWS keys, tokens, etc.).\n    Scan {\n        #[arg(default_value = \".\")]\n        path: Vec\u003cString\u003e,\n        #[arg(long, default_value = \".env.example\")]\n        exclude: Vec\u003cString\u003e,\n        #[arg(long)]\n        pattern: Vec\u003cString\u003e,\n        #[arg(long)]\n        ignore_placeholders: bool,\n        #[arg(long, default_value = \"pretty\")]\n        format: String,\n        #[arg(long)]\n        exit_zero: bool,\n    },\n\n    /// Compare .env vs .env.example — show missing/extra vars.\n    Diff {\n        #[arg(long, default_value = \".env\")]\n        env: String,\n        #[arg(long, default_value = \".env.example\")]\n        example: String,\n        #[arg(long)]\n        show_values: bool,\n        #[arg(long, default_value = \"pretty\")]\n        format: String,\n        #[arg(long)]\n        reverse: bool,\n    },\n\n    /// Transform to different formats (JSON, YAML, shell, etc.).\n    Convert {\n        #[arg(long, default_value = \".env\")]\n        env: String,\n        #[arg(long)]\n        to: Option\u003cString\u003e,\n        #[arg(long)]\n        output: Option\u003cString\u003e,\n        #[arg(long)]\n        include: Option\u003cString\u003e,\n        #[arg(long)]\n        exclude: Option\u003cString\u003e,\n        #[arg(long)]\n        base64: bool,\n        #[arg(long)]\n        prefix: Option\u003cString\u003e,\n        #[arg(long)]\n        transform: Option\u003cString\u003e,\n    },\n\n    /// Full migration workflow to secret managers.\n    #[cfg(feature = \"migrate\")]\n    Migrate {\n        #[arg(long)]\n        from: Option\u003cString\u003e,\n        #[arg(long)]\n        to: Option\u003cString\u003e,\n        #[arg(long, default_value = \".env\")]\n        source_file: String,\n        #[arg(long)]\n        repo: Option\u003cString\u003e,\n        #[arg(long)]\n //! Handle `evnx add blueprint \u003cblueprint_id\u003e`\n//!\n//! Adds variables from a pre-combined stack WITHOUT overwriting existing vars.\n\nuse anyhow::{Context, Result};\nuse colored::*;\nuse dialoguer::Confirm;\nuse std::path::Path;\n\nuse super::shared::{append_to_env_files, detect_conflicts, AppendMode};\nuse crate::schema::{formatter, loader, resolver};\nuse crate::utils::ui::{info, warning};\n\n/// Handle blueprint addition\npub fn handle(blueprint_id: \u0026str, output_path: \u0026Path, yes: bool, verbose: bool) -\u003e Result\u003c()\u003e {\n    // 1. Find blueprint\n    let blueprint = loader::get_blueprint(blueprint_id).context(format!(\n        \"Unknown blueprint: '{}'. Run 'evnx init' to see available blueprints.\",\n        blueprint_id\n    ))?;\n\n    if verbose {\n        println!(\n            \"{} Resolving blueprint: {} ({})\",\n            \"[DEBUG]\".dimmed(),\n            blueprint.name,\n            blueprint_id\n        );\n    }\n\n    // 2. Resolve to variables\n    let vars =\n        resolver::resolve_blueprint(blueprint).context(\"Failed to resolve blueprint variables\")?;\n\n    // 3. Check for conflicts with existing .env.example\n    let example_path = output_path.join(\".env.example\");\n    let conflicts = if example_path.exists() {\n        let existing_content = std::fs::read_to_string(\u0026example_path)?;\n        detect_conflicts(\u0026existing_content, \u0026vars)\n    } else {\n        Vec::new()\n    };\n\n    // 4. Show preview with conflict warnings\n    println!(\"\\n{}\", \"📋 Preview:\".bold());\n    println!(\"{}\", formatter::generate_preview(\u0026vars).dimmed());\n\n    if !conflicts.is_empty() {\n        //println!(\"\\n{}\", \"⚠️  Conflicts detected:\".yellow().bold());\n        warning(format!(\"{} conflicts detected\", conflicts.len()));\n        for conflict in \u0026conflicts {\n            println!(\n                \"  • {} (existing: \\\"{}\\\", new: \\\"{}\\\")\",\n                conflict.var_name.bold(),\n                conflict.existing_value.dimmed(),\n                conflict.new_value.dimmed()\n            );\n        }\n        // println!(\"\\n{}\", \"Conflicting variables will be SKIPPED (not overwritten).\".yellow());\n        info(\"Conflicting variables will be SKIPPED (not overwritten)\");\n    }\n\n    // 5. Confirm (unless --yes)\n    if !yes {\n        let prompt = if conflicts.is_empty() {\n            format!(\"Add these {} variables to .env.example?\", vars.vars.len())\n        } else {\n            format!(\n                \"Add {} new variables (skipping {} conflicts)?\",\n                vars.vars.len() - conflicts.len(),\n                conflicts.len()\n            )\n        };\n\n        let confirm = Confirm::new()\n            .with_prompt(\u0026prompt)\n            .default(true)\n            .interact()?;\n\n        if !confirm {\n            println!(\"{}\", \"Aborted.\".yellow());\n            return Ok(());\n        }\n    }\n\n    // 6. Format addition (excluding conflicts)\n    let filtered_vars = if conflicts.is_empty() {\n        vars.clone()\n    } else {\n        let mut filtered = vars.clone();\n        for conflict in \u0026conflicts {\n            filtered.vars.remove(\u0026conflict.var_name);\n        }\n        filtered\n    };\n\n    let addition = formatter::format_addition(\u0026filtered_vars)?;\n    let header = format!(\"\\n# ── Blueprint: {} ──\\n\", blueprint.name);\n    let content = format!(\"{}{}\", header, addition);\n\n    // 7. Append to files (skip conflicts mode)\n    append_to_env_files(output_path, \u0026content, AppendMode::SkipConflicts, verbose)?;\n\n    let added_count = filtered_vars.vars.len();\n    println!(\n        \"{} Added {} variables from blueprint '{}'\",\n        \"✓\".green(),\n        added_count,\n        blueprint.name\n    );\n\n    if !conflicts.is_empty() {\n        println!(\n            \"{} Skipped {} conflicting variables (preserved existing values)\",\n            \"ℹ\".blue(),\n            conflicts.len()\n        );\n    }\n\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::fs;\n    use tempfile::TempDir;\n\n    #[test]\n    fn test_handle_skips_conflicting_vars() {\n        let dir = TempDir::new().unwrap();\n        let example_path = dir.path().join(\".env.example\");\n\n        // Create file with conflicting var\n        fs::write(\u0026example_path, \"DATABASE_URL=existing_value\\n\").unwrap();\n\n        // Handle blueprint that includes postgresql (which defines DATABASE_URL)\n        handle(\"t3_modern\", dir.path(), true, false).unwrap();\n\n        // Verify conflict was skipped\n        let content = fs::read_to_string(\u0026example_path).unwrap();\n        assert!(content.contains(\"DATABASE_URL=existing_value\")); // Original preserved\n\n        // But other vars from blueprint were added\n        assert!(content.contains(\"NEXTAUTH_SECRET=\")); // Next.js var added\n    }\n}\n","traces":[{"line":15,"address":[5556176,5559367,5562645],"length":1,"stats":{"Line":1}},{"line":17,"address":[6690562,6690310],"length":1,"stats":{"Line":1}},{"line":22,"address":[6690619],"length":1,"stats":{"Line":1}},{"line":23,"address":[6690794],"length":1,"stats":{"Line":0}},{"line":32,"address":[6691071,6690631],"length":1,"stats":{"Line":1}},{"line":36,"address":[6691225],"length":1,"stats":{"Line":1}},{"line":37,"address":[5557313,5557393],"length":1,"stats":{"Line":2}},{"line":38,"address":[6691498,6691435,6696774],"length":1,"stats":{"Line":2}},{"line":39,"address":[6691679,6691762],"length":1,"stats":{"Line":2}},{"line":41,"address":[6691416,6691462],"length":1,"stats":{"Line":0}},{"line":45,"address":[6691464,6691863],"length":1,"stats":{"Line":2}},{"line":46,"address":[6692019],"length":1,"stats":{"Line":1}},{"line":48,"address":[6692342],"length":1,"stats":{"Line":1}},{"line":50,"address":[6692381,6692436],"length":1,"stats":{"Line":2}},{"line":51,"address":[6692598],"length":1,"stats":{"Line":1}},{ c","commands","add","custom.rs"],"content":"//! Handle `evnx add custom` — Interactive custom variable addition\n\nuse anyhow::Result;\nuse colored::*;\nuse dialoguer::{Confirm, Input, Select};\nuse std::path::Path;\n\nuse super::shared::append_to_env_files;\nuse crate::utils::ui::{info, print_header, print_preview_header, success};\n\n/// Handle interactive custom variable addition\npub fn handle(output_path: \u0026Path, yes: bool, verbose: bool) -\u003e Result\u003c()\u003e {\n    print_header(\n        \"Custom Variables\",\n        Some(\"Add your own environment variables interactively\"),\n    );\n\n    info(\"Enter variables one at a time. Empty name to finish.\");\n\n    let mut additions = Vec::new();\n\n    loop {\n        // Prompt for variable name\n        let name: String = Input::new()\n            .with_prompt(\"Variable name (or Enter to finish)\")\n            .allow_empty(true)\n            .interact_text()?;\n\n        if name.trim().is_empty() {\n            break;\n        }\n\n        // Prompt for example value\n        let example: String = Input::new()\n            .with_prompt(\"Example/placeholder value\")\n            .default(\"your_value_here\".to_string())\n            .interact_text()?;\n\n        // Prompt for description (optional)\n        let description: Option\u003cString\u003e = if yes {\n            None\n        } else {\n            let add_desc = Confirm::new()\n                .with_prompt(\"Add a description comment?\")\n                .default(false)\n                .interact()?;\n\n            if add_desc {\n                Some(Input::new().with_prompt(\"Description\").interact_text()?)\n            } else {\n                None\n            }\n        };\n\n        // Prompt for category (optional)\n        let category: Option\u003cString\u003e = if yes {\n            None\n        } else {\n            let categories = vec![\n                \"Application\",\n                \"Security\",\n                \"Database\",\n                \"Auth\",\n                \"Service\",\n                \"Other\",\n            ];\n            let use_cat = Confirm::new()\n                .with_prompt(\"Assign to a category?\")\n                .default(false)\n                .interact()?;\n\n            if use_cat {\n                let idx = Select::new()\n                    .with_prompt(\"Select category\")\n                    .items(\u0026categories)\n                    .interact()?;\n                Some(categories[idx].to_string())\n            } else {\n                None\n            }\n        };\n\n        // Prompt for required flag\n        let required = if yes {\n            false\n        } else {\n            Confirm::new()\n                .with_prompt(\"Is this variable required?\")\n                .default(false)\n                .interact()?\n        };\n\n        // Format as .env line\n        let mut lines = Vec::new();\n        if let Some(desc) = \u0026description {\n            lines.push(format!(\"# {}\", desc));\n        }\n        lines.push(format!(\"{}={}\", name.trim(), example));\n        if required {\n            lines.push(\"  # (required)\".to_string());\n        }\n\n        additions.push((lines.join(\"\\n\"), name.trim().to_string(), category));\n\n        if !yes {\n            let continue_adding = Confirm::new()\n                .with_prompt(\"Add another variable?\")\n                .default(true)\n                .interact()?;\n\n            if !continue_adding {\n                break;\n            }\n        }\n    }\n\n    if additions.is_empty() {\n        println!(\"{}\", \"No variables added.\".yellow());\n        return Ok(());\n    }\n\n    // Format all additions\n    let mut content = String::from(\"\\n# ── Custom Variables ──\\n\");\n    for (line, _name, category) in \u0026additions {\n        if let Some(cat) = category {\n            content.push_str(\u0026format!(\"\\n# [{}] \", cat));\n        }\n        content.push_str(line);\n        content.push('\\n');\n    }\n    content.push_str(\u0026format!(\n        \"\\n# Added by evnx add custom on {}\\n\",\n        chrono::Local::now().format(\"%Y-%m-%d %H:%M\")\n    ));\n\n    // Show summary\n    // println!(\"\\n{}\", \"📋 Summary:\".bold());\n    // println!(\"  • {} variables to add\", additions.len());\n    if !yes {\n        print_preview_header();\n        println!(\"  • {} variables to add\", additions.len());\n    }\n\n    let _categories: Vec\u003c_\u003e = additions\n        .iter()\n        .filter_map(|(_, _, cat)| cat.as_ref())\n        .collect();\n\n    let categories: Vec\u003cString\u003e = additions\n        .iter()\n        .filter_map(|(_, _, cat)| cat.as_ref().cloned())\n        .collect();\n\n    if !categories.is_empty() {\n        println!(\"  • Categories: {}\", categories.join(\", \"));\n    }\n\n    // Confirm\n    if !yes {\n        let confirm = Confirm::new()\n            .with_prompt(\"Append these variables to .env.example?\")\n            .default(true)\n            .interact()?;\n\n        if !confirm {\n            println!(\"{}\", \"Aborted.\".yellow());\n            return Ok(());\n        }\n    }\n\n    // Append to files\n    append_to_env_files(\n        output_path,\n        \u0026content,\n        super::shared::AppendMode::WithConflictWarning,\n        verbose,\n    )?;\n\n    // println!(\n    //     \"{} Added {} custom variables\",\n    //     \"✓\".green(),\n    //     additions.len()\n    // );\n    success(format!(\"Added {} custom variables\", additions.len()));\n\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    // use super::*;\n    use tempfile::TempDir;\n    // use std::fs;\n\n    #[test]\n    fn test_handle_creates_custom_section() {\n        let dir = TempDir::new().unwrap();\n\n        // Simulate adding one variable (non-interactive test)\n        // Note: Full interactive testing requires mocking dialoguer\n        // This test verifies the output formatting logic\n\n        let mut content = String::from(\"\\n# ── Custom Variables ──\\n\");\n        content.push_str(\"# My custom API key\\n\");\n        content.push_str(\"MY_API_KEY=placeholder_value\\n\");\n        content.push_str(\"  # (required)\\n\");\n\n        assert!(content.contains(\"Custom Variables\"));\n        assert!(content.contains(\"MY_API_KEY=\"));\n        assert!(content.contains(\"(required)\"));\n    }\n}\n","traces":[{"line":12,"address":[7198112,7201049,7206127],"length":1,"stats":{"Line":0}},{"line":18,"address":[7334545],"length":1,"stats":{"Line":0}},{"line":20,"address":[7334563],"length":1,"stats":{"Line":0}},{"line":24,"address":[7342647,7334577,7334738,7334818],"length":1,"stats":{"Line":0}},{"line":29,"address":[7335002,7334919],"length":1,"stats":{"Line":0}},{"line":34,"address":[7335068,7335228,7335306,7335386,7339389],"length":1,"stats":{"Line":0}},{"line":36,"address":[7198833,7203010,7198864,7198937],"length":1,"stats":{"Line":0}},{"line":40,"address":[7335518,7335559],"length":1,"stats":{"Line":0}},{"line":41,"address":[7335541],"length":1,"stats":{"Line":0}},{"line":43,"address":[7335522,7335762,7335699,7336192],"length":1,"stats":{"Line":0}},{"line":48,"address":[7199778,7199463,7199485],"length":1,"stats":{"Line":0}},{"line":49,"address":[7335873,7336154,7335834],"length":1,"stats":{"Line":0}},{"line":51,"address":[7335814],"length":1,"stats":{"Line":0}},{"line":56,"address":[7335860,7336253],"length":1,"stats":{"Line":0}},{"line":57,"address":[7336227],"length":1,"stats":{"Line":0}},{"line":59,"address":[7336212,7336310],"length":1,"stats":{"Line":0}},{"line":67,"address":[7336532,7337450,7336686,7336749],"length":1,"stats":{"Line":0}},{"line":72,"address":[7337357,7336827,7336797],"length":1,"stats":{"Line":0}},{"line":73,"address":[7336829,7337099,7337009,7337188,7337387],"length":1,"stats":{"Line":0}},{"line":75,"address":[7337017,7336917,7337414,7336952],"length":1,"stats":{"Line":0}},{"line":77,"address":[7337233],"length":1,"stats":{"L Unknown framework '{}' for language '{}'. Available: {}\",\n        framework_id,\n        language_id,\n        language\n            .frameworks\n            .keys()\n            .cloned()\n            .collect::\u003cVec\u003c_\u003e\u003e()\n            .join(\", \")\n    ))?;\n\n    if verbose {\n        println!(\n            \"{} Resolving framework: {}/{}\",\n            \"[DEBUG]\".dimmed(),\n            language_id,\n            framework_id\n        );\n    }\n\n    // 3. Resolve to variables\n    let vars = resolver::resolve_framework(language_id, framework_id, framework)\n        .context(\"Failed to resolve framework variables\")?;\n\n    // 4. Show preview\n    println!(\"\\n{}\", \"📋 Preview:\".bold());\n    println!(\"{}\", formatter::generate_preview(\u0026vars).dimmed());\n\n    // 5. Confirm (unless --yes)\n    if !yes {\n        let confirm = Confirm::new()\n            .with_prompt(format!(\n                \"Add these {} variables for {} to .env.example?\",\n                vars.vars.len(),\n                framework.display_name.as_deref().unwrap_or(framework_id)\n            ))\n            .default(true)\n            .interact()?;\n\n        if !confirm {\n            println!(\"{}\", \"Aborted.\".yellow());\n            return Ok(());\n        }\n    }\n\n    // 6. Format as addition with framework header\n    let addition = formatter::format_addition(\u0026vars)?;\n    let header = format!(\n        \"\\n# ── Framework: {} ──\\n\",\n        framework.display_name.as_deref().unwrap_or(framework_id)\n    );\n    let content = format!(\"{}{}\", header, addition);\n\n    // 7. Append to files\n    append_to_env_files(\n        output_path,\n        \u0026content,\n        AppendMode::WithConflictWarning,\n        verbose,\n    )?;\n\n    println!(\n        \"{} Added {} variables for {}\",\n        \"✓\".green(),\n        vars.vars.len(),\n        framework.display_name.as_deref().unwrap_or(framework_id)\n    );\n\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::fs;\n    use tempfile::TempDir;\n\n    #[test]\n    fn test_handle_appends_framework_vars() {\n        let dir = TempDir::new().unwrap();\n        let example_path = dir.path().join(\".env.example\");\n\n        // Create initial file\n        fs::write(\u0026example_path, \"# Existing\\nAPP_NAME=test\\n\").unwrap();\n\n        // Handle framework addition\n        handle(\"python\", \"django\", dir.path(), true, false).unwrap();\n\n        // Verify append (not overwrite)\n        let content = fs::read_to_string(\u0026example_path).unwrap();\n        assert!(content.contains(\"APP_NAME=test\")); // Original preserved\n        assert!(content.contains(\"SECRET_KEY=\")); // Django var added\n        assert!(content.contains(\"Framework: Django\")); // Section header\n    }\n}\n","traces":[{"line":12,"address":[6705861,6704234,6700432],"length":1,"stats":{"Line":1}},{"line":20,"address":[6700607],"length":1,"stats":{"Line":1}},{"line":21,"address":[6700729,6700996,6700896,6701334],"length":1,"stats":{"Line":2}},{"line":24,"address":[6700869],"length":1,"stats":{"Line":1}},{"line":26,"address":[6700770],"length":1,"stats":{"Line":1}},{"line":27,"address":[6700803],"length":1,"stats":{"Line":1}},{"line":28,"address":[6700836],"length":1,"stats":{"Line":1}},{"line":29,"address":[6700956],"length":1,"stats":{"Line":1}},{"line":33,"address":[6701376,6701555,6701655,6702060],"length":1,"stats":{"Line":2}},{"line":37,"address":[6701528],"length":1,"stats":{"Line":1}},{"line":39,"address":[6701429],"length":1,"stats":{"Line":1}},{"line":40,"address":[6701462],"length":1,"stats":{"Line":1}},{"line":41,"address":[6701495],"length":1,"stats":{"Line":1}},{"line":42,"address":[6701615],"length":1,"stats":{"Line":1}},{"line":45,"address":[6702117],"length":1,"stats":{"Line":1}},{"line":46,"address":[6702320],"length":1,"stats":{"Line":0}},{"line":55,"address":[6702133,6702213,6702621],"length":1,"stats":{"Line":2}},{"line":59,"addre get: crate::cli::AddTarget,\n    path: String,\n    yes: bool,\n    verbose: bool, // Keep but don't pass to handlers yet\n) -\u003e Result\u003c()\u003e {\n    if !yes {\n        print_header(\n            \"evnx add\",\n            Some(\"Add environment variables to existing .env files\"),\n        );\n    }\n\n    let output_path = Path::new(\u0026path); // Convert to \u0026str\n\n    match target {\n        crate::cli::AddTarget::Service { service } =\u003e {\n            //service::handle(\u0026service, output_path, yes)?;  // Remove verbose\n            // service::handle expects (\u0026str, \u0026str, bool, bool)\n            service::handle(\u0026service, \u0026path, yes, verbose)?;\n        }\n        crate::cli::AddTarget::Framework {\n            language,\n            framework,\n        } =\u003e {\n            framework::handle(\u0026language, \u0026framework, output_path, yes, verbose)?;\n        }\n        crate::cli::AddTarget::Blueprint { blueprint } =\u003e {\n            blueprint::handle(\u0026blueprint, output_path, yes, verbose)?;\n        }\n        crate::cli::AddTarget::Custom =\u003e {\n            custom::handle(output_path, yes, verbose)?;\n        }\n    }\n\n    // Common next steps at end\n    if !yes {\n        print_next_steps(\u0026[\n            \"Edit .env and replace placeholder values\",\n            \"Run 'evnx validate' to check for issues\",\n            \"Use 'evnx add' again to add more variables\",\n        ]);\n    }\n    Ok(())\n}\n","traces":[{"line":23,"address":[6072688,6070640,6071700],"length":1,"stats":{"Line":0}},{"line":29,"address":[6681853],"length":1,"stats":{"Line":0}},{"line":36,"address":[6682061,6681964],"length":1,"stats":{"Line":0}},{"line":38,"address":[6682099],"length":1,"stats":{"Line":0}},{"line":39,"address":[6682172],"length":1,"stats":{"Line":0}},{"line":42,"address":[6682827,6682212,6682565],"length":1,"stats":{"Line":0}},{"line":44,"address":[6682246],"length":1,"stats":{"Line":0}},{"line":48 riables to .env.example?\",\n                vars.vars.len()\n            ))\n            .default(true)\n            .interact()?;\n\n        if !confirm {\n            println!(\"{}\", \"Aborted.\".yellow());\n            return Ok(());\n        }\n    }\n\n    // 5. Format as addition\n    let addition = formatter::format_addition(\u0026vars)?;\n\n    // 6. Append to .env.example\n    let example_path = Path::new(path).join(\".env.example\");\n\n    if example_path.exists() {\n        let existing =\n            fs::read_to_string(\u0026example_path).context(\"Failed to read existing .env.example\")?;\n\n        let updated = format!(\"{}\\n{}\", existing.trim_end(), addition);\n        fs::write(\u0026example_path, updated).context(\"Failed to write updated .env.example\")?;\n\n        println!(\n            \"{} Appended {} variables to .env.example\",\n            \"✓\".green(),\n            vars.vars.len()\n        );\n    } else {\n        // Create new file if doesn't exist\n        fs::write(\u0026example_path, addition.trim()).context(\"Failed to create .env.example\")?;\n        // println!(\"{} Created .env.example with {} variables\", \"✓\".green(), vars.vars.len());\n        success(format!(\n            \"Added {} variables for {}\",\n            vars.vars.len(),\n            service.display_name.as_deref().unwrap_or(service_id)\n        ));\n    }\n\n    // 7. Also update .env if it exists\n    let env_path = Path::new(path).join(\".env\");\n    if env_path.exists() {\n        let existing = fs::read_to_string(\u0026env_path)?;\n        // Add TODO comment for new vars\n        let todo_addition = addition\n            .lines()\n            .map(|line| {\n                if line.starts_with('#') || line.trim().is_empty() {\n                    line.to_string()\n                } else {\n                    format!(\"# TODO: {}  # \u003c-- Fill in real value\", line)\n                }\n            })\n            .collect::\u003cVec\u003c_\u003e\u003e()\n            .join(\"\\n\");\n\n        let updated = format!(\"{}\\n\\n{}\", existing.trim_end(), todo_addition);\n        fs::write(\u0026env_path, updated)?;\n        println!(\"{} Updated .env with TODO placeholders\", \"✓\".green());\n    }\n\n    Ok(())\n}\n","traces":[{"line":11,"address":[6930944,6931628,6931634],"length":1,"stats":{"Line":0}},{"line":12,"address":[6684195],"length":1,"stats":{"Line":0}},{"line":15,"address":[6684219],"length":1,"stats":{"Line":0}},{"line":19,"address":[6684396,6684790],"length":1,"stats":{"Line":0}},{"line":25,"address":[6685021,6684888,6684952],"length":1,"stats":{"Line":0}},{"line":31,"address":[6685106],"length":1,"stats":{"Line":0}},{"line":32,"address":[6931978],"length":1,"stats":{"Line":0}},{"line":33,"address":[6685185],"length":1,"stats":{"Line":0}},{"line":37,"address":[6685128],"length":1,"stats":{"Line":0}},{"line":38,"address":[6686246,6685508,6685890,6685953,6685784],"length":1,"stats":{"Line":0}},{"line":39,"address":[6685657,6685792,6685557],"length":1,"stats":{"Line":0}},{"line":41,"address":[6685565,6685641],"length":1,"stats":{"Line":0}},{"line":46,"address":[6686001],"length":1,"stats":{"Line":0}},{"line":47,"address":[6686009],"length":1,"stats":{"Line":0}},{"line":48,"address":[6686207],"length":1,"stats":{"Line":0}},{"line":53,"address":[6685527,6686278,6690144],"length":1,"stats":{"Line":0}},{"line":56,"address":[6686554,6686467],"length":1,"stats":{"Line":0}},{"line":58,"address":[6686594,6686677],"length":1,"stats":{"Line":0}},{"line":59,"address":[6686735,6690101,6687477],"length":1,"stats":{"Line":0}},{"line":62,"address":[6934476,6934559],"length":1,"stats":{"Line":0}},{"line":63,"address":[6688029,6690063],"length":1,"stats":{"Line":0}},{"line":65,"address":[6688222],"length":1,"stats":{"Line":0}},{"line":72,"address":[6686712,6686781,6687447],"length":1,"stats":{"Line":0}},{"line":74,"address":[6687186],"length":1,"stats":{"Line":0}},{"line":76,"address":[6687005],"length":1,"stats":{"Lin , line) in existing_content.lines().enumerate() {\n        let line = line.trim();\n\n        // Skip comments and empty lines\n        if line.starts_with('#') || line.is_empty() {\n            continue;\n        }\n\n        // Parse KEY=value\n        if let Some(eq_pos) = line.find('=') {\n            let key = line[..eq_pos].trim();\n            let value = line[eq_pos + 1..].trim();\n\n            // Check if this key is in new vars\n            if let Some(new_meta) = new_vars.vars.get(key) {\n                if value != new_meta.example_value {\n                    conflicts.push(Conflict {\n                        var_name: key.to_string(),\n                        existing_value: value.to_string(),\n                        new_value: new_meta.example_value.clone(),\n                        existing_line: line_num + 1,\n                    });\n                }\n            }\n        }\n    }\n\n    conflicts\n}\n\n/// Append content to .env.example and .env files\npub fn append_to_env_files(\n    output_path: \u0026Path,\n    addition: \u0026str,\n    mode: AppendMode,\n    verbose: bool,\n) -\u003e Result\u003c()\u003e {\n    let example_path = output_path.join(\".env.example\");\n    let env_path = output_path.join(\".env\");\n\n    // Handle .env.example\n    if example_path.exists() {\n        let existing = fs::read_to_string(\u0026example_path).context(\"Failed to read .env.example\")?;\n\n        let updated = match mode {\n            AppendMode::SkipConflicts =\u003e {\n                // This is handled upstream by filtering vars\n                format!(\"{}\\n{}\", existing.trim_end(), addition)\n            }\n            _ =\u003e format!(\"{}\\n{}\", existing.trim_end(), addition),\n        };\n\n        fs::write(\u0026example_path, updated).context(\"Failed to write .env.example\")?;\n\n        if verbose {\n            println!(\n                \"{} Appended to {}\",\n                \"[DEBUG]\".dimmed(),\n                example_path.display()\n            );\n        }\n    } else {\n        // Create new file\n        fs::write(\u0026example_path, addition.trim()).context(\"Failed to create .env.example\")?;\n\n        if verbose {\n            println!(\"{} Created {}\", \"[DEBUG]\".dimmed(), example_path.display());\n        }\n    }\n\n    // Handle .env (add TODO placeholders)\n    if env_path.exists() {\n        let existing = fs::read_to_string(\u0026env_path)?;\n\n        // Convert addition to TODO format\n        let todo_addition = addition\n            .lines()\n            .map(|line| {\n                // Preserve comments and section headers\n                if line.trim().is_empty() || line.trim().starts_with('#') || line.contains(\"──\")\n                {\n                    line.to_string()\n                } else if let Some(eq_pos) = line.find('=') {\n                    let _key = \u0026line[..eq_pos];\n                    let _value = \u0026line[eq_pos + 1..];\n                    format!(\"# TODO: {}  # \u003c-- Fill in real value\", line)\n                } else {\n                    line.to_string()\n                }\n            })\n            .collect::\u003cVec\u003c_\u003e\u003e()\n            .join(\"\\n\");\n\n        let updated = format!(\"{}\\n\\n{}\", existing.trim_end(), todo_addition);\n        fs::write(\u0026env_path, updated)?;\n\n        if verbose {\n            println!(\n                \"{} Updated {} with TODO placeholders\",\n                \"[DEBUG]\".dimmed(),\n                env_path.display()\n            );\n        }\n    }\n\n    Ok(())\n}\n\n/// Format a single variable as a .env line with optional metadata\npub fn format_var_line(\n    name: \u0026str,\n    example_value: \u0026str,\n    description: Option\u003c\u0026str\u003e,\n    required: bool,\n    _category: Option\u003c\u0026str\u003e,\n) -\u003e String {\n    let mut lines = Vec::new();\n\n    if let Some(desc) = description {\n        lines.push(format!(\"# {}\", desc));\n    }\n\n    lines.push(format!(\"{}={}\", name, example_value));\n\n    if required {\n        lines.push(\"  # (required)\".to_string());\n    }\n\n    lines.join(\"\\n\")\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::schema::models::{VarMetadata, VarSource};\n    // use std::collections::HashMap;\n\n    #[test]\n    fn test_detect_conflicts_finds_mismatched_values() {\n        let existing = \"DATABASE_URL=old_value\\nREDIS_URL=redis://localhost\\n\";\n\n        let mut vars = VarCollection::default();\n        vars.vars.insert(\n            \"DATABASE_URL\".to_string(),\n            VarMetadata {\n                example_value: \"new_value\".to_string(),\n                description: None,\n                category: None,\n                required: false,\n                source: VarSource::Service(\"postgresql\".to_string()),\n            },\n        );\n        vars.vars.insert(\n            \"REDIS_URL\".to_string(),\n            VarMetadata {\n                example_value: \"redis://localhost\".to_string(), // Same value = no conflict\n                description: None,\n                category: None,\n                required: false,\n                source: VarSource::Service(\"redis\".to_string()),\n            },\n        );\n\n        let conflicts = detect_conflicts(existing, \u0026vars);\n\n        assert_eq!(conflicts.len(), 1);\n        assert_eq!(conflicts[0].var_name, \"DATABASE_URL\");\n        assert_eq!(conflicts[0].existing_value, \"old_value\");\n        assert_eq!(conflicts[0].new_value, \"new_value\");\n    }\n\n    #[test]\n    fn test_format_var_line_with_metadata() {\n        let line = format_var_line(\n            \"API_KEY\",\n            \"sk_test_xxx\",\n            Some(\"API key for testing\"),\n            true,\n            Some(\"Auth\"),\n        );\n\n        assert!(line.contains(\"# API key for testing\"));\n        assert!(line.contains(\"API_KEY=sk_test_xxx\"));\n        assert!(line.contains(\"(required)\"));\n    }\n}\n","traces":[{"line":31,"address":[7475173,7473696,7475179],"length":1,"stats":{"Line":1}},{"line":32,"address":[7359991],"length":1,"stats":{"Line":1}},{"line":35,"address":[7445840,7445891],"length":1,"stats":{"Line":2}},{"line":36,"address":[7474053,7474151],"length":1,"stats":{"Line":2}},{"line":39,"address":[7474189],"length":1,"stats":{"Line":1}},{"line":44,"address":[7360516],"length":1,"stats":{"Line":1}},{"line":45,"address":[7446431],"length":1,"stats":{"Line":1}},{"line":46,"address":[7059005],"length":1,"stats":{"Line":1}},{"line":49,"address":[7446674],"length":1,"stats":{"Line":1}},{"line":50,"address":[7360951],"length":1,"stats":{"Line":1}},{"line":51,"address":[7361392,7361196],"length":1,"stats":{"Line":2}},{"line":52,"address":[7446805],"length":1,"stats":{"Line":1}},{"line":53,"address":[7059308],"length":1,"stats":{"Line":1}},{"line":54,"address":[7059392],"length":1,"stats":{"Line":1}},{"line":55,"address":[7475103,7474948],"length":1,"stats":{"Line":1}},{"line":62,"address":[7474092],"length":1,"stats":{"Line":1}},{"line":66,"address":[7448288,7451424,7447232],"length":1,"stats":{"Line":1}},{"line":72,"address":[7447363],"length":1,"stats":{"Line":1}},{"line":73,"address":[7475393],"length":1,"stats":{"Line":1}},{"line":76,"address":[7475470,7475550],"length":1,"stats":{"Line":2}},{"line":77,"address":[7362524,7365584,7361840],"length":1,"stats":{"Line":2}},{"line":79,"address":[7362775],"length":1,"stats":{"Line":1}},{"line":82,"address":[7476568,7476685],"length":1,"stats":{"Line":2}},{"line":84,"address":[7476599,7477022],"length":1,"stats":{"Line":2}},{"line":87,"address":[7476936,7479322,7477284],"length":1,"stats":{"Line":2}},{"line":89,"address":[7477441],"length":1,"stats":{"Line":1}},{"line":90,"address":[7363693],"length":1,"stats":{"Line":0}},{"line":98,"address":[7475662,7475577,7476270],"length":1,"stats":{"Line":0}},{"line":100,"address":[7475854],"length":1,"stats":{"Line":0}},{"line":101,"address":[7447926
