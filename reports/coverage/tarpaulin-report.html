Argon2id** (memory-hard KDF). Every backup\n//! uses a freshly generated random salt and nonce, so two backups of the same file\n//! with the same password always produce different ciphertext.\n//!\n//! ## Binary format (version 1)\n//!\n//! ```text\n//! ┌─────────┬────────────┬──────────┬────────────────────────────────┐\n//! │ version │    salt    │  nonce   │  AES-256-GCM ciphertext        │\n//! │  1 byte │  32 bytes  │ 12 bytes │  variable (JSON envelope)      │\n//! └─────────┴────────────┴──────────┴────────────────────────────────┘\n//! ```\n//!\n//! The entire structure is Base64-encoded (standard alphabet) before being written\n//! to disk. The ciphertext is the AES-256-GCM encryption of a JSON envelope:\n//!\n//! ```json\n//! {\n//!   \"version\": 1,\n//!   \"created_at\": \"2025-02-24T10:00:00Z\",\n//!   \"original_file\": \".env\",\n//!   \"tool_version\": \"0.1.0\",\n//!   \"content\": \"DATABASE_URL=...\\nSECRET_KEY=...\"\n//! }\n//! ```\n//!\n//! Embedding metadata *inside* the encrypted payload means it is both confidential\n//! (an attacker without the password cannot learn the filename or timestamp) and\n//! tamper-evident (altering metadata invalidates the GCM authentication tag).\n//!\n//! ## Argon2id parameters\n//!\n//! | Parameter   | Value    | Rationale                                 |\n//! |-------------|----------|-------------------------------------------|\n//! | variant     | Argon2id | Resistant to GPU and side-channel attacks |\n//! | memory      | 64 MiB   | Slows brute-force on commodity hardware   |\n//! | iterations  | 3        | Adds time cost on top of memory cost      |\n//! | parallelism | 1        | Single-threaded CLI usage                 |\n//! | output len  | 32 bytes | Exactly one AES-256 key                   |\n//!\n//! # Example\n//!\n//! ```bash\n//! evnx backup\n//! evnx backup --env .env.production --output prod.backup\n//! ```\n//!\n//! # Future work\n//!\n//! - `--key-file` flag: derive the key from a file instead of a password\n//!   (useful for automated/CI backup pipelines).\n//! - `--recipient` flag: asymmetric encryption (age / NaCl sealed boxes) so a\n//!   backup can be decrypted by a public-key holder without knowing the password.\n//! - Backup rotation: keep N most recent backups, auto-prune older ones.\n//! - Integrity manifest: store a SHA-256 hash of the plaintext so the restore\n//!   command can verify it was not silently corrupted after writing.\n\nuse anyhow::{anyhow, Context, Result};\nuse colored::*;\n\n/// Entry point for the `backup` subcommand.\n///\n/// When the `backup` feature is **not** enabled this prints a helpful message\n/// and exits cleanly — it does **not** panic or return an error.\n///\n/// # Arguments\n///\n/// * `env`     — Path to the `.env` file to back up (default: `.env`).\n/// * `output`  — Destination path for the encrypted backup (default: `\u003cenv\u003e.backup`).\n/// * `verbose` — Print extra diagnostic information during the run.\npub fn run(env: String, output: Option\u003cString\u003e, verbose: bool) -\u003e Result\u003c()\u003e {\n    // ── Feature-disabled stub ────────────────────────────────────────────────\n    #[cfg(not(feature = \"backup\"))]\n    {\n        // Reference parameters explicitly to silence unused-variable warnings\n        // without renaming them, keeping the signature consistent with main.rs.\n        let _ = (\u0026env, \u0026output, verbose);\n        println!(\"{} Backup feature not enabled\", \"✗\".red());\n        println!(\"Rebuild with: cargo build --features backup\");\n        return Ok(());\n    }\n\n    // ── Full implementation (feature = \"backup\") ─────────────────────────────\n    #[cfg(feature = \"backup\")]\n    {\n        use dialoguer::Password;\n        use std::fs;\n        use std::path::Path;\n\n        if verbose {\n            println!(\"{}\", \"Running backup in verbose mode\".dimmed());\n        }\n\n        println!(\n            \"\\n{}\",\n            \"┌─ Create encrypted backup ───────────────────────────┐\".cyan()\n        );\n        println!(\n            \"{}\",\n            \"│ Your .env will be encrypted with AES-256-GCM        │\".cyan()\n        );\n        println!(\n            \"{}\",\n            \"│ Key derived via Argon2id (64 MiB, 3 iterations)     │\".cyan()\n        );\n        println!(\n            \"{}\\n\",\n            \"└──────────────────────────────────────────────────────┘\".cyan()\n        );\n\n        // ── Validate source file ─────────────────────────────────────────────\n        if !Path::new(\u0026env).exists() {\n            return Err(anyhow!(\"File not found: {}\", env));\n        }\n\n        let content =\n            fs::read_to_string(\u0026env).with_context(|| format!(\"Failed to read {}\", env))?;\n\n        // Warn — but do not abort — if the file does not look like a .env file.\n        // The user might intentionally be backing up a non-standard file.\n        if !looks_like_dotenv(\u0026content) {\n            println!(\n                \"{} File does not look like a standard .env file — backing up anyway\",\n                \"⚠️\".yellow()\n            );\n        }\n\n        println!(\"{} Read {} bytes from {}\", \"✓\".green(), content.len(), env);\n\n        // ── Password prompt ──────────────────────────────────────────────────\n        let password = Password::new()\n            .with_prompt(\"Enter encryption password\")\n            .interact()?;\n\n        if password.is_empty() {\n            return Err(anyhow!(\"Password must not be empty\"));\n        }\n\n        // Minimum length check — Argon2id makes short passwords expensive to\n        // brute-force, but we still enforce a floor as a sanity guard.\n        if password.len() \u003c 8 {\n            return Err(anyhow!(\n                \"Password must be at least 8 characters (got {})\",\n                password.len()\n            ));\n        }\n\n        let password_confirm = Password::new().with_prompt(\"Confirm password\").interact()?;\n\n        if password != password_confirm {\n            return Err(anyhow!(\"Passwords do not match\"));\n        }\n\n        println!(\"{} Password accepted\", \"✓\".green());\n\n        // ── Encrypt ──────────────────────────────────────────────────────────\n        println!(\"Encrypting… (this may take a moment due to Argon2id key derivation)\");\n\n        let original_filename = Path::new(\u0026env)\n            .file_name()\n            .and_then(|n| n.to_str())\n            .unwrap_or(\".env\")\n            .to_string();\n\n        let encrypted = encrypt_content(\u0026content, \u0026password, \u0026original_filename)\n            .context(\"Encryption failed\")?;\n\n        // ── Write backup ─────────────────────────────────────────────────────\n        let output_path = output.unwrap_or_else(|| format!(\"{}.backup\", env));\n\n        fs::write(\u0026output_path, \u0026encrypted)\n            .with_context(|| format!(\"Failed to write backup to {}\", output_path))?;\n\n        let backup_size = std::fs::metadata(\u0026output_path)\n            .map(|m| m.len().to_string())\n            .unwrap_or_else(|_| \"unknown\".to_string());\n\n        println!(\"{} Backup created at {}\", \"✓\".green(), output_path);\n        println!(\"    Size: {} bytes (encrypted + Base64)\", backup_size);\n\n        println!(\"\\n{}\", \"⚠️  Important:\".yellow().bold());\n        println!(\"  • Keep your password safe — it cannot be recovered\");\n        println!(\"  • Store the backup in a secure, separate location\");\n        println!(\n            \"  • To restore: evnx restore {} --output {}\",\n            output_path, env\n        );\n        println!(\"  • Test the restore before deleting the original .env\");\n\n        Ok(())\n    }\n}\n\n// ── Encryption ────────────────────────────────────────────────────────────────\n\n/// Encrypt the plaintext content of a `.env` file.\n///\n/// Produces a Base64-encoded string containing the complete binary envelope:\n/// `version(1) || salt(32) || nonce(12) || AES-256-GCM-ciphertext`.\n///\n/// The ciphertext decrypts to a JSON envelope containing the `.env` content\n/// and metadata (see module-level documentation for the schema).\n///\n/// # Arguments\n///\n/// * `plaintext`          — The raw `.env` file content.\n/// * `password`           — User-supplied encryption password.\n/// * `original_filename`  — The filename (e.g. `.env`) stored in the metadata envelope so restore can surface it to the user.\n///\n/// # Errors\n///\n/// Returns an error if Argon2id key derivation or AES-256-GCM encryption fails.\n/// In practice these only fail with invalid parameters, which are hardcoded here.\n#[cfg(feature = \"backup\")]\nfn encrypt_content(plaintext: \u0026str, password: \u0026str, original_filename: \u0026str) -\u003e Result\u003cString\u003e {\n    use aes_gcm::{\n        aead::{rand_core::RngCore, Aead, KeyInit, OsRng},\n        Aes256Gcm, Nonce,\n    };\n    use argon2::{Algorithm, Argon2, Params, PasswordHasher, Version};\n    use base64::{engine::general_purpose, Engine as _};\n\n    // ── JSON metadata envelope ────────────────────────────────────────────────\n    // Stored inside the ciphertext so it is confidential and tamper-evident.\n    let created_at = chrono::Utc::now().format(\"%Y-%m-%dT%H:%M:%SZ\").to_string();\n    let envelope = serde_json::json!({\n        \"version\": 1,\n        \"created_at\": created_at,\n        \"original_file\": original_filename,\n        \"tool_version\": env!(\"CARGO_PKG_VERSION\"),\n        \"content\": plaintext,\n    });\n    let envelope_bytes =\n        serde_json::to_vec(\u0026envelope).context(\"Failed to serialise metadata envelope\")?;\n\n    // ── Argon2id key derivation ───────────────────────────────────────────────\n    // A fresh 32-byte salt is generated for every backup so two encryptions of\n    // the same file with the same password produce different ciphertext.\n    let mut salt_bytes = [0u8; 32];\n    OsRng.fill_bytes(\u0026mut salt_bytes);\n\n    // Explicit parameters pin the KDF behaviour regardless of library defaults.\n    // output_len = 32 guarantees exactly one AES-256 key's worth of material.\n    let params =\n        Params::new(65536, 3, 1, Some(32)).map_err(|e| anyhow!(\"Invalid Argon2 params: {}\", e))?;\n    let argon2 = Argon2::new(Algorithm::Argon2id, Version::V0x13, params);\n\n    let salt_string = argon2::password_hash::SaltString::encode_b64(\u0026salt_bytes)\n        .map_err(|e| anyhow!(\"Failed to encode salt for Argon2: {}\", e))?;\n\n    let password_hash = argon2\n        .hash_password(password.as_bytes(), \u0026salt_string)\n        .map_err(|e| anyhow!(\"Argon2id key derivation failed: {}\", e))?;\n\n    let hash_output = password_hash\n        .hash\n        .ok_or_else(|| anyhow!(\"Argon2id did not produce a hash output\"))?;\n\n    let key_bytes = hash_output.as_bytes();\n    if key_bytes.len() \u003c 32 {\n        return Err(anyhow!(\n            \"Derived key too short: {} bytes (expected 32)\",\n            key_bytes.len()\n        ));\n    }\n    let key: \u0026[u8; 32] = key_bytes[..32]\n        .try_into()\n        .map_err(|_| anyhow!(\"Key slice conversion failed\"))?;\n\n    // ── AES-256-GCM encryption ────────────────────────────────────────────────\n    let cipher = Aes256Gcm::new(key.into());\n\n    let mut nonce_bytes = [0u8; 12];\n    OsRng.fill_bytes(\u0026mut nonce_bytes);\n    let nonce = Nonce::from_slice(\u0026nonce_bytes);\n\n    let ciphertext = cipher\n        .encrypt(nonce, envelope_bytes.as_ref())\n        .map_err(|e| anyhow!(\"AES-256-GCM encryption failed: {}\", e))?;\n\n    // ── Assemble binary envelope ──────────────────────────────────────────────\n    // Layout: version(1) || salt(32) || nonce(12) || ciphertext(variable)\n    let mut result: Vec\u003cu8\u003e = Vec::with_capacity(1 + 32 + 12 + ciphertext.len());\n    result.push(1u8); // Version byte — increment when format changes\n    result.extend_from_slice(\u0026salt_bytes);\n    result.extend_from_slice(\u0026nonce_bytes);\n    result.extend_from_slice(\u0026ciphertext);\n\n    Ok(general_purpose::STANDARD.encode(\u0026result))\n}\n\n// ── Decryption (pub — used by restore.rs) ─────────────────────────────────────\n\n/// Decrypt a backup envelope produced by [`encrypt_content`].\n///\n/// This function is `pub` so that `restore.rs` can call it directly. Both\n/// commands live in the same `commands` module, keeping format logic in one\n/// place. If the binary format ever changes, bump the version byte here and\n/// add a new match arm — do **not** break decryption of existing version-1 files.\n///\n/// # Returns\n///\n/// A tuple of `(plaintext, metadata)`:\n/// - `plaintext` — The original `.env` file content.\n/// - `metadata`  — [`BackupMetadata`] with the original filename, creation timestamp, and tool version extracted from the JSON envelope.\n///\n/// # Errors\n///\n/// Returns a descriptive [`anyhow::Error`] for:\n/// - Base64 decode failure (not a evnx backup, or file is truncated).\n/// - Unknown format version (backup was made by a newer tool version).\n/// - Argon2id key derivation failure (should not occur with valid inputs).\n/// - AES-256-GCM decryption failure — almost always wrong password or tampered\n///   file; the error message deliberately does not distinguish these two cases\n///   to avoid leaking information.\n/// - JSON deserialisation failure (encrypted payload is internally corrupt).\n#[cfg(feature = \"backup\")]\npub fn decrypt_content(encoded: \u0026str, password: \u0026str) -\u003e Result\u003c(String, BackupMetadata)\u003e {\n    use aes_gcm::{\n        aead::{Aead, KeyInit},\n        Aes256Gcm, Nonce,\n    };\n    use argon2::{Algorithm, Argon2, Params, PasswordHasher, Version};\n    use base64::{engine::general_purpose, Engine as _};\n\n    // ── Base64 decode ─────────────────────────────────────────────────────────\n    let raw = general_purpose::STANDARD.decode(encoded.trim()).context(\n        \"Failed to Base64-decode the backup file. \\\n             Is this a valid evnx backup?\",\n    )?;\n\n    // Minimum valid size: 1 (version) + 32 (salt) + 12 (nonce) + 16 (GCM tag)\n    const MIN_LEN: usize = 1 + 32 + 12 + 16;\n    if raw.len() \u003c MIN_LEN {\n        return Err(anyhow!(\n            \"Backup file is too short ({} bytes, minimum {}). File may be corrupt.\",\n            raw.len(),\n            MIN_LEN\n        ));\n    }\n\n    // ── Parse binary envelope ─────────────────────────────────────────────────\n    let version = raw[0];\n    if version != 1 {\n        return Err(anyhow!(\n            \"Unsupported backup format version: {}. \\\n             This backup was created by a newer version of evnx. \\\n             Please upgrade the tool and try again.\",\n            version\n        ));\n    }\n\n    // Slice layout mirrors encrypt_content exactly.\n    let salt_bytes = \u0026raw[1..33]; // 32 bytes\n    let nonce_bytes = \u0026raw[33..45]; // 12 bytes\n    let ciphertext = \u0026raw[45..]; // remainder = GCM ciphertext + 16-byte tag\n\n    // ── Argon2id key re-derivation ────────────────────────────────────────────\n    // Same parameters as encrypt_content — if these ever change, add a version\n    // branch above and keep the old params here for backward compatibility.\n    let params =\n        Params::new(65536, 3, 1, Some(32)).map_err(|e| anyhow!(\"Invalid Argon2 params: {}\", e))?;\n    let argon2 = Argon2::new(Algorithm::Argon2id, Version::V0x13, params);\n\n    let salt_string = argon2::password_hash::SaltString::encode_b64(salt_bytes)\n        .map_err(|e| anyhow!(\"Failed to encode salt: {}\", e))?;\n\n    let password_hash = argon2\n        .hash_password(password.as_bytes(), \u0026salt_string)\n        .map_err(|e| anyhow!(\"Argon2id key derivation failed: {}\", e))?;\n\n    let hash_output = password_hash\n        .hash\n        .ok_or_else(|| anyhow!(\"Argon2id did not produce a hash output\"))?;\n\n    let key_bytes = hash_output.as_bytes();\n    if key_bytes.len() \u003c 32 {\n        return Err(anyhow!(\"Derived key too short: {} bytes\", key_bytes.len()));\n    }\n    let key: \u0026[u8; 32] = key_bytes[..32]\n        .try_into()\n        .map_err(|_| anyhow!(\"Key slice conversion failed\"))?;\n\n    // ── AES-256-GCM decryption ────────────────────────────────────────────────\n    let cipher = Aes256Gcm::new(key.into());\n    let nonce = Nonce::from_slice(nonce_bytes);\n\n    // Intentionally vague error — distinguishing \"wrong password\" from \"tampered\n    // file\" would leak information about which part of authentication failed.\n    let plaintext_bytes = cipher.decrypt(nonce, ciphertext).map_err(|_| {\n        anyhow!(\"Decryption failed. The password may be incorrect or the backup file is corrupt.\")\n    })?;\n\n    // ── Deserialise JSON envelope ─────────────────────────────────────────────\n    let envelope: serde_json::Value = serde_json::from_slice(\u0026plaintext_bytes)\n        .context(\"Decrypted payload is not valid JSON. The backup envelope may be corrupt.\")?;\n\n    let content = envelope[\"content\"]\n        .as_str()\n        .ok_or_else(|| anyhow!(\"Backup envelope is missing the 'content' field.\"))?\n        .to_string();\n\n    let metadata = BackupMetadata {\n        created_at: envelope[\"created_at\"]\n            .as_str()\n            .unwrap_or(\"unknown\")\n            .to_string(),\n        original_file: envelope[\"original_file\"]\n            .as_str()\n            .unwrap_or(\".env\")\n            .to_string(),\n        tool_version: envelope[\"tool_version\"]\n            .as_str()\n            .unwrap_or(\"unknown\")\n            .to_string(),\n    };\n\n    Ok((content, metadata))\n}\n\n// ── Supporting types ──────────────────────────────────────────────────────────\n\n/// Metadata extracted from a decrypted backup envelope.\n///\n/// Returned by [`decrypt_content`] so the `restore` command can display\n/// information about the backup before writing any files.\n#[cfg(feature = \"backup\")]\n#[derive(Debug)]\npub struct BackupMetadata {\n    /// ISO 8601 UTC timestamp recorded when the backup was created.\n    pub created_at: String,\n    /// The original filename (e.g. `.env`, `.env.production`).\n    pub original_file: String,\n    /// The `CARGO_PKG_VERSION` of the tool that created this backup.\n    pub tool_version: String,\n}\n\n// ── Helpers ───────────────────────────────────────────────────────────────────\n\n/// Heuristically check whether `content` resembles a `.env` file.\n///\n/// A file is considered valid if at least **80%** of its non-empty lines are:\n/// - blank lines,\n/// - comments beginning with `#`, or\n/// - `KEY=VALUE` assignments where KEY contains only alphanumerics and `_`.\n///\n/// This check is intentionally lenient — it exists to warn the user if they\n/// accidentally pass the wrong file, not to enforce strict `.env` grammar.\nfn looks_like_dotenv(content: \u0026str) -\u003e bool {\n    if content.trim().is_empty() {\n        return true;\n    }\n\n    let valid_line = |line: \u0026str| -\u003e bool {\n        let line = line.trim();\n        line.is_empty()\n            || line.starts_with('#')\n            || line\n                .split_once('=')\n                .map(|(key, _)| {\n                    !key.trim().is_empty()\n                        \u0026\u0026 key.trim().chars().all(|c| c.is_alphanumeric() || c == '_')\n                })\n                .unwrap_or(false)\n    };\n\n    let non_empty: Vec\u003c\u0026str\u003e = content.lines().filter(|l| !l.trim().is_empty()).collect();\n    if non_empty.is_empty() {\n        return true;\n    }\n    let valid_count = non_empty.iter().filter(|\u0026\u0026l| valid_line(l)).count();\n    // Integer equivalent of valid_count / total \u003e= 0.8\n    valid_count * 10 \u003e= non_empty.len() * 8\n}\n\n// ── Tests ─────────────────────────────────────────────────────────────────────\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    // ── looks_like_dotenv ─────────────────────────────────────────────────────\n\n    #[test]\n    fn test_looks_like_dotenv_valid() {\n        assert!(looks_like_dotenv(\n            \"# Database\\nDATABASE_URL=postgresql://localhost\\nSECRET_KEY=abc123\\n\"\n        ));\n    }\n\n    #[test]\n    fn test_looks_like_dotenv_empty() {\n        assert!(looks_like_dotenv(\"\"));\n        assert!(looks_like_dotenv(\"  \\n  \"));\n    }\n\n    #[test]\n    fn test_looks_like_dotenv_rejects_prose() {\n        assert!(!looks_like_dotenv(\n            \"This is just a plain text file.\\nWith no env vars at all.\\nWhatsoever.\"\n        ));\n    }\n\n    #[test]\n    fn test_looks_like_dotenv_comments_and_blanks() {\n        assert!(looks_like_dotenv(\"# Comment\\n\\n# Another\\nKEY=value\\n\"));\n    }\n\n    // ── Encrypt / decrypt roundtrip ───────────────────────────────────────────\n\n    #[test]\n    #[cfg(feature = \"backup\")]\n    fn test_roundtrip() {\n        let plaintext = \"DATABASE_URL=postgresql://localhost:5432/db\\nSECRET_KEY=abc123\\n\";\n        let password = \"correct-horse-battery-staple\";\n        let filename = \".env\";\n\n        let encrypted =\n            encrypt_content(plaintext, password, filename).expect(\"encryption must succeed\");\n\n        assert!(!encrypted.is_empty());\n        assert_ne!(encrypted, plaintext);\n\n        let (decrypted, metadata) =\n            decrypt_content(\u0026encrypted, password).expect(\"decryption must succeed\");\n\n        assert_eq!(\n            decrypted, plaintext,\n            \"roundtrip must recover original content\"\n        );\n        assert_eq!(metadata.original_file, filename);\n        assert_eq!(metadata.tool_version, env!(\"CARGO_PKG_VERSION\"));\n        assert!(!metadata.created_at.is_empty());\n    }\n\n    #[test]\n    #[cfg(feature = \"backup\")]\n    fn test_wrong_password_returns_error() {\n        let encrypted =\n            encrypt_content(\"KEY=val\\n\", \"correct\", \".env\").expect(\"encryption must succeed\");\n\n        let result = decrypt_content(\u0026encrypted, \"wrong\");\n        assert!(result.is_err(), \"wrong password must return an error\");\n\n        // Error message must be user-friendly and not expose internal details.\n        let msg = result.unwrap_err().to_string();\n        assert!(\n            msg.contains(\"incorrect\") || msg.contains(\"corrupt\"),\n            \"unexpected error message: {msg}\"\n        );\n    }\n\n    #[test]\n    #[cfg(feature = \"backup\")]\n    fn test_tampered_ciphertext_is_rejected() {\n        use base64::{engine::general_purpose, Engine as _};\n\n        let encrypted =\n            encrypt_content(\"KEY=value\\n\", \"password\", \".env\").expect(\"encryption must succeed\");\n\n        let mut raw = general_purpose::STANDARD.decode(\u0026encrypted).unwrap();\n        // Flip a byte well into the ciphertext region (after the 45-byte header).\n        let idx = raw.len() - 5;\n        raw[idx] ^= 0xFF;\n        let tampered = general_purpose::STANDARD.encode(\u0026raw);\n\n        assert!(\n            decrypt_content(\u0026tampered, \"password\").is_err(),\n            \"tampered ciphertext must be rejected\"\n        );\n    }\n\n    #[test]\n    #[cfg(feature = \"backup\")]\n    fn test_two_encryptions_produce_different_ciphertext() {\n        // Random salt + nonce mean identical inputs → different outputs.\n        let a = encrypt_content(\"KEY=value\\n\", \"password\", \".env\").unwrap();\n        let b = encrypt_content(\"KEY=value\\n\", \"password\", \".env\").unwrap();\n        assert_ne!(a, b);\n    }\n\n    #[test]\n    #[cfg(feature = \"backup\")]\n    fn test_metadata_round_trips() {\n        let (_, meta) = decrypt_content(\n            \u0026encrypt_content(\"KEY=val\\n\", \"pass12345\", \".env.production\").unwrap(),\n            \"pass12345\",\n        )\n        .unwrap();\n\n        assert_eq!(meta.original_file, \".env.production\");\n        assert!(!meta.created_at.is_empty());\n        assert_eq!(meta.tool_version, env!(\"CARGO_PKG_VERSION\"));\n    }\n}\n","traces":[{"line":76,"address":[6594312,6593952],"length":1,"stats":{"Line":0}},{"line":83,"address":[6593980,6594054],"length":1,"stats":{"Line":0}},{"line":84,"address":[6594192],"length":1,"stats":{"Line":0}},{"line":454,"address":[6593440,6593929,6593935],"length":1,"stats":{"Line":4}},{"line":455,"address":[6593473],"length":1,"stats":{"Line":4}},{"line":456,"address":[6593584],"length":1,"stats":{"Line":1}},{"line":459,"address":[6804176],"length":1,"stats":{"Line":3}},{"line":460,"address":[6804221],"length":1,"stats":{"Line":3}},{"line":461,"address":[6804288,6804252],"length":1,"stats":{"Line":5}},{"line":462,"address":[6776303],"length":1,"stats":{"Line":3}},{"line":464,"address":[6804305],"length":1,"stats":{"Line":1}},{"line":465,"address":[6776353,6776400,6776407],"length":1,"stats":{"Line":7}},{"line":466,"address":[6706258,6706333],"length":1,"stats":{"Line":2}},{"line":467,"address":[6706380,6706288,6706352],"length":1,"stats":{"Line":3}},{"line":469,"address":[6804332],"length":1,"stats":{"Line":1}},{"line":472,"address":[6776112,6776126],"length":1,"stats":{"Line":8}},{"line":473,"address":[6593639,6593569],"length":1,"stats":{"Line":6}},{"line":474,"address":[6593671],"length":1,"stats":{"Line":0}},{"line":476,"address":[6705984,6705997],"length":1,"stats":{"Line":12}},{"line":478,"address":[6593786,6593897],"length":1,"stats":{"Line":1}}],"covered":16,"coverable":20},{"path":["/","home","ajit","Documents","dotenv-space-cli","src","commands","convert.rs"],"content":"//! Convert command - transform .env to different formats\nuse anyhow::{Context, Result};\nuse colored::*;\nuse dialoguer::Select;\nuse std::fs;\n\nuse crate::core::{\n    converter::{ConvertOptions, Converter, KeyTransform},\n    Parser,\n};\nuse crate::formats;\n\n// Run the convert command\n//\n// Converts .env file to various output formats with optional filtering and transformation.\n//\n// # Arguments\n//\n// * `env` - Path to .env file\n// * `to` - Target format (None = interactive mode)\n// * `output` - Optional output file (None = stdout)\n// * `include` - Include only matching vars (glob pattern)\n// * `exclude` - Exclude matching vars (glob pattern)\n// * `base64` - Base64-encode all values\n// * `prefix` - Add prefix to all keys\n// * `transform` - Key transformation (uppercase/lowercase/camelCase/snake_case)\n// * `verbose` - Enable verbose output\n//\n// # Supported Formats (14)\n//\n// **Generic:** json, yaml, shell\n// **Cloud:** aws-secrets, gcp-secrets, azure-keyvault\n// **CI/CD:** github-actions\n// **Containers:** docker-compose, kubernetes\n// **IaC:** terraform\n// **Secret Managers:** doppler, heroku, vercel, railway\n#[allow(clippy::too_many_arguments)]\npub fn run(\n    env: String,\n    to: Option\u003cString\u003e,\n    output: Option\u003cString\u003e,\n    include: Option\u003cString\u003e,\n    exclude: Option\u003cString\u003e,\n    base64: bool,\n    prefix: Option\u003cString\u003e,\n    transform: Option\u003cString\u003e,\n    verbose: bool,\n) -\u003e Result\u003c()\u003e {\n    if verbose {\n        println!(\"{}\", \"Running convert in verbose mode\".dimmed());\n    }\n\n    // Parse .env file\n    let parser = Parser::default();\n    let env_file = parser\n        .parse_file(\u0026env)\n        .with_context(|| format!(\"Failed to parse {}\", env))?;\n\n    if verbose {\n        println!(\"Loaded {} variables from {}\", env_file.vars.len(), env);\n    }\n\n    // // Build conversion options\n    // let mut options = ConvertOptions::default();\n    // options.include_pattern = include;\n    // options.exclude_pattern = exclude;\n    // options.base64 = base64;\n    // options.prefix = prefix;\n    // options.transform = transform.as_ref().and_then(|t| match t.as_str() {\n    //     \"uppercase\" =\u003e Some(KeyTransform::Uppercase),\n    //     \"lowercase\" =\u003e Some(KeyTransform::Lowercase),\n    //     \"camelCase\" =\u003e Some(KeyTransform::CamelCase),\n    //     \"snake_case\" =\u003e Some(KeyTransform::SnakeCase),\n    //     _ =\u003e None,\n    // });\n    let options = ConvertOptions {\n        include_pattern: include,\n        exclude_pattern: exclude,\n        base64,\n        prefix,\n        transform: transform.as_ref().and_then(|t| match t.as_str() {\n            \"uppercase\" =\u003e Some(KeyTransform::Uppercase),\n            \"lowercase\" =\u003e Some(KeyTransform::Lowercase),\n            \"camelCase\" =\u003e Some(KeyTransform::CamelCase),\n            \"snake_case\" =\u003e Some(KeyTransform::SnakeCase),\n            _ =\u003e None,\n        }),\n    };\n\n    // Determine format\n    let format = match to {\n        Some(f) =\u003e f,\n        None =\u003e {\n            // Interactive mode\n            println!(\n                \"\\n{}\",\n                \"┌─ Convert environment variables ─────────────────────┐\".cyan()\n            );\n            println!(\n                \"{}\",\n                \"│ Transform .env into different formats               │\".cyan()\n            );\n            println!(\n                \"{}\\n\",\n                \"└──────────────────────────────────────────────────────┘\".cyan()\n            );\n\n            let formats = vec![\n                // Generic formats (always show first)\n                \"json - Generic JSON key-value object\",\n                \"yaml - Generic YAML key-value format\",\n                \"shell - Shell export script (bash/zsh)\",\n                // Cloud providers\n                \"aws-secrets - AWS Secrets Manager (CLI commands)\",\n                \"gcp-secrets - GCP Secret Manager (gcloud commands)\",\n                \"azure-keyvault - Azure Key Vault (az CLI commands)\",\n                // CI/CD platforms\n                \"github-actions - GitHub Actions secrets (ready to paste)\",\n                // Container platforms\n                \"docker-compose - Docker Compose YAML environment\",\n                \"kubernetes - Kubernetes Secret YAML (base64 encoded)\",\n                // Infrastructure as Code\n                \"terraform - Terraform .tfvars file\",\n                // Secret management platforms\n                \"doppler - Doppler secrets JSON format\",\n                \"heroku - Heroku config vars (CLI commands)\",\n                \"vercel - Vercel environment variables JSON\",\n                \"railway - Railway variables JSON format\",\n            ];\n\n            let selection = Select::new()\n                .with_prompt(\"Select output format\")\n                .items(\u0026formats)\n                .default(0)\n                .interact()?;\n\n            // Extract format name (everything before first dash and space)\n            formats[selection]\n                .split('-')\n                .next()\n                .unwrap()\n                .trim()\n                .to_string()\n        }\n    };\n\n    // Get converter\n    // Note: Using qualified paths (formats::JsonConverter) instead of\n    // full paths (formats::json::JsonConverter) to avoid import warnings\n    let converter: Box\u003cdyn Converter\u003e = match format.as_str() {\n        // Generic formats\n        \"json\" =\u003e Box::new(formats::JsonConverter),\n        \"yaml\" | \"yml\" =\u003e Box::new(formats::YamlConverter),\n        \"shell\" | \"bash\" | \"export\" =\u003e Box::new(formats::ShellExportConverter),\n\n        // Cloud providers\n        \"aws\" | \"aws-secrets\" | \"aws-secrets-manager\" =\u003e Box::new(formats::AwsSecretsConverter),\n        \"gcp\" | \"gcp-secrets\" | \"gcp-secret-manager\" =\u003e {\n            Box::new(formats::GcpSecretConverter::default())\n        }\n        \"azure\" | \"azure-keyvault\" | \"azure-key-vault\" =\u003e {\n            Box::new(formats::AzureKeyVaultConverter::default())\n        }\n\n        // CI/CD platforms\n        \"github\" | \"github-actions\" | \"gh-actions\" =\u003e {\n            Box::new(formats::GitHubActionsConverter::default())\n        }\n\n        // Container platforms\n        \"docker\" | \"docker-compose\" | \"compose\" =\u003e Box::new(formats::DockerComposeConverter),\n        \"kubernetes\" | \"k8s\" | \"kubectl\" =\u003e Box::new(formats::KubernetesSecretConverter::default()),\n\n        // Infrastructure as Code\n        \"terraform\" | \"tfvars\" | \"tf\" =\u003e Box::new(formats::TerraformConverter),\n\n        // Secret management platforms\n        \"doppler\" =\u003e Box::new(formats::DopplerConverter),\n        \"heroku\" =\u003e Box::new(formats::HerokuConfigConverter::default()),\n        \"vercel\" =\u003e Box::new(formats::VercelEnvConverter),\n        \"railway\" =\u003e Box::new(formats::RailwayConverter),\n\n        // Unknown format\n        _ =\u003e {\n            eprintln!(\"{} Unknown format: {}\", \"✗\".red(), format);\n            eprintln!();\n            eprintln!(\"{}\", \"Supported formats:\".bold());\n            eprintln!();\n            eprintln!(\"  {}\", \"Generic:\".yellow());\n            eprintln!(\"    json, yaml, shell\");\n            eprintln!();\n            eprintln!(\"  {}\", \"Cloud providers:\".yellow());\n            eprintln!(\"    aws-secrets, gcp-secrets, azure-keyvault\");\n            eprintln!();\n            eprintln!(\"  {}\", \"CI/CD:\".yellow());\n            eprintln!(\"    github-actions\");\n            eprintln!();\n            eprintln!(\"  {}\", \"Containers:\".yellow());\n            eprintln!(\"    docker-compose, kubernetes\");\n            eprintln!();\n            eprintln!(\"  {}\", \"Infrastructure:\".yellow());\n            eprintln!(\"    terraform\");\n            eprintln!();\n            eprintln!(\"  {}\", \"Secret managers:\".yellow());\n            eprintln!(\"    doppler, heroku, vercel, railway\");\n            eprintln!();\n            eprintln!(\"  {}\", \"Aliases:\".di 6808958],"length":1,"stats":{"Line":0}},{"line":233,"address":[6809029],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":73},{"path":["/","home","ajit","Documents","dotenv-space-cli","src","commands","diff.rs"],"content":"/// Diff command - compare .env and .env.example\n///\n/// Shows missing, extra, and different variables between two env files\nuse anyhow::{Context, Result};\nuse colored::*;\nuse serde::{Deserialize, Serialize};\nuse std::collections::{HashMap, HashSet};\n\nuse crate::core::Parser;\n\n#[derive(Debug, Serialize, Deserialize)]\npub struct DiffResult {\n    pub missing: Vec\u003cString\u003e,\n    pub extra: Vec\u003cString\u003e,\n    pub different: Vec\u003cDiffItem\u003e,\n}\n\n#[derive(Debug, Serialize, Deserialize)]\npub struct DiffItem {\n    pub key: String,\n    pub example_value: String,\n    pub env_value: String,\n}\n\npub fn run(\n    env: String,\n    example: String,\n    show_values: bool,\n    format: String,\n    reverse: bool,\n    verbose: bool,\n) -\u003e Result\u003c()\u003e {\n    if verbose {\n        println!(\"{}\", \"Running diff in verbose mode\".dimmed());\n    }\n\n    println!(\n        \"\\n{}\",\n        \"┌─ Comparing .env ↔ .env.example ─────────────────────┐\".cyan()\n    );\n    println!(\n        \"{}\\n\",\n        \"└──────────────────────────────────────────────────────┘\".cyan()\n    );\n\n    let parser = Parser::default();\n\n    let env_file = parser\n        .parse_file(\u0026env)\n        .with_context(|| format!(\"Failed to parse {}\", env))?;\n\n    let example_file = parser\n        .parse_file(\u0026example)\n        .with_context(|| format!(\"Failed to parse {}\", example))?;\n\n    let (left, right, left_name, right_name) = if reverse {\n        (\u0026example_file.vars, \u0026env_file.vars, \u0026example, \u0026env)\n    } else {\n        (\u0026env_file.vars, \u0026example_file.vars, \u0026env, \u0026example)\n    };\n\n    let diff = compute_diff(left, right);\n\n    match format.as_str() {\n        \"json\" =\u003e output_json(\u0026diff)?,\n        \"patch\" =\u003e output_patch(\u0026diff, left, right)?,\n        _ =\u003e output_pretty(\u0026diff, left, right, left_name, right_name, show_values)?,\n    }\n\n    Ok(())\n}\n\nfn compute_diff(left: \u0026HashMap\u003cString, String\u003e, right: \u0026HashMap\u003cString, String\u003e) -\u003e DiffResult {\n    let left_keys: HashSet\u003c_\u003e = left.keys().cloned().collect();\n    let right_keys: HashSet\u003c_\u003e = right.keys().cloned().collect();\n\n    let missing: Vec\u003cString\u003e = right_keys.difference(\u0026left_keys).cloned().collect();\n\n    let extra: Vec\u003cString\u003e = left_keys.difference(\u0026right_keys).cloned().collect();\n\n    let mut different = Vec::new();\n    for key in left_keys.intersection(\u0026right_keys) {\n        let left_val = left.get(key).unwrap();\n        let right_val = right.get(key).unwrap();\n\n        if left_val != right_val {\n            different.push(DiffItem {\n                key: key.clone(),\n                example_value: right_val.clone(),\n                env_value: left_val.clone(),\n            });\n        }\n    }\n\n    DiffResult {\n        missing,\n        extra,\n        different,\n    }\n}\n\nfn output_pretty(\n    diff: \u0026DiffResult,\n    left: \u0026HashMap\u003cString, String\u003e,\n    right: \u0026HashMap\u003cString, String\u003e,\n    left_name: \u0026str,\n    right_name: \u0026str,\n    show_values: bool,\n) -\u003e Result\u003c()\u003e {\n    let has_changes =\n        !diff.missing.is_empty() || !diff.extra.is_empty() || !diff.different.is_empty();\n\n    if !has_changes {\n        println!(\"{} Files are identical\", \"✓\".green());\n        return Ok(());\n    }\n\n    if !diff.missing.is_empty() {\n        println!(\n            \"{}\",\n            format!(\"Missing from {} (present in {}):\", left_name, right_name).bold()\n        );\n        for key in \u0026diff.missing {\n            if show_values {\n                if let Some(val) = right.get(key) {\n                    println!(\"  {} {} = {}\", \"+\".green(), key.bold(), val.dimmed());\n                }\n            } else {\n                println!(\"  {} {}\", \"+\".green(), key.bold());\n            }\n        }\n        println!();\n    }\n\n    if !diff.extra.is_empty() {\n        println!(\n            \"{}\",\n            format!(\"Extra in {} (not in {}):\", left_name, right_name).bold()\n        );\n        for key in \u0026diff.extra {\n            if show_values {\n                if let Some(val) = left.get(key) {\n                    println!(\"  {} {} = {}\", \"-\".red(), key.bold(), val.dimmed());\n                }\n            } else {\n                println!(\"  {} {}\", \"-\".red(), key.bold());\n            }\n        }\n        println!();\n    }\n\n    if !diff.different.is_empty() {\n        println!(\"{}\", \"Different values:\".bold());\n        for item in \u0026diff.different {\n            println!(\"  {} {}\", \"~\".yellow(), item.key.bold());\n            if show_values {\n                println!(\"    {}: {}\", right_name, item.example_value.dimmed());\n                println!(\"    {}: {}\", left_name, item.env_value.dimmed());\n            }\n        }\n        println!();\n    }\n\n    println!(\"{}\", \"Summary:\".bold());\n    println!(\"  {} missing (add to {})\", diff.missing.len(), left_name);\n    println!(\n        \"  {} extra (consider removing or adding to {})\",\n        diff.extra.len(),\n        right_name\n    );\n    println!(\"  {} different values\", diff.different.len());\n\n    Ok(())\n}\n\nfn output_json(diff: \u0026DiffResult) -\u003e Result\u003c()\u003e {\n    let json = serde_json::to_string_pretty(diff)?;\n    println!(\"{}\", json);\n    Ok(())\n}\n\nfn output_patch(\n    diff: \u0026DiffResult,\n    left: \u0026HashMap\u003cString, String\u003e,\n    right: \u0026HashMap\u003cString, String\u003e,\n) -\u003e Result\u003c()\u003e {\n    println!(\"# Add these to .env:\");\n    for key in \u0026diff.missing {\n        if let Some(val) = right.get(key) {\n            println!(\"+ {}={}\", key, val);\n        }\n    }\n\n    println!(\"\\n# Remove these from .env:\");\n    for key in \u0026diff.extra {\n        if let Some(val) = left.get(key) {\n            println!(\"- {}={}\", key, val);\n        }\n    }\n\n    println!(\"\\n# Update these in .env:\");\n    for item in \u0026diff.different {\n        println!(\"- {}={}\", item.key, item.env_value);\n        println!(\"+ {}={}\", item.key, item.example_value);\n    }\n\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_compute_diff() {\n        let mut left = HashMap::new();\n        left.insert(\"KEY1\".to_string(), \"value1\".to_string());\n        left.insert(\"KEY2\".to_string(), \"value2\".to_string());\n        left.insert(\"EXTRA\".to_string(), \"extra\".to_string());\n\n        let mut right = HashMap::new();\n        right.insert(\"KEY1\".to_string(), \"value1\".to_string());\n        right.insert(\"KEY2\".to_string(), \"different\".to_string());\n        right.insert(\"MISSING\".to_string(), \"missing\".to_string());\n\n        let diff = compute_diff(\u0026left, \u0026right);\n\n        assert_eq!(diff.missing, vec![\"MISSING\"]);\n        assert_eq!(diff.extra, vec![\"EXTRA\"]);\n        assert_eq!(diff.different.len(), 1);\n        assert_eq!(diff.different[0].key, \"KEY2\");\n    }\n}\n","traces":[{"line":25,"address":[5692403,5692502,5689744],"length":1,"stats":{"Line":0}},{"line":33,"address":[6098195],"length":1,"stats":{"Line":0}},{"line":34,"address":[6098233,6098316],"length":1,"stats":{"Line":0}},{"line":37,"address":[7250403],"length":1,"stats":{"Line":0}},{"line":41,"address":[7222633],"length":1,"stats":{"Line":0}},{"line":46,"address":[7222792],"length":1,"stats":{"Line":0}},{"line":48,"address":[7250929,7250849,7252842],"length":1,"stats":{"Line":0}},{"line":49,"address":[5690511]," .exists() {\n        println!(\"  {} File exists at .env\", \"✓\".green());\n\n        // Check permissions (Unix only)\n        #[cfg(unix)]\n        {\n            use std::os::unix::fs::PermissionsExt;\n            let metadata = std::fs::metadata(\".env\")?;\n            let mode = metadata.permissions().mode();\n            if mode \u0026 0o044 != 0 {\n                println!(\n                    \"  {} File has {:o} permissions (should be 600 for security)\",\n                    \"⚠️\".yellow(),\n                    mode \u0026 0o777\n                );\n                warnings += 1;\n            } else {\n                println!(\"  {} File has secure permissions (600)\", \"✓\".green());\n            }\n        }\n\n        // Check if in .gitignore\n        if Path::new(\".gitignore\").exists() {\n            let gitignore = std::fs::read_to_string(\".gitignore\")?;\n            if gitignore.contains(\".env\") {\n                println!(\"  {} File is in .gitignore\", \"✓\".green());\n            } else {\n                println!(\"  {} File is NOT in .gitignore (should be)\", \"✗\".red());\n                issues += 1;\n            }\n        }\n    } else {\n        println!(\"  {} File does not exist\", \"✗\".red());\n        issues += 1;\n    }\n\n    // Check .env.example\n    println!(\"\\n{}\", \"Checking .env.example...\".bold());\n    if Path::new(\".env.example\").exists() {\n        println!(\"  {} File exists\", \"✓\".green());\n\n        // Check if tracked in Git\n        if std::process::Command::new(\"git\")\n            .args([\"ls-files\", \"--error-unmatch\", \".env.example\"])\n            .output()\n            .map(|o| o.status.success())\n            .unwrap_or(false)\n        {\n            println!(\"  {} File is tracked in Git\", \"✓\".green());\n        } else {\n            println!(\"  {} File is NOT tracked in Git (should be)\", \"✗\".red());\n            issues += 1;\n        }\n    }\n\n    // Check project structure\n Select Services (MultiSelect, grouped)\n    let service_groups = loader::get_services_grouped();\n    let (service_items, service_ids): (Vec\u003cString\u003e, Vec\u003cString\u003e) = service_groups\n        .iter()\n        .flat_map(|(group, services)| {\n            services\n                .iter()\n                .map(move |(id, name)| (format!(\"[{}] {}\", group, name), id.to_string()))\n        })\n        .unzip();\n\n    let selected_svc_indices = if yes {\n        // Default: select first service from first group\n        vec![0]\n    } else {\n        MultiSelect::new()\n            .with_prompt(\"Select services you'll use (Space to toggle, Enter to confirm):\")\n            .items(\u0026service_items)\n            .interact()?\n    };\n\n    let selected_services: Vec\u003cString\u003e = selected_svc_indices\n        .iter()\n        .filter_map(|\u0026idx| service_ids.get(idx).cloned())\n        .collect();\n\n    // Step 4: Select Infrastructure (optional, MultiSelect)\n    let infra_items: Vec\u003c_\u003e = loader::schema()?\n        .infrastructure\n        .keys()\n        .map(|k| (k.as_str(), format!(\"[Infra] {}\", k)))\n        .collect();\n\n    let infra_display: Vec\u003cString\u003e = infra_items.iter().map(|(_, d)| d.clone()).collect();\n    let infra_ids: Vec\u003cString\u003e = infra_items.iter().map(|(id, _)| id.to_string()).collect();\n\n    let selected_infra_indices = if yes {\n        vec![] // Default: no infra in non-interactive\n    } else {\n        MultiSelect::new()\n            .with_prompt(\"Select deployment/infrastructure (optional):\")\n            .items(\u0026infra_display)\n            .interact()?\n    };\n\n    let selected_infra: Vec\u003cString\u003e = selected_infra_indices\n        .iter()\n        .filter_map(|\u0026idx| infra_ids.get(idx).cloned())\n        .collect();\n\n    if verbose {\n        info(\"Selection summary:\");\n        // println!(\"{}\", \"[DEBUG] Selection summary:\".dimmed());\n        pr e {\n        Select::new()\n            .with_prompt(\"Choose a stack blueprint:\")\n            .items(\u0026display_items)\n            .default(0)\n            .interact()?\n    };\n\n    let (selected_id, _) = blueprints[selection];\n    let blueprint = loader::get_blueprint(selected_id)\n        .context(format!(\"Blueprint '{}' not found\", selected_id))?;\n\n    if verbose {\n        println!(\n            \"{} Resolving blueprint: {} ({})\",\n            \"[DEBUG]\".dimmed(),\n            blueprint.name,\n            selected_id\n        );\n    }\n\n    // Resolve variables\n    let vars =\n        resolver::resolve_blueprint(blueprint).context(\"Failed to resolve blueprint variables\")?;\n\n    // Show preview\n    // println!(\"\\n{}\", \"📋 Preview:\".bold());\n    // println!(\"{}\", formatter::generate_preview(\u0026vars).dimmed());\n    // Preview section\n    if !yes {\n        print_preview_header(); // 📋 Preview:\n        println!(\"{}\", formatter::generate_preview(\u0026vars).dimmed());\n    }\n\n    if !yes {\n        let confirm = dialoguer::Confirm::new()\n            .with_prompt(\"Generate .env files with these variables?\")\n            .default(true)\n            .interact()?;\n\n        if !confirm {\n            println!(\"{}\", \"Aborted.\".yellow());\n            return Ok(());\n        }\n    }\n\n    // Format and write files\n    let example_content = formatter::format_env_example(\u0026vars, true)?;\n    let template_content = formatter::format_env_template(\u0026vars)?;\n\n    let output_path = Path::new(\u0026path);\n    write_env_files(output_path, \u0026example_content, \u0026template_content)?;\n\n    success(format!(\n        \"Created .env.example with {} variables\",\n        vars.vars.len()\n    ));\n\n    Ok(())\n}\n","traces":[{"line":11,"address":[6556256,6560493,6557283],"length":1,"stats":{"Line":0}},{"line":12,"address":[6520680],"length":1,"stats":{"Line":0}},{"line":13,"address":[5845396,5845494],"length":1,"stats":
