= false\n//!\n//! [validate]\n//! strict = true\n//! format = \"pretty\"\n//!\n//! [scan]\n//! ignore_placeholders = true\n//! exclude_patterns = [\"*.example\", \"*.template\"]\n//!\n//! [convert]\n//! default_format = \"json\"\n//!\n//! [aliases]\n//! gh = \"github-actions\"\n//! k8s = \"kubernetes\"\n//! ```\n\nuse anyhow::{Context, Result};\nuse serde::{Deserialize, Serialize};\nuse std::fs;\nuse std::path::{Path, PathBuf};\n\n/// Main configuration struct\n///\n/// ✅ CLIPPY FIX: Uses `#[derive(Default)]` instead of manual implementation\n#[derive(Debug, Deserialize, Serialize, Clone, Default)]\npub struct Config {\n    #[serde(default)]\n    pub defaults: Defaults,\n\n    #[serde(default)]\n    pub validate: ValidateConfig,\n\n    #[serde(default)]\n    pub scan: ScanConfig,\n\n    #[serde(default)]\n    pub convert: ConvertConfig,\n\n    #[serde(default)]\n    pub aliases: Aliases,\n}\n\n/// Default settings for file paths and general behavior\n#[derive(Debug, Deserialize, Serialize, Clone)]\npub struct Defaults {\n    #[serde(default = \"default_env_file\")]\n    pub env_file: String,\n\n    #[serde(default = \"default_example_file\")]\n    pub example_file: String,\n\n    #[serde(default)]\n    pub verbose: bool,\n}\n\n/// Configuration for validation command\n#[derive(Debug, Deserialize, Serialize, Clone)]\npub struct ValidateConfig {\n    #[serde(default)]\n    pub strict: bool,\n\n    #[serde(default)]\n    pub auto_fix: bool,\n\n    #[serde(default = \"default_format\")]\n    pub format: String,\n}\n\n/// Configuration for secret scanning command\n#[derive(Debug, Deserialize, Serialize, Clone)]\npub struct ScanConfig {\n    #[serde(default)]\n    pub ignore_placeholders: bool,\n\n    #[serde(default)]\n    pub exclude_patterns: Vec\u003cString\u003e,\n\n    #[serde(default = \"default_format\")]\n    pub format: String,\n}\n\n/// Configuration for format conversion command\n#[derive(Debug, Deserialize, Serialize, Clone)]\npub struct ConvertConfig {\n    #[serde(default = \"default_convert_format\")]\n    pub default_format: String,\n\n    #[serde(default)]\n    pub base64: bool,\n\n    pub prefix: Option\u003cString\u003e,\n    pub transform: Option\u003cString\u003e,\n}\n\n/// Custom format aliases for the convert command\n#[derive(Debug, Deserialize, Serialize, Clone, Default)]\npub struct Aliases {\n    #[serde(flatten)]\n    pub formats: std::collections::HashMap\u003cString, String\u003e,\n}\n\n// ✅ CLIPPY FIX: Removed manual impl Default for Config (using #[derive(Default)])\n\nimpl Default for Defaults {\n    fn default() -\u003e Self {\n        Self {\n            env_file: default_env_file(),\n            example_file: default_example_file(),\n            verbose: false,\n        }\n    }\n}\n\nimpl Default for ValidateConfig {\n    fn default() -\u003e Self {\n        Self {\n            strict: false,\n            auto_fix: false,\n            format: default_format(),\n        }\n    }\n}\n\nimpl Default for ScanConfig {\n    fn default() -\u003e Self {\n        Self {\n            ignore_placeholders: true,\n            exclude_patterns: vec![\n                \"*.example\".to_string(),\n                \"*.sample\".to_string(),\n                \"*.template\".to_string(),\n            ],\n            format: default_format(),\n        }\n    }\n}\n\nimpl Default for ConvertConfig {\n    fn default() -\u003e Self {\n        Self {\n            default_format: default_convert_format(),\n            base64: false,\n            prefix: None,\n            transform: None,\n        }\n    }\n}\n\nfn default_env_file() -\u003e String {\n    \".env\".to_string()\n}\n\nfn default_example_file() -\u003e String {\n    \".env.example\".to_string()\n}\n\nfn default_format() -\u003e String {\n    \"pretty\".to_string()\n}\n\nfn default_convert_format() -\u003e String {\n    \"json\".to_string()\n}\n\nimpl Config {\n    /// Load config from file\n    pub fn load() -\u003e Result\u003cSelf\u003e {\n        let path = Self::find_config_file()?;\n        Self::load_from_path(\u0026path)\n    }\n\n    /// Load config from specific path\n    pub fn load_from_path(path: \u0026Path) -\u003e Result\u003cSelf\u003e {\n        let content = fs::read_to_string(path)\n            .with_context(|| format!(\"Failed to read config from {}\", path.display()))?;\n\n        let config: Config = toml::from_str(\u0026content)\n            .with_context(|| format!(\"Failed to parse config from {}\", path.display()))?;\n\n        Ok(config)\n    }\n\n    /// Find config file by searching up the directory tree\n    pub fn find_config_file() -\u003e Result\u003cPathBuf\u003e {\n        let config_names = [\".evnx.toml\", \"evnx.toml\"];\n\n        // Start from current directory\n        let mut current_dir = std::env::current_dir()?;\n\n        loop {\n            for name in \u0026config_names {\n                let path = current_dir.join(name);\n                if path.exists() {\n                    return Ok(path);\n                }\n            }\n\n            // Move up one directory\n            if !current_dir.pop() {\n                break;\n            }\n        }\n\n        // Check home directory\n        if let Some(home) = dirs::home_dir() {\n            for name in \u0026config_names {\n                let path = home.join(name);\n                if path.exists() {\n                    return Ok(path);\n                }\n            }\n        }\n\n        // Return default config if no file found\n        Err(anyhow::anyhow!(\"No config file found\"))\n    }\n\n    /// Save config to file\n    pub fn save(\u0026self, path: \u0026Path) -\u003e Result\u003c()\u003e {\n        let toml = toml::to_string_pretty(self)?;\n        fs::write(path, toml)?;\n        Ok(())\n    }\n\n    /// Create example config file\n    pub fn create_example(path: \u0026Path) -\u003e Result\u003c()\u003e {\n        let example = r#\"# evnx configuration file\n# Place this in your project root or home directory\n\n[defaults]\nenv_file = \".env\"\nexample_file = \".env.example\"\nverbose = false\n\n[validate]\nstrict = false\nauto_fix = false\nformat = \"pretty\"  # Options: pretty, json, github-actions\n\n[scan]\nignore_placeholders = true\nexclude_patterns = [\"*.example\", \"*.sample\", \"*.template\"]\nformat = \"pretty\"  # Options: pretty, json, sarif\n\n[convert]\ndefault_format = \"json\"\nbase64 = false\n# prefix = \"APP_\"\n# transform = \"uppercase\"\n\n[aliases]\n# Format aliases for convert command\ngh = \"github-actions\"\nk8s = \"kubernetes\"\ntf = \"terraform\"\n\"#;\n        fs::write(path, example)?;\n        Ok(())\n    }\n\n    /// Merge with CLI arguments (CLI args take precedence)\n    pub fn merge_with_args(\u0026self, cli_verbose: bool) -\u003e Self {\n        let mut config = self.clone();\n        if cli_verbose {\n            config.defaults.verbose = true;\n        }\n        config\n    }\n\n    /// Resolve format alias\n    pub fn resolve_format_alias(\u0026self, format: \u0026str) -\u003e String {\n        self.aliases\n            .formats\n            .get(format)\n            .cloned()\n            .unwrap_or_else(|| format.to_string())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::io::Write;\n    use tempfile::NamedTempFile;\n\n    #[test]\n    fn test_default_config() {\n        let config = Config::default();\n        assert_eq!(config.defaults.env_file, \".env\");\n        assert_eq!(config.defaults.example_file, \".env.example\");\n        assert!(!config.defaults.verbose);\n    }\n\n    #[test]\n    fn test_load_from_toml() {\n        let toml = r#\"\n[defaults]\nenv_file = \"custom.env\"\nverbose = true\n\n[validate]\nstrict = true\n\n[scan]\nignore_placeholders = false\n\n[aliases]\ngh = \"github-actions\"\n\"#;\n\n        let mut file = NamedTempFile::new().unwrap();\n        file.write_all(toml.as_bytes()).unwrap();\n\n        let config = Config::load_from_path(file.path()).unwrap();\n        assert_eq!(config.defaults.env_file, \"custom.env\");\n        assert!(config.defaults.verbose);\n        assert!(config.validate.strict);\n        assert!(!config.scan.ignore_placeholders);\n        assert_eq!(\n            config.aliases.formats.get(\"gh\"),\n            Some(\u0026\"github-actions\".to_string())\n        );\n    }\n\n    #[test]\n    fn test_resolve_alias() {\n        let mut config = Config::default();\n        config\n            .aliases\n            .formats\n            .insert(\"gh\".to_string(), \"github-actions\".to_string());\n\n        assert_eq!(config.resolve_format_alias(\"gh\"), \"github-actions\");\n        assert_eq!(config.resolve_format_alias(\"json\"), \"json\");\n    }\n\n    #[test]\n    fn test_merge_with_args() {\n        let config = Config::default();\n        assert!(!config.defaults.verbose);\n\n        let merged = config.merge_with_args(true);\n        assert!(merged.defaults.verbose);\n    }\n\n    #[test]\n    fn test_create_example() {\n        let file = NamedTempFile::new().unwrap();\n        Config::create_example(file.path()).unwrap();\n\n        let content = fs::read_to_string(file.path()).unwrap();\n        assert!(content.contains(\"[defaults]\"));\n        assert!(content.contains(\"[validate]\"));\n        assert!(content.contains(\"[scan]\"));\n    }\n}\n","traces":[{"line":132,"address":[6569504,6569652,6569658],"length":1,"stats":{"Line":1}},{"line":134,"address":[6569518],"length":1,"stats":{"Line":1}},{"line":135,"address":[6659804],"length":1,"stats":{"Line":1}},{"line":142,"address":[6689248],"length":1,"stats":{"Line":1}},{"line":146,"address":[6361245],"length":1,"stats":{"Line":1}},{"line":152,"address":[6360927,6360400,6360933],"length":1,"stats":{"Line":1}},{"line":155,"address":[6660513,6661002,6660648,6660686,6660475,6660582,6660848],"length":1,"stats":{"Line":2}},{"line":160,"address":[6570557],"length":1,"stats":{"Line":1}},{"line":166,"address":[6661120],"length":1,"stats":{"Line":1}},{"line ✅ CLIPPY FIX: Uses `#[derive(Default)]` instead of manual implementation\n#[derive(Debug, Clone, Default)]\npub struct ConvertOptions {\n    /// Include only variables matching this glob pattern\n    pub include_pattern: Option\u003cString\u003e,\n\n    /// Exclude variables matching this glob pattern\n    pub exclude_pattern: Option\u003cString\u003e,\n\n    /// Base64-encode all values\n    pub base64: bool,\n\n    /// Prefix to add to all keys\n    pub prefix: Option\u003cString\u003e,\n\n    /// Key transformation to apply\n    pub transform: Option\u003cKeyTransform\u003e,\n}\n\n// ✅ CLIPPY FIX: Removed manual impl Default (using #[derive(Default)])\n\nimpl ConvertOptions {\n    /// Create new default options\n    pub fn new() -\u003e Self {\n        Self::default()\n    }\n\n    /// Filter variables based on include/exclude patterns\n    pub fn filter_vars(\u0026self, vars: \u0026HashMap\u003cString, String\u003e) -\u003e HashMap\u003cString, String\u003e {\n        vars.iter()\n            .filter(|(key, _)| self.should_include(key))\n            .map(|(k, v)| (k.clone(), v.clone()))\n            .collect()\n    }\n\n    /// Check if a variable should be included\n    fn should_include(\u0026self, key: \u0026str) -\u003e bool {\n        // Check exclude pattern first\n        if let Some(ref exclude) = self.exclude_pattern {\n            if glob_match(key, exclude) {\n                return false;\n            }\n        }\n\n        // Check include pattern\n        if let Some(ref include) = self.include_pattern {\n            return glob_match(key, include);\n        }\n\n        // Include by default if no patterns specified\n        true\n    }\n\n    /// Transform a key according to the specified transformation\n    pub fn transform_key(\u0026self, key: \u0026str) -\u003e String {\n        let key = if let Some(ref prefix) = self.prefix {\n            format!(\"{}{}\", prefix, key)\n        } else {\n            key.to_string()\n        };\n\n        match self.transform {\n            Some(KeyTransform::Uppercase) =\u003e key.to_uppercase(),\n            Some(KeyTransform::Lowercase) =\u003e key.to_lowercase(),\n            Some(KeyTransform::CamelCase) =\u003e to_camel_case(\u0026key),\n            Some(KeyTransform::SnakeCase) =\u003e to_snake_case(\u0026key),\n            None =\u003e key,\n        }\n    }\n\n    /// Transform a value (base64 encode if enabled)\n    pub fn transform_value(\u0026self, value: \u0026str) -\u003e String {\n        if self.base64 {\n            use base64::{engine::general_purpose, Engine as _};\n            general_purpose::STANDARD.encode(value.as_bytes())\n        } else {\n            value.to_string()\n        }\n    }\n}\n\n/// Converter trait for format conversion\npub trait Converter {\n    /// Convert environment variables to the target format\n    ///\n    /// # Arguments\n    ///\n    /// * `vars` - Environment variables to convert\n    /// * `options` - Conversion options (filtering, transformations, etc.)\n    ///\n    /// # Returns\n    ///\n    /// Formatted output as a string\n    fn convert(\u0026self, vars: \u0026HashMap\u003cString, String\u003e, options: \u0026ConvertOptions) -\u003e Result\u003cString\u003e;\n\n    /// Get the name of this format\n    ///\n    /// Used for format selection and error messages.\n    fn name(\u0026self) -\u003e \u0026str;\n\n    /// Get a description of this format\n    ///\n    /// Used in help text and interactive selection.\n    fn description(\u0026self) -\u003e \u0026str;\n}\n\n// Helper functions\n\n/// Simple glob pattern matching\n///\n/// Supports `*` wildcard matching.\nfn glob_match(text: \u0026str, pattern: \u0026str) -\u003e bool {\n    if pattern == \"*\" {\n        return true;\n    }\n\n    if pattern.starts_with('*') \u0026\u0026 pattern.ends_with('*') {\n        let substring = \u0026pattern[1..pattern.len() - 1];\n        return text.contains(substring);\n    }\n\n    // if pattern.starts_with('*') {\n    //     let suffix = \u0026pattern[1..];\n    //     return text.ends_with(suffix);\n    // }\n\n    // if pattern.ends_with('*') {\n    //     let prefix = \u0026pattern[..pattern.len() - 1];\n    //     return text.starts_with(prefix);\n    // }\n    if let Some(suffix) = pattern.strip_prefix('*') {\n        return text.ends_with(suffix);\n    }\n\n    if let Some(prefix) = pattern.strip_suffix('*') {\n        return text.starts_with(prefix);\n    }\n\n    text == pattern\n}\n\n/// Convert string to camelCase\nfn to_camel_case(s: \u0026str) -\u003e String {\n    let parts: Vec\u003c\u0026str\u003e = s.split('_').collect();\n    if parts.is_empty() {\n        return String::new();\n    }\n\n    let mut result = parts[0].to_lowercase();\n    for part in \u0026parts[1..] {\n        if !part.is_empty() {\n            let mut chars = part.chars();\n            if let Some(first) = chars.next() {\n                result.push_str(\u0026first.to_uppercase().to_string());\n                result.push_str(\u0026chars.as_str().to_lowercase());\n            }\n        }\n    }\n    result\n}\n\n// Convert string to snake_case\n// fn to_snake_case(s: \u0026str) -\u003e String {\n//     let mut result = String::with_capacity(s.len());\n//     let mut prev_is_upper = false;\n\n//     for (i, ch) in s.chars().enumerate() {\n//         if ch.is_uppercase() {\n//             if i \u003e 0 \u0026\u0026 !prev_is_upper {\n//                 result.push('_');\n//             }\n//             result.extend(ch.to_lowercase());\n//             prev_is_upper = true;\n//         } else {\n//             result.push(ch);\n//             prev_is_upper = false;\n//         }\n//     }\n\n//     result\n// }\n\nfn to_snake_case(s: \u0026str) -\u003e String {\n    let mut result = String::with_capacity(s.len());\n    let chars: Vec\u003cchar\u003e = s.chars().collect();\n\n    for i in 0..chars.len() {\n        let ch = chars[i];\n\n        if ch.is_uppercase() {\n            if i \u003e 0 {\n                let prev = chars[i - 1];\n                let next = chars.get(i + 1);\n\n                if prev.is_lowercase()\n                    || (prev.is_uppercase() \u0026\u0026 next.map(|c| c.is_lowercase()).unwrap_or(false))\n                {\n                    result.push('_');\n                }\n            }\n            result.extend(ch.to_lowercase());\n        } else {\n            result.push(ch);\n        }\n    }\n\n    result\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_default_options() {\n        let opts = ConvertOptions::default();\n        assert!(opts.include_pattern.is_none());\n        assert!(opts.exclude_pattern.is_none());\n        assert!(!opts.base64);\n        assert!(opts.prefix.is_none());\n        assert!(opts.transform.is_none());\n    }\n\n    #[test]\n    fn test_new_options() {\n        let opts = ConvertOptions::new();\n        assert!(opts.include_pattern.is_none());\n    }\n\n    #[test]\n    fn test_filter_vars_no_pattern() {\n        let mut vars = HashMap::new();\n        vars.insert(\"KEY1\".to_string(), \"value1\".to_string());\n        vars.insert(\"KEY2\".to_string(), \"value2\".to_string());\n\n        let opts = ConvertOptions::default();\n        let filtered = opts.filter_vars(\u0026vars);\n\n        assert_eq!(filtered.len(), 2);\n        assert!(filtered.contains_key(\"KEY1\"));\n        assert!(filtered.contains_key(\"KEY2\"));\n    }\n\n    #[test]\n    fn test_filter_vars_include() {\n        let mut vars = HashMap::new();\n        vars.insert(\"AWS_KEY\".to_string(), \"value1\".to_string());\n        vars.insert(\"DB_KEY\".to_string(), \"value2\".to_string());\n\n        let mut opts = ConvertOptions::default();\n        opts.include_pattern = Some(\"AWS_*\".to_string());\n        let filtered = opts.filter_vars(\u0026vars);\n\n        assert_eq!(filtered.len(), 1);\n        assert!(filtered.contains_key(\"AWS_KEY\"));\n        assert!(!filtered.contains_key(\"DB_KEY\"));\n    }\n\n    #[test]\n    fn test_filter_vars_exclude() {\n        let mut vars = HashMap::new();\n        vars.insert(\"KEY1\".to_string(), \"value1\".to_string());\n        vars.insert(\"KEY2_LOCAL\".to_string(), \"value2\".to_string());\n\n        let mut opts = ConvertOptions::default();\n        opts.exclude_pattern = Some(\"*_LOCAL\".to_string());\n        let filtered = opts.filter_vars(\u0026vars);\n\n        assert_eq!(filtered.len(), 1);\n        assert!(filtered.contains_key(\"KEY1\"));\n        assert!(!filtered.contains_key(\"KEY2_LOCAL\"));\n    }\n\n    #[test]\n    fn test_transform_key_prefix() {\n        let mut opts = ConvertOptions::default();\n        opts.prefix = Some(\"APP_\".to_string());\n\n        assert_eq!(opts.transform_key(\"DATABASE_URL\"), \"APP_DATABASE_URL\");\n    }\n\n    #[test]\n    fn test_transform_key_uppercase() {\n        let mut opts = ConvertOptions::default();\n        opts.transform = Some(KeyTransform::Uppercase);\n\n        assert_eq!(opts.transform_key(\"database_url\"), \"DATABASE_URL\");\n    }\n\n    #[test]\n    fn test_transform_key_lowercase() {\n        let mut opts = ConvertOptions::default();\n        opts.transform = Some(KeyTransform::Lowercase);\n\n        assert_eq!(opts.transform_key(\"DATABASE_URL\"), \"database_url\");\n    }\n\n    #[test]\n    fn test_transform_value_base64() {\n        let mut opts = ConvertOptions::default();\n        opts.base64 = true;\n\n        let result = opts.transform_value(\"hello\");\n        assert_eq!(result, \"aGVsbG8=\"); // base64(\"hello\")\n    }\n\n    #[test]\n    fn test_glob_match() {\n        assert!(glob_match(\"AWS_KEY\", \"AWS_*\"));\n        assert!(glob_match(\"MY_AWS_KEY\", \"*_AWS_*\"));\n        assert!(glob_match(\"KEY_LOCAL\", \"*_LOCAL\"));\n        assert!(glob_match(\"anything\", \"*\"));\n        assert!(!glob_match(\"AWS_KEY\", \"DB_*\"));\n    }\n\n    #[test]\n    fn test_to_camel_case() {\n        assert_eq!(to_camel_case(\"database_url\"), \"databaseUrl\");\n        assert_eq!(to_camel_case(\"secret_key\"), \"secretKey\");\n        assert_eq!(to_camel_case(\"aws_access_key_id\"), \"awsAccessKeyId\");\n    }\n\n    #[test]\n    fn test_to_snake_case() {\n        assert_eq!(to_snake_case(\"DatabaseURL\"), \"database_url\");\n        assert_eq!(to_snake_case(\"SecretKey\"), \"secret_key\");\n        assert_eq!(to_snake_case(\"HTTPServer\"), \"http_server\");\n        assert_eq!(to_snake_case(\"UserID\"), \"user_id\");\n        assert_eq!(to_snake_case(\"MySQLDatabase\"), \"my_sql_database\");\n        assert_eq!(to_snake_case(\"JSONParser\"), \"json_parser\");\n        assert_eq!(to_snake_case(\"Already_snake\"), \"already_snake\");\n        // assert_eq!(to_snake_case(\"DatabaseURL\"), \"database_u_r_l\");\n    }\n}\n","traces":[{"line":47,"address":[7424656],"length":1,"stats":{"Line":1}},{"line":48,"address":[7424664],"length":1,"stats":{"Line":1}},{"line":52,"address":[7296352],"length":1,"stats":{"Line":3}},{"line":53,"address":[7296401],"length":1,"stats":{"Line":3}},{"line":54,"address":[6907678,6907664],"length":1,"stats":{"Line":9}},{"line":55,"address":[6907728,6907778],"length":1,"stats":{"Line":6}},{"line":60,"address":[5677392],"length":1,"stats":{"Line":3}},{"line":62,"address":[7297314],"length":1,"stats":{"Line":3}},{"line":63,"address":[5677473],"length":1,"stats":{"Line":1}},{"line":64,"address":[7424445],"length":1,"stats":{"Line":1}},{"line":69,"address":[7396443,7396498],"length":1,"stats":{"Line":3}},{"line":70,"address":[7297463],"length":1,"stats":{"Line":1}},{"line":74,"address":[7424510],"length":1,"stats":{"Line":1}},{"line":78,"address":[7395536,7396286,7396292],"length":1,"stats":{"Line":2}},{"line":79,"address":[7296536,7296809],"length":1,"stats":{"Line":4}},{"line":80,"address":[7296598],"length":1,"stats":{"Line":1}},{"line":82,"address":[5676923],"length":1,"stats":{"Line":2}},{"line":85,"address":[7296845,7296964],"length":1,"stats":{"Line":2}},{"line":86,"address":[742 , and a proper [`Default`] impl).\n//!\n//! # Format support\n//!\n//! | Feature                  | Supported |\n//! |--------------------------|-----------|\n//! | `KEY=value`              | ✓         |\n//! | `export KEY=value`       | ✓         |\n//! | `# comments`             | ✓         |\n//! | Inline `# comments`      | ✓ (opt-in via [`ParserConfig::allow_inline_comments`]) |\n//! | Double-quoted values     | ✓         |\n//! | Single-quoted values     | ✓         |\n//! | Backtick-quoted values   | ✓         |\n//! | Multiline values         | ✓ (opt-in via [`ParserConfig::allow_multiline`]) |\n//! | `${VAR}` expansion       | ✓         |\n//! | `$VAR` expansion         | ✓         |\n//! | Circular expansion guard | ✓         |\n//! | Strict uppercase keys    | ✓ (opt-in via [`ParserConfig::strict`]) |\n//!\n//! # Compatibility with other modules\n//!\n//! Every call site in the codebase uses one of these three patterns:\n//!\n//! ```rust,ignore\n//! // Pattern A — most common (all commands)\n//! let parser = Parser::default();\n//! let env_file = parser.parse_file(\".env\")?;\n//! env_file.vars  // HashMap\u003cString, String\u003e\n//!\n//! // Pattern B — config override (validate --strict, tests)\n//! let parser = Parser::new(ParserConfig { strict: true, ..Default::default() });\n//!\n//! // Pattern C — parse from string (tests, template command)\n//! let vars = parser.parse_content(\"KEY=value\")?;\n//! ```\n//!\n//! This merged parser satisfies **all three patterns** without any call-site\n//! changes. See § Compatibility notes below for per-module details.\n//!\n//! # Error handling\n//!\n//! All errors are [`ParseError`] variants. Because the commands wrap parser\n//! calls with `anyhow::Context` (`.with_context(|| ...)`), the structured\n//! error converts automatically into `anyhow::Error` at the boundary — no\n//! changes needed in any command file.\n//!\n//! # Compatibility notes by module\n//!\n//! | Module | Method used | Breaking change? |\n//! |--------|-------------|-----------------|\n//! | `commands/validate.rs` | `parse_file(\u0026str)` | None — signature preserved |\n//! | `commands/diff.rs`     | `parse_file(\u0026str)` | None |\n//! | `commands/scan.rs`     | `parse_file(\u0026str)` | None |\n//! | `commands/convert.rs`  | `parse_file(\u0026str)` | None |\n//! | `commands/sync.rs`     | `parse_file(\u0026str)` | None |\n//! | `commands/template.rs` | `parse_file(\u0026str)` | None |\n//! | `commands/migrate.rs`  | `parse_file(\u0026str)` | None |\n//! | `commands/backup.rs`   | Not used directly  | N/A  |\n//! | `commands/doctor.rs`   | `parse_file(\u0026str)` | None |\n//! | `commands/init.rs`     | `parse_file(\u0026str)` | None |\n//! | `core/converter.rs`    | `EnvFile.vars`     | None — field name preserved |\n//! | Tests                  | `parse_content`    | None — method name preserved |\n\nuse std::collections::HashMap;\nuse std::fs;\nuse std::path::Path;\nuse thiserror::Error;\n\n// ── Error type ────────────────────────────────────────────────────────────────\n\n/// Structured parse errors with line numbers and context.\n///\n/// Implements [`std::error::Error`] via [`thiserror`] and converts into\n/// [`anyhow::Error`] automatically when used with the `?` operator inside\n/// a function that returns `anyhow::Result`. This means **no changes are\n/// needed in command files** that currently do:\n///\n/// ```rust,ignore\n/// let env_file = parser\n///     .parse_file(\u0026env)\n///     .with_context(|| format!(\"Failed to parse {}\", env))?;\n/// ```\n#[derive(Debug, Error)]\npub enum ParseError {\n    /// The file could not be read from disk.\n    #[error(\"Failed to read file: {0}\")]\n    FileReadError(#[from] std::io::Error),\n\n    /// A line did not contain a `=` separator (and is not a comment or blank).\n    #[error(\"Invalid format at line {line}: {message}\")]\n    InvalidFormat { line: usize, message: String },\n\n    /// A key contains characters outside `[A-Za-z][A-Za-z0-9_]*`.\n    #[error(\"Invalid key at line {line}: '{key}' (keys must match [A-Za-z][A-Za-z0-9_]*)\")]\n    InvalidKey { line: usize, key: String },\n\n    /// A `${VAR}` or `$VAR` reference names a variable that was not defined\n    /// earlier in the file.\n    #[error(\"Undefined variable at line {line}: ${{{var}}} is not defined\")]\n    UndefinedVariable { line: usize, var: String },\n\n    /// Two or more variables reference each other in a cycle.\n    #[error(\"Circular variable expansion at line {line}: {cycle}\")]\n    CircularExpansion { line: usize, cycle: String },\n\n    /// A quoted string was opened but never closed.\n    #[error(\"Unterminated quoted string at line {line}\")]\n    UnterminatedString { line: usize },\n\n    /// Expansion depth exceeded [`ParserConfig::max_expansion_depth`].\n    #[error(\"Variable expansion too deep at line {line}: max depth {max} exceeded\")]\n    ExpansionDepthExceeded { line: usize, max: usize },\n}\n\n/// Convenience alias used throughout the parser internals.\npub type ParseResult\u003cT\u003e = Result\u003cT, ParseError\u003e;\n\n// ── Public data types ─────────────────────────────────────────────────────────\n\n/// The result of parsing a `.env` file or string.\n///\n/// `vars` is the field accessed by every command and converter in the\n/// codebase. The field name is **identical** to both the old and new parser,\n/// so no call sites need updating.\n#[derive(Debug, Clone)]\npub struct EnvFile {\n    /// Parsed key-value pairs, in insertion order within the underlying\n    /// `HashMap`. Use an `IndexMap` if deterministic ordering is needed.\n    pub vars: HashMap\u003cString, String\u003e,\n\n    /// The file path this was parsed from, or `None` when parsed from a string.\n    ///\n    /// Changed from `String` (old) to `Option\u003cString\u003e` (new) — callers that\n    /// only access `env_file.vars` are unaffected.\n    pub source: Option\u003cString\u003e,\n}\n\n// ── Configuration ─────────────────────────────────────────────────────────────\n\n/// Controls parser behaviour. Construct with [`Default::default()`] and\n/// override individual fields as needed.\n///\n/// # Example\n///\n/// ```rust\n/// use evnx::core::parser::ParserConfig;\n///\n/// // Strict mode: only uppercase keys, no inline comments\n/// let config = ParserConfig {\n///     strict: true,\n///     allow_inline_comments: false,\n///     ..Default::default()\n/// };\n/// ```\n#[derive(Debug, Clone)]\npub struct ParserConfig {\n    /// Enable `${VAR}` and `$VAR` substitution in values.\n    ///\n    /// Default: `true`.\n    pub allow_expansion: bool,\n\n    /// Enforce all-uppercase keys. Fails with [`ParseError::InvalidKey`] if a\n    /// lowercase key is encountered.\n    ///\n    /// Default: `false`.\n    pub strict: bool,\n\n    /// Maximum number of recursive expansions before raising\n    /// [`ParseError::ExpansionDepthExceeded`]. Prevents runaway expansion of\n    /// deeply nested variable references.\n    ///\n    /// Default: `10`.\n    pub max_expansion_depth: usize,\n\n    /// Strip inline comments from unquoted values. When `true`, the `#` and\n    /// everything after it on unquoted lines is discarded.\n    ///\n    /// Example: `PORT=8080 # web server` → `PORT=8080`.\n    ///\n    /// Default: `true`.\n    pub allow_inline_comments: bool,\n\n    /// Trim leading and trailing whitespace from values after all other\n    /// processing. Quoted values are never trimmed — their whitespace is\n    /// always preserved.\n    ///\n    /// Default: `true`.\n    pub trim_values: bool,\n\n    /// Accept values that span multiple lines. A value whose opening quote is\n    /// not closed on the same line accumulates subsequent lines until the\n    /// closing quote is found.\n    ///\n    /// Default: `true`.\n    pub allow_multiline: bool,\n}\n\nimpl Default for ParserConfig {\n    fn default() -\u003e Self {\n        Self {\n            allow_expansion: true,\n            strict: false,\n            max_expansion_depth: 10,\n            allow_inline_comments: true,\n            trim_values: true,\n            allow_multiline: true,\n        }\n    }\n}\n\n// ── Parser ────────────────────────────────────────────────────────────────────\n\n/// `.env` file parser.\n///\n/// Construct with [`Parser::default()`] for standard behaviour, or\n/// [`Parser::new(config)`] to customise.\npub struct Parser {\n    config: ParserConfig,\n}\n\n/// Correct implementation of the [`Default`] trait.\n///\n/// The old parser used a hand-written `pub fn default() -\u003e Self` method,\n/// which triggers `clippy::should_implement_trait`. This implementation\n/// satisfies the trait properly so `Parser::default()` continues to work\n/// at every existing call site without change.\nimpl Default for Parser {\n    fn default() -\u003e Self {\n        Self::new(ParserConfig::default())\n    }\n}\n\nimpl Parser {\n    /// Create a parser with a custom [`ParserConfig`].\n    pub fn new(config: ParserConfig) -\u003e Self {\n        Self { config }\n    }\n\n    // ── Public API ────────────────────────────────────────────────────────────\n\n    /// Parse a `.env` file from a filesystem path.\n    ///\n    /// Accepts any type that implements `AsRef\u003cPath\u003e` — `\u0026str`, `String`,\n    /// `PathBuf`, `Path`, and `OsStr` all work without conversion.\n    ///\n    /// This restores the **generic signature** from the old parser. The new\n    /// parser narrowed it to `\u0026str`, which forced callers holding a `PathBuf`\n    /// to call `.to_str().unwrap()`.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`ParseError::FileReadError`] if the file cannot be read, or\n    /// any parse error variant if the content is invalid.\n    ///\n    /// # Example\n    ///\n    /// ```rust,no_run\n    /// use evnx::core::Parser;\n    ///\n    /// let parser = Parser::default();\n    /// let env_file = parser.parse_file(\".env\")?;\n    /// println!(\"Loaded {} variables\", env_file.vars.len());\n    /// # Ok::\u003c(), anyhow::Error\u003e(())\n    /// ```\n    pub fn parse_file\u003cP: AsRef\u003cPath\u003e\u003e(\u0026self, path: P) -\u003e ParseResult\u003cEnvFile\u003e {\n        let content = fs::read_to_string(path.as_ref())?;\n        let source = path.as_ref().to_string_lossy().into_owned();\n        let vars = self.parse_content(\u0026content)?;\n        Ok(EnvFile {\n            vars,\n            source: Some(source),\n        })\n    }\n\n    /// Parse `.env` content from an in-memory string.\n    ///\n    /// Method name matches the **old parser** (`parse_content`) so existing\n    /// tests and the template command require no changes.\n    ///\n    /// # Example\n    ///\n    /// ```rust\n    /// use evnx::core::Parser;\n    ///\n    /// let parser = Parser::default();\n    /// let vars = parser.parse_content(\"KEY=value\\nOTHER=123\")?;\n    /// assert_eq!(vars[\"KEY\"], \"value\");\n    /// # Ok::\u003c(), evnx::core::parser::ParseError\u003e(())\n    /// ```\n    pub fn parse_content(\u0026self, content: \u0026str) -\u003e ParseResult\u003cHashMap\u003cString, String\u003e\u003e {\n        let mut vars: HashMap\u003cString, String\u003e = HashMap::new();\n\n        // Multiline accumulation state.\n        let mut ml_key: Option\u003cString\u003e = None;\n        let mut ml_value = String::new();\n        let mut ml_quote: char = '\"';\n        let mut ml_start_line: usize = 0;\n\n        for (idx, raw_line) in content.lines().enumerate() {\n            let line_num = idx + 1; // 1-indexed for all user-facing messages\n\n            // ── Multiline continuation ────────────────────────────────────────\n            if let Some(ref key) = ml_key.clone() {\n                let trimmed_end = raw_line.trim_end();\n\n                if let Some(before_close) = trimmed_end.strip_suffix(ml_quote) {\n                    // Closing quote found — finalise the value.\n                    ml_value.push('\\n');\n                    ml_value.push_str(before_close);\n                    vars.insert(key.clone(), ml_value.clone());\n                    ml_key = None;\n                    ml_value.clear();\n                } else {\n                    // Still inside a multiline value — accumulate.\n                    ml_value.push('\\n');\n                    ml_value.push_str(raw_line);\n                }\n                continue;\n            }\n\n            // ── Skip blank lines and full-line comments ────────────────────────\n            let line = raw_line.trim();\n            if line.is_empty() || line.starts_with('#') {\n                continue;\n            }\n\n            // ── Parse KEY=VALUE ───────────────────────────────────────────────\n            let (key, raw_value) = self.split_key_value(line, line_num)?;\n\n            // ── Key validation ────────────────────────────────────────────────\n            self.validate_key(\u0026key, line_num)?;\n\n            // ── Value parsing ─────────────────────────────────────────────────\n            match self.classify_quote(\u0026raw_value) {\n                // Quoted value — check for multiline\n                Some(q) if self.config.allow_multiline \u0026\u0026 !self.is_closed_quote(\u0026raw_value, q) =\u003e {\n                    // Opening quote but no closing quote on this line.\n                    ml_key = Some(key);\n                    // Strip the opening quote from the accumulated content.\n                    ml_value = raw_value.trim_start_matches(q).to_string();\n                    ml_quote = q;\n                    ml_start_line = line_num;\n                }\n                _ =\u003e {\n                    let value = self.parse_value(\u0026raw_value, line_num)?;\n                    vars.insert(key, value);\n                }\n            }\n        }\n\n        // If we exited the loop still inside a multiline value, the file ended\n        // without a closing quote.\n        if let Some(_key) = ml_key {\n            return Err(ParseError::UnterminatedString {\n                line: ml_start_line,\n            });\n        }\n\n        // ── Variable expansion ────────────────────────────────────────────────\n        if self.config.allow_expansion {\n            self.expand_all(\u0026mut vars)?;\n        }\n\n        Ok(vars)\n    }\n\n    // ── Private: line parsing ─────────────────────────────────────────────────\n\n    /// Split `line` into `(key, raw_value)` at the first `=`.\n    ///\n    /// Handles the optional `export` prefix used by shell scripts and tools\n    /// like Heroku CLI and direnv.\n    fn split_key_value(\u0026self, line: \u0026str, line_num: usize) -\u003e ParseResult\u003c(String, String)\u003e {\n        // Strip optional `export ` prefix.\n        let line = line\n            .strip_prefix(\"export\")\n            .map(|s| s.trim_start())\n            .unwrap_or(line);\n\n        let eq = line.find('=').ok_or_else(|| ParseError::InvalidFormat {\n            line: line_num,\n            message: \"missing '=' separator\".into(),\n        })?;\n\n        let key = line[..eq].trim().to_string();\n        let raw = line[eq + 1..].to_string(); // intentionally NOT trimmed yet\n\n        Ok((key, raw))\n    }\n\n    /// Enforce key naming rules: `[A-Za-z][A-Za-z0-9_]*`, and uppercase-only\n    /// when [`ParserConfig::strict`] is set.\n    fn validate_key(\u0026self, key: \u0026str, line_num: usize) -\u003e ParseResult\u003c()\u003e {\n        if key.is_empty() {\n            return Err(ParseError::InvalidKey {\n                line: line_num,\n                key: key.to_string(),\n            });\n        }\n\n        let mut chars = key.chars();\n\n        // First character must be a letter.\n        match chars.next() {\n            Some(c) if c.is_ascii_alphabetic() =\u003e {}\n            _ =\u003e {\n                return Err(ParseError::InvalidKey {\n                    line: line_num,\n                    key: key.to_string(),\n                })\n            }\n        }\n\n        // Remaining characters: alphanumeric or underscore.\n        for c in chars {\n            if !c.is_ascii_alphanumeric() \u0026\u0026 c != '_' {\n                return Err(ParseError::InvalidKey {\n                    line: line_num,\n                    key: key.to_string(),\n                });\n            }\n        }\n\n        // Strict mode: all-uppercase required.\n        if self.config.strict \u0026\u0026 key != key.to_uppercase() {\n            return Err(ParseError::InvalidKey {\n                line: line_num,\n                key: key.to_string(),\n            });\n        }\n\n        Ok(())\n    }\n\n    // ── Private: value parsing ────────────────────────────────────────────────\n\n    /// Return the opening quote character if `raw` starts with `\"`, `'`,\n    /// or `` ` ``, otherwise `None`.\n    fn classify_quote(\u0026self, raw: \u0026str) -\u003e Option\u003cchar\u003e {\n        match raw.trim_start().chars().next() {\n            Some(c @ ('\"' | '\\'' | '`')) =\u003e Some(c),\n            _ =\u003e None,\n        }\n    }\n\n    /// Return `true` if `raw` is a properly closed quoted string (same quote\n    /// at start and end, and length \u003e= 2).\n    fn is_closed_quote(\u0026self, raw: \u0026str, q: char) -\u003e bool {\n        let t = raw.trim();\n        t.len() \u003e= 2 \u0026\u0026 t.starts_with(q) \u0026\u0026 t.ends_with(q)\n    }\n\n    /// Parse a raw value string into its final form.\n    ///\n    /// Dispatch order:\n    /// 1. Empty → empty string.\n    /// 2. Double-quoted → unescape escape sequences.\n    /// 3. Single-quoted / backtick → literal (no unescaping).\n    /// 4. Unquoted → strip inline comment, optionally trim.\n    fn parse_value(\u0026self, raw: \u0026str, line_num: usize) -\u003e ParseResult\u003cString\u003e {\n        let raw = raw.trim_start(); // leading whitespace after `=` is never significant\n\n        if raw.is_empty() {\n            return Ok(String::new());\n        }\n\n        let first = raw.chars().next().unwrap(); // safe: checked is_empty above\n\n        match first {\n            '\"' =\u003e {\n                if !raw.ends_with('\"') || raw.len() \u003c 2 {\n                    return Err(ParseError::UnterminatedString { line: line_num });\n                }\n                let inner = \u0026raw[1..raw.len() - 1];\n                Ok(self.unescape_double(inner))\n            }\n\n            '\\'' | '`' =\u003e {\n                if !raw.ends_with(first) || raw.len() \u003c 2 {\n                    return Err(ParseError::UnterminatedString { line: line_num });\n                }\n                // Single-quoted and backtick-quoted: literal content, no escaping.\n                Ok(raw[1..raw.len() - 1].to_string())\n            }\n\n            _ =\u003e {\n                // Unquoted value.\n                let val = if self.config.allow_inline_comments {\n                    // Strip `# comment` — but only outside quotes (we are\n                    // already in the unquoted branch here).\n                    match raw.find('#') {\n                        Some(pos) =\u003e raw[..pos].trim_end(),\n                        None =\u003e raw.trim_end(),\n                    }\n                } else {\n                    raw.trim_end()\n                };\n\n                if self.config.trim_values {\n                    Ok(val.trim().to_string())\n                } else {\n                    Ok(val.to_string())\n                }\n            }\n        }\n    }\n\n    /// Process backslash escape sequences inside a double-quoted value.\n    ///\n    /// Recognised sequences: `\\n`, `\\r`, `\\t`, `\\\\`, `\\\"`, `\\'`.\n    /// Unknown sequences are kept literally (backslash + character).\n    fn unescape_double(\u0026self, s: \u0026str) -\u003e String {\n        let mut result = String::with_capacity(s.len());\n        let mut chars = s.chars();\n\n        while let Some(ch) = chars.next() {\n ─\n\n    #[test]\n    fn test_inline_comment_stripped() {\n        let p = Parser::default();\n        let vars = p.parse_content(\"PORT=8080 # web server\").unwrap();\n        assert_eq!(vars[\"PORT\"], \"8080\");\n    }\n\n    #[test]\n    fn test_inline_comment_disabled() {\n        let p = Parser::new(ParserConfig {\n            allow_inline_comments: false,\n            ..Default::default()\n        });\n        let vars = p.parse_content(\"PORT=8080 # web server\").unwrap();\n        assert_eq!(vars[\"PORT\"], \"8080 # web server\");\n    }\n\n    #[test]\n    fn test_hash_inside_double_quotes_preserved() {\n        // # inside a quoted string must NOT be treated as a comment.\n        let p = Parser::default();\n        let vars = p.parse_content(r#\"KEY=\"value#notacomment\"\"#).unwrap();\n        assert_eq!(vars[\"KEY\"], \"value#notacomment\");\n    }\n\n    // ── Multiline values ──────────────────────────────────────────────────────\n\n    #[test]\n    fn test_multiline_double_quoted() {\n        let p = Parser::default();\n        let content = \"KEY=\\\"line one\\nline two\\nline three\\\"\";\n        let vars = p.parse_content(content).unwrap();\n        assert_eq!(vars[\"KEY\"], \"line one\\nline two\\nline three\");\n    }\n\n    #[test]\n    fn test_multiline_disabled_returns_error() {\n        let p = Parser::new(ParserConfig {\n            allow_multiline: false,\n            ..Default::default()\n        });\n        // Without multiline support an unclosed quote is an error.\n        let result = p.parse_content(\"KEY=\\\"unclosed\");\n        assert!(result.is_err());\n        assert!(matches!(\n            result.unwrap_err(),\n            ParseError::UnterminatedString { .. }\n        ));\n    }\n\n    #[test]\n    fn test_unterminated_string_eof() {\n        // File ends while still inside a multiline value.\n        let p = Parser::default();\n        let result = p.parse_content(\"KEY=\\\"starts but never ends\");\n        assert!(result. struct HerokuConfigConverter {\n    // Optional Heroku app name (can be specified in commands)\n    pub app_name: Option\u003cString\u003e,\n}\n\n// ✅ CLIPPY FIX: Removed manual impl Default (using #[derive(Default)])\n\nimpl HerokuConfigConverter {\n    // Create converter with specific app name\n    pub fn new(app_name: String) -\u003e Self {\n        Self {\n            app_name: Some(app_name),\n        }\n    }\n\n    // Create converter without app name (user must specify with --app flag)\n    pub fn without_app() -\u003e Self {\n        Self { app_name: None }\n    }\n}\n\nimpl Converter for HerokuConfigConverter {\n    fn convert(\u0026self, vars: \u0026HashMap\u003cString, String\u003e, options: \u0026ConvertOptions) -\u003e Result\u003cString\u003e {\n        let filtered = options.filter_vars(vars);\n        let mut output = String::new();\n\n        output.push_str(\"#!/bin/bash\\n\");\n        output.push_str(\"# Heroku Config Vars\\n\");\n        output.push_str(\"# Generated by evnx\\n\");\n        output.push_str(\"#\\n\");\n        output.push_str(\"# Usage:\\n\");\n\n        if self.app_name.is_some() {\n            output.push_str(\"#   bash heroku-config.sh\\n\");\n        } else {\n            output.push_str(\"#   bash heroku-config.sh --app YOUR_APP_NAME\\n\");\n        }\n\n        output.push_str(\"#\\n\");\n        output.push_str(\"# Or set variables individually:\\n\");\n        output.push_str(\"#   heroku config:set KEY=VALUE --app YOUR_APP_NAME\\n\");\n        output.push('\\n');\n\n        // App name flag\n        let app_flag = if let Some(ref app) = self.app_name {\n            format!(\" --app {}\", app)\n        } else {\n            \" --app ${HEROKU_APP:-YOUR_APP_NAME}\".to_string()\n        };\n\n        output.push_str(\"set -e\\n\\n\");\n\n        // Generate config:set commands\n        output.push_str(\"echo \\\"Setting Heroku config vars...\\\"\\n\\n\");\n\n        for (key, value) in filtered.iter() {\n            let transformed_key = options.transform_key(key);\n            let transformed_value = options.transform_value(value);\n\n            // Escape value for shell\n            let escaped_value = transformed_value\n                .replace('\\\\', \"\\\\\\\\\")\n                .replace('\"', \"\\\\\\\"\")\n                .replace('$', \"\\\\$\")\n                .replace('`', \"\\\\`\");\n\n            output.push_str(\u0026format!(\n                \"heroku config:set {}=\\\"{}\\\"{}\",\n                transformed_key, escaped_value, app_flag\n            ));\n            output.push_str(\" || echo \\\"Failed to set \");\n            output.push_str(\u0026transformed_key);\n            output.push_str(\"\\\"\\n\");\n        }\n\n        output.push_str(\"\\necho \\\"✓ Config vars set successfully\\\"\\n\");\n\n        // Add instructions for verification\n        output.push_str(\"\\n# Verify settings:\\n\");\n        output.push_str(\u0026format!(\"# heroku config{}\\n\", app_flag));\n\n        Ok(output)\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"heroku\"\n    }\n\n    fn description(\u0026self) -\u003e \u0026str {\n        \"Heroku Config Vars (heroku CLI commands)\"\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_default_converter() {\n        let converter = HerokuConfigConverter::default();\n        assert!(converter.app_name.is_none());\n    }\n\n    #[test]\n    fn test_converter_with_app() {\n        let converter = HerokuConfigConverter::new(\"my-app\".to_string());\n        assert_eq!(converter.app_name, Some(\"my-app\".to_string()));\n    }\n\n    #[test]\n    fn test_converter_without_app() {\n        let converter = HerokuConfigConverter::without_app();\n        assert!(converter.app_name.is_none());\n    }\n\n    #[test]\n    fn test_convert_basic() {\n        let mut vars = HashMap::new();\n        vars.insert(\"DATABASE_URL\".to_string(), \"postgresql://...\".to_string());\n        vars.insert(\"SECRET_KEY\".to_string(), \"secret123\".to_string());\n\n        let converter = HerokuConfigConverter::new(\"test-app\".to_string());\n        let options = ConvertOptions::default();\n        let result = converter.convert(\u0026vars, \u0026options).unwrap();\n\n        assert!(result.contains(\"heroku config:set\"));\n        assert!(result.contains(\"DATABASE_URL\"));\n        assert!(result.contains(\"SECRET_KEY\"));\n        assert!(result.contains(\"--app test-app\"));\n    }\n\n    #[test]\n    fn test_convert_without_app() {\n        let mut vars = HashMap::new();\n        vars.insert(\"KEY\".to_string(), \"value\".to_string());\n\n        let converter = HerokuConfigConverter::without_app();\n        let options = ConvertOptions::default();\n        let result = converter.convert(\u0026vars, \u0026options).unwrap();\n\n        assert!(result.contains(\"--app ${HEROKU_APP:-YOUR_APP_NAME}\"));\n    }\n\n    #[test]\n    fn test_convert_with_special_chars() {\n        let mut vars = HashMap::new();\n        vars.insert(\n            \"KEY\".to_string(),\n            \"value with \\\"quotes\\\" and $vars\".to_string(),\n        );\n\n        let converter = HerokuConfigConverter::default();\n        let options = ConvertOptions::default();\n        let result = converter.convert(\u0026vars, \u0026options).unwrap();\n\n        // Should escape special characters\n        assert!(result.contains(\"\\\\\\\"\"));\n        assert!(result.contains(\"\\\\$\"));\n    }\n\n    #[test]\n    fn test_converter_name() {\n        let converter = HerokuConfigConverter::default();\n        assert_eq!(converter.name(), \"heroku\");\n    }\n\n    #[test]\n    fn test_converter_description() {\n        let converter = HerokuConfigConverter::default();\n        assert!(!converter.description().is_empty());\n    }\n}\n","traces":[{"line":22,"address":[6057888],"length":1,"stats":{"Line":1}},{"line":24,"address":[6438339],"length":1,"stats":{"Line":1}},{"line":29,"address":[605784 er::format_addition(\u0026vars)?;\n//! // Write `content` to .env.example\n//! # Ok::\u003c_, anyhow::Error\u003e(())\n//! ```\n//!\n//! # Architecture\n//!\n//! - `schema/` — Reusable core: JSON schema, resolver, formatter\n//! - `commands/` — CLI handlers (init, add, validate, etc.)\n//! - `utils/` — Shared utilities (file I/O, formatting)\n\n// ─────────────────────────────────────────────────────────────\n// Public API\n// ─────────────────────────────────────────────────────────────\n\npub mod cli;\npub mod commands;\npub mod core;\npub mod formats;\npub mod schema;\npub mod utils;\n\npub use cli::{AddTarget, Cli, Commands};\npub use schema::{\n    formatter::{format_addition, format_env_example, format_env_template, generate_preview},\n    loader::{\n        find_framework, find_service, get_frameworks_for_language, get_services_grouped,\n        list_blueprints, schema as load_schema,\n    },\n    models::{Schema, VarCollection, VarMetadata, VarSource},\n    query::{filter_by_tag, list_tags, search_frameworks, search_services},\n    resolver::{\n        resolve_architect_selection, resolve_blueprint, resolve_framework, resolve_service,\n    },\n};\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ajit","Documents","dotenv-space-cli","src","main.rs"],"content":"//! evnx CLI entry point.\n\nuse anyhow::Result;\nuse clap::Parser;\n\nuse evnx::cli::{Cli, Commands};\nuse evnx::commands;\n\nfn main() -\u003e Result\u003c()\u003e {\n    let cli = Cli::parse();\n\n    // Configure colored output\n    if cli.no_color {\n        colored::control::set_override(false);\n    }\n\n    // Route to command handler\n    match cli.command {\n        Commands::Init { path, yes } =\u003e {\n            // Clean signature: no legacy flags\n            commands::init::run(path, yes, cli.verbose)\n        }\n\n        Commands::Add { target, path, yes } =\u003e commands::add::run(target, path, yes, cli.verbose),\n\n        Commands::Validate {\n            env,\n            example,\n            strict,\n            fix,\n            format,\n            exit_zero,\n        } =\u003e commands::validate::run(env, example, strict, fix, format, exit_zero, cli.verbose),\n\n        Commands::Scan {\n            path,\n            exclude,\n            pattern,\n            ignore_placeholders,\n            format,\n            exit_zero,\n        } =\u003e commands::scan::run(\n            path,\n            exclude,\n            pattern,\n            ignore_placeholders,\n            format,\n            exit_zero,\n            cli.verbose,\n        ),\n\n        Commands::Diff {\n            env,\n            example,\n            show_values,\n            format,\n            reverse,\n        } =\u003e commands::diff::run(env, example, show_values, format, reverse, cli.verbose),\n\n        Commands::Convert {\n            env,\n            to,\n            output,\n            include,\n            exclude,\n            base64,\n            prefix,\n            transform,\n        } =\u003e commands::convert::run(\n            env,\n            to,\n            output,\n            include,\n            exclude,\n            base64,\n            prefix,\n            transform,\n            cli.verbose,\n        ),\n\n        #[cfg(feature = \"migrate\")]\n        Commands::Migrate {\n            from,\n            to,\n            source_file,\n            repo,\n            secret_name,\n            dry_run,\n            skip_existing,\n            overwrite,\n            github_token,\n            aws_profile,\n        } =\u003e commands::migrate::run(\n            from,\n            to,\n            source_file,\n            repo,\n            secret_name,\n            dry_run,\n            skip_existing,\n            overwrite,\n            github_token,\n            aws_profile,\n            cli.verbose,\n        ),\n\n        // \"forward\" → sync_forward()  // .env → .env.example\n        // \"reverse\" → sync_reverse()  // .env.example → .env\n\n        // Commands::Sync {\n        //     direction,\n        //     placeholder,\n        // } =\u003e commands::sync::run(direction, placeholder, cli.verbose),\n        Commands::Sync { args } =\u003e {\n            commands::sync::run(\n                args.direction,\n                args.placeholder,\n                cli.verbose,\n                args.dry_run,\n                args.force,\n                args.template_config.clone(),\n                args.naming_policy,\n            )\n        }\n\n        Commands::Template { input, output, env } =\u003e {\n            commands::template::run(input, output, env, cli.verbose)\n        }\n\n        #[cfg(feature = \"backup\")]\n        Commands::Backup { env, output } =\u003e commands::backup::run(env, output, cli.verbose),\n\n        #[cfg(feature = \"backup\")]\n        Commands::Restore { backup, output } =\u003e commands::restore::run(backup, output, cli.verbose),\n\n        Commands::Doctor { path } =\u003e commands::doctor::run(path, cli.verbose),\n\n        Commands::Completions { shell } =\u003e commands::completions::run(shell),\n    }\n}\n","traces":[{"line":9,"address":[5542754,5542996,5539856],"length":1,"stats":{"Line":0}},{"line":10,"address":[5539863],"length":1,"stats":{"Line":0}},{"line":13,"address":[5540293],"length":1,"stats":{"Line":0}},{"line":14,"address":[5540472,5540365],"length":1,"stats":{"Line":0}},{"line":18,"address":[5540303,5540477],"length":1,"stats":{"Line":0}},{"line":19,"address":[5540479],"length":1,"stats":{"Line":0}},{"line":21,"address":[5540537,5542259],"length":1,"stats":{"Line":0}},{"line":24,"address":[5542496,5540572],"length":1,"stats":{"Line":0}},{"line":26,"address":[5540808],"length":1,"stats":{"Line":0}},{"line":35,"address":[5541037],"length":1,"stats":{"Line":0}},{"line":49,"address":[5541153],"length":1,"stats":{"Line":0}},{"line":52,"address":[5541314],"length":1,"stats":{"Line":0}},{"line":60,"address":[5541465],"length":1,"stats": / Sort categories by priority, then alphabetically\n    let mut categories: Vec\u003c_\u003e = by_category.keys().collect();\n    categories.sort_by(|a, b| {\n        let rank_a = get_category_rank(a.as_deref(), category_order);\n        let rank_b = get_category_rank(b.as_deref(), category_order);\n        rank_a.cmp(\u0026rank_b).then_with(|| a.cmp(b))\n    });\n\n    // Output each category\n    for category in categories {\n        // Print category header\n        match category {\n            Some(cat_name) =\u003e content.push_str(\u0026format!(\"\\n# ── {} ──\\n\", cat_name)),\n            None =\u003e content.push_str(\"\\n# ── General ──\\n\"),\n        }\n\n        // Print variables in this category\n        if let Some(vars_in_cat) = by_category.get(category) {\n            let mut sorted: Vec\u003c_\u003e = vars_in_cat.iter().collect();\n            sorted.sort_by_key(|(name, _)| *name);\n\n            for (name, meta) in sorted {\n                if let Some(desc) = \u0026meta.description {\n                    content.push_str(\u0026format!(\"# {}\\n\", desc));\n                }\n                content.push_str(\u0026format!(\"{}={}\\n\", name, meta.example_value));\n                if meta.required {\n                    content.push_str(\"  # (required)\\n\");\n                }\n            }\n        }\n        content.push('\\n');\n    }\n\n    // Add footer\n    if include_footer {\n        content.push_str(\u0026format!(\n            \"# Generated by evnx v{} on {}\\n\",\n            env!(\"CARGO_PKG_VERSION\"),\n            chrono::Local::now().format(\"%Y-%m-%d %H:%M\")\n        ));\n    }\n\n    Ok(content)\n}\n\n/// Format as .env template with TODO comments\npub fn format_env_template(vars: \u0026VarCollection) -\u003e Result\u003cString\u003e {\n    let mut content = String::from(\"# TODO: Replace placeholder values with real credentials\\n\");\n\n    // Group by category\n    let mut by_category: HashMap\u003cOption\u003cString\u003e, Vec\u003c(\u0026String, \u0026VarMetadata)\u003e\u003e = HashMap::new();\n    for (name, meta) in \u0026vars.vars {\n        by_category\n            .entry(meta.category.clone())\n            .or_default()\n            .push((name, meta));\n    }\n\n    // Same category ordering as format_env_example\n    let category_order: \u0026[\u0026str] = \u0026[\n        \"Framework\",\n        \"Application\",\n        \"Security\",\n        \"Database\",\n        \"Cache\",\n        \"Auth\",\n        \"Storage\",\n        \"Service\",\n        \"Infrastructure\",\n        \"CI/CD\",\n    ];\n\n    let mut categories: Vec\u003c_\u003e = by_category.keys().collect();\n    categories.sort_by(|a, b| {\n        let rank_a = get_category_rank(a.as_deref(), category_order);\n        let rank_b = get_category_rank(b.as_deref(), category_order);\n        rank_a.cmp(\u0026rank_b).then_with(|| a.cmp(b))\n    });\n\n    for category in categories {\n        match category {\n            Some(cat_name) =\u003e content.push_str(\u0026format!(\"\\n# ── {} ──\\n\", cat_name)),\n            None =\u003e content.push_str(\"\\n# ── General ──\\n\"),\n        }\n\n        if let Some(vars_in_cat) = by_category.get(category) {\n            let mut sorted: Vec\u003c_\u003e = vars_in_cat.iter().collect();\n            sorted.sort_by_key(|(name, _)| *name);\n\n            for (name, meta) in sorted {\n                if let Some(desc) = \u0026meta.description {\n                    content.push_str(\u0026format!(\"# {}\\n\", desc));\n                }\n                // Add TODO comment for .env file\n                content.push_str(\u0026format!(\"# TODO: {}={}\\n\", name, meta.example_value));\n                if meta.required {\n                    content.push_str(\"  # (required - must be set)\\n\");\n                }\n            }\n        }\n    }\n\n    Ok(content)\n}\n\n/// Format as minimal addition for appending to existing .env.example\npub fn format_addition(vars: \u0026VarCollection) -\u003e Result\u003cString\u003e {\n    let mut content = String::new();\n\n    let mut by_category: HashMap\u003cOption\u003cString\u003e, Vec\u003c(\u0026String, \u0026VarMetadata)\u003e\u003e = HashMap::new();\n    for (name, meta) in \u0026vars.vars {\n        by_category\n            .entry(meta.category.clone())\n            .or_default()\n            .push((name, meta));\n    }\n\n    // Simple alphabetical sort for additions\n    let mut categories: Vec\u003c_\u003e = by_category.keys().collect();\n    categories.sort();\n\n    for category in categories {\n        match category {\n            Some(cat_name) =\u003e content.push_str(\u0026format!(\"\\n# [ADDED] {}\\n\", cat_name)),\n            None =\u003e content.push_str(\"\\n# [ADDED] General\\n\"),\n        }\n\n        if let Some(vars_in_cat) = by_category.get(category) {\n            let mut sorted: Vec\u003c_\u003e = vars_in_cat.iter().collect();\n            sorted.sort_by_key(|(name, _)| *name);\n\n            for (name, meta) in sorted {\n                if let Some(desc) = \u0026meta.description {\n                    content.push_str(\u0026format!(\"# {}\\n\", desc));\n                }\n                content.push_str(\u0026format!(\"{}={}\\n\", name, meta.example_value));\n            }\n        }\n    }\n\n    content.push_str(\u0026format!(\n        \"\\n# Added by evnx add on {}\\n\",\n        chrono::Local::now().format(\"%Y-%m-%d %H:%M\")\n    ));\n\n    Ok(content)\n}\n\n/// Generate preview summary for interactive confirmation\npub fn generate_preview(vars: \u0026VarCollection) -\u003e String {\n    let mut lines = vec![format!(\"📦 {} variables\", vars.vars.len())];\n\n    // Count by source\n    let mut by_source: HashMap\u003c\u0026str, usize\u003e = HashMap::new();\n    for meta in vars.vars.values() {\n        let source = match \u0026meta.source {\n            VarSource::Framework(_) =\u003e \"framework\",\n            VarSource::Service(_) =\u003e \"service\",\n            VarSource::Infrastructure(_) =\u003e \"infra\",\n            VarSource::BlueprintOverride =\u003e \"override\",\n        };\n        *by_source.entry(source).or_insert(0) += 1;\n    }\n\n    for (source, count) in by_source {\n        lines.push(format!(\"  • {} ×{}\", source, count));\n    }\n\n    // List categories (convert to owned Strings for join)\n    let mut categories: Vec\u003cString\u003e = vars\n        .vars\n        .values()\n        .filter_map(|m| m.category.clone())\n        .collect();\n    categories.sort();\n    categories.dedup();\n\n    if !categories.is_empty() {\n        lines.push(format!(\"  Categories: {}\", categories.join(\", \")));\n    }\n\n    lines.join(\"\\n\")\n}\n\n/// Helper: Get sort rank for a category name\n/// Returns index in priority list, or 999 for unknown categories\nfn get_category_rank(category: Option\u003c\u0026str\u003e, priority_order: \u0026[\u0026str]) -\u003e usize {\n    match category {\n        Some(cat) =\u003e priority_order.iter().position(|\u0026p| p == cat).unwrap_or(999),\n        None =\u003e 999, // Unknown/None categories go last\n    }\n}\n","traces":[{"line":9,"address":[6671266,6669503,6668016],"length":1,"stats":{"Line":1}},{"line":10,"address":[6668073],"length":1,"stats":{"Line":1}},{"line":13,"address":[6577846],"length":1,"stats":{"Line":1}},{"line":14,"address":[6668186,6668246],"length":1,"stats":{"Line":2}},{"line":15,"address":[6580989],"length":1,"stats":{"Line":1}},{"line":16,"address":[5731698,5734374],"length":1,"stats":{"Line":2}},{"line":18,"address":[5734422],"length":1,"stats":{"Line":1}},{"line":22,"address":[5731724],"length":1,"stats":{"Line":1}},{"line":36,"address":[6696439],"length":1,"stats":{"Line":1}},{"line":37,"address":[6578353,6578261],"length":1,"stats":{"Line":3}},{"line":38,"address":[7067218],"length":1,"stats":{"Line":1}},{"line":39,"address":[5926204],"length":1,"stats":{"Line":1}},{"line":40,"address":[7067297,7067344,7067358],"length":1,"stats":{"Line":4} es\n        .get(service_id)\n        .or_else(|| schema.services.messaging_queues.get(service_id))\n        .or_else(|| schema.services.auth_providers.get(service_id))\n        .or_else(|| schema.services.storage.get(service_id))\n        .or_else(|| schema.services.monitoring_logging.get(service_id))\n        .or_else(|| schema.services.payments.get(service_id))\n        .or_else(|| schema.services.ai_ml.get(service_id))\n        .or_else(|| schema.services.email_sms.get(service_id))\n        .map(|svc| (service_id, svc))\n}\n\n/// Find a framework by language_id and framework_id\npub fn find_framework\u003c'a\u003e(\n    language_id: \u0026'a str,\n    framework_id: \u0026'a str,\n) -\u003e Option\u003c(\u0026'a str, \u0026'a FrameworkConfig)\u003e {\n    let schema = schema().ok()?;\n    let lang = schema.languages.get(language_id)?;\n    let fw = lang.frameworks.get(framework_id)?;\n    Some((framework_id, fw))\n}\n\n/// Get blueprint by ID\npub fn get_blueprint(id: \u0026str) -\u003e Option\u003c\u0026'static StackBlueprint\u003e {\n    schema().ok()?.stacks.get(id)\n}\n\n/// List all blueprints as (id, name) pairs\npub fn list_blueprints() -\u003e Vec\u003c(\u0026'static str, \u0026'static str)\u003e {\n    let Ok(schema) = schema() else { return vec![] };\n\n    schema\n        .stacks\n        .iter()\n        .map(|(id, bp)| (id.as_str(), bp.name.as_str()))\n        .collect()\n}\n\n/// Get frameworks for a language as (id, display_name) pairs\npub fn get_frameworks_for_language(language_id: \u0026str) -\u003e Option\u003cVec\u003c(\u0026'static str, String)\u003e\u003e {\n    let schema = schema().ok()?;\n    let lang = schema.languages.get(language_id)?;\n\n    Some(\n        lang.frameworks\n            .iter()\n            .map(|(id, fw)| {\n                let display = fw.display_name.as_deref().unwrap_or(id).to_string();\n                (id.as_str(), display)\n            })\n            .collect(),\n    )\n}\n\n/// Get all services grouped by category for MultiSelect\npub fn get_services_grouped() -\u003e Vec\u003c(\u0026'static str, Vec\u003c(\u0026'static str, String)\u003e)\u003e {\n    let Ok(schema) = schema() else { return vec![] };\n\n    vec![\n        (\n            \"Databases\",\n            extract_service_names(\u0026schema.services.databases),\n        ),\n        (\n            \"Messaging\",\n            extract_service_names(\u0026schema.services.messaging_queues),\n        ),\n        (\n            \"Auth\",\n            extract_service_names(\u0026schema.services.auth_providers),\n        ),\n        (\"Storage\", extract_service_names(\u0026schema.services.storage)),\n        (\n            \"Monitoring\",\n            extract_service_names(\u0026schema.services.monitoring_logging),\n        ),\n        (\"Payments\", extract_service_names(\u0026schema.services.payments)),\n        (\"AI/ML\", extract_service_names(\u0026schema.services.ai_ml)),\n        (\n            \"Email/SMS\",\n            extract_service_names(\u0026schema.services.email_sms),\n        ),\n    ]\n    .into_iter()\n    .filter(|(_, items)| !items.is_empty())\n    .collect()\n}\n\nfn extract_service_names(\n    services: \u0026std::collections::HashMap\u003cString, ServiceConfig\u003e,\n) -\u003e Vec\u003c(\u0026str, String)\u003e {\n    services\n        .iter()\n        .map(|(id, cfg)| {\n            let display = cfg.display_name.as_deref().unwrap_or(id).to_string();\n            (id.as_str(), display)\n        })\n        .collect()\n}\n","traces":[{"line":17,"address":[6152944],"length":1,"stats":{"Line":7}},{"line":22,"address":[5965168],"length":1,"stats":{"Line":10}},{"line":23,"address":[6029584],"length":1,"stats":{"Line":3}},{"line":24,"address":[6020827],"length":1,"stats":{"Line":3}},{"line":29,"address":[6365517],"length":1,"stats":{"Line":13}},{"line":34,"address":[6363520],"length":1,"stats":{"Line":0}},{"line":37,"address":[6019888,6019904],"length":1,"stats":{"Line":0}},{"line":40,"address":[6019 eprint, resolve_framework, resolve_service,\n};\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ajit","Documents","dotenv-space-cli","src","schema","models.rs"],"content":"// src/schema/models.rs\n\nuse serde::{Deserialize, Serialize};\nuse std::collections::HashMap;\n\n/// Root schema containing all configuration data\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Schema {\n    pub languages: HashMap\u003cString, LanguageConfig\u003e,\n    pub services: ServiceCategories,\n    pub infrastructure: HashMap\u003cString, InfrastructureConfig\u003e,\n    pub stacks: HashMap\u003cString, StackBlueprint\u003e,\n}\n\n/// Language with its available frameworks\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct LanguageConfig {\n    /// Human-readable name for UI\n    #[serde(default)]\n    pub display_name: Option\u003cString\u003e,\n    pub frameworks: HashMap\u003cString, FrameworkConfig\u003e,\n}\n\n/// Framework configuration\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct FrameworkConfig {\n    /// Human-readable name for UI\n    #[serde(default)]\n    pub display_name: Option\u003cString\u003e,\n    /// Environment variable names this framework uses\n    pub vars: Vec\u003cString\u003e,\n    /// Optional: default values for some vars\n    #[serde(default)]\n    pub defaults: HashMap\u003cString, String\u003e,\n    /// Optional: descriptions for vars\n    #[serde(default)]\n    pub descriptions: HashMap\u003cString, String\u003e,\n    /// Optional: category mapping for vars\n    #[serde(default)]\n    pub categories: HashMap\u003cString, String\u003e,\n}\n\n/// Service categories (databases, auth, storage, etc.)\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ServiceCategories {\n    #[serde(default)]\n    pub databases: HashMap\u003cString, ServiceConfig\u003e,\n    #[serde(default)]\n    pub messaging_queues: HashMap\u003cString, ServiceConfig\u003e,\n    #[serde(default)]\n    pub auth_providers: HashMap\u003cString, ServiceConfig\u003e,\n    #[serde(default)]\n    pub storage: HashMap\u003cString, ServiceConfig\u003e,\n    #[serde(default)]\n    pub monitoring_logging: HashMap\u003cString, ServiceConfig\u003e,\n    #[serde(default)]\n    pub payments: HashMap\u003cString, ServiceConfig\u003e,\n    #[serde(default)]\n    pub ai_ml: HashMap\u003cString, ServiceConfig\u003e,\n    #[serde(default)]\n    pub email_sms: HashMap\u003cString, ServiceConfig\u003e,\n}\n\n/// Individual service configuration\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ServiceConfig {\n    /// Human-readable name for UI\n    #[serde(default)]\n    pub display_name: Option\u003cString\u003e,\n    pub vars: Vec\u003cString\u003e,\n    #[serde(default)]\n    pub defaults: HashMap\u003cString, String\u003e,\n    #[serde(default)]\n    pub descriptions: HashMap\u003cString, String\u003e,\n    /// Optional: category for grouping in output\n    #[serde(default)]\n    pub category: Option\u003cString\u003e,\n    /// Optional: which vars are required\n    #[serde(default)]\n    pub required: Vec\u003cString\u003e,\n}\n\n/// Infrastructure/Deployment configuration\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct InfrastructureConfig {\n    /// Human-readable name for UI\n    #[serde(default)]\n    pub display_name: Option\u003cString\u003e,\n    pub vars: Vec\u003cString\u003e,\n    #[serde(default)]\n    pub defaults: HashMap\u003cString, String\u003e,\n    #[serde(default)]\n    pub descriptions: HashMap\u003cString, String\u003e,\n    /// Optional: category for grouping\n    #[serde(default)]\n    pub category: Option\u003cString\u003e,\n    /// Sub-categories like \"oidc\", \"deployment_vars\", etc.\n    #[serde(default, flatten)]\n    pub extra: HashMap\u003cString, serde_json::Value\u003e,\n}\n\n/// Pre-combined stack blueprint\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct StackBlueprint {\n    /// Display name for UI\n    pub name: String,\n    /// Description shown in selection\n    pub description: String,\n    /// Components that make up this stack\n    pub components: StackComponents,\n    /// Optional: tags for filtering\n    #[serde(default)]\n    pub tags: Vec\u003cString\u003e,\n}\n\n/// Components referenced by a blueprint\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct StackComponents {\n    /// Language key (e.g., \"javascript_typescript\")\n    pub language: String,\n    /// Framework key (e.g., \"nextjs\")\n    pub framework: String,\n    /// Service keys (e.g., [\"postgresql\", \"redis\"])\n    #[serde(default)]\n    pub services: Vec\u003cString\u003e,\n    /// Infrastructure keys (e.g., [\"vercel\", \"github_actions\"])\n    #[serde(default)]\n    pub infrastructure: Vec\u003cString\u003e,\n}\n\n/// Collected variables with metadata, ready for template generation\n#[derive(Debug, Clone, Default)]\npub struct VarCollection {\n    /// Map of var_name → metadata\n    pub vars: HashMap\u003cString, VarMetadata\u003e,\n}\n\n#[derive(Debug, Clone)]\npub struct VarMetadata {\n    pub example_value: String,\n    pub description: Option\u003cString\u003e,\n    pub category: Option\u003cString\u003e,\n    pub required: bool,\n    pub source: VarSource,\n}\n\n#[derive(Debug, Clone, PartialEq)]\npub enum VarSource {\n    Framework(String),\n    Service(String),\n    Infrastructure(String),\n    BlueprintOverride,\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ajit","Documents","dotenv-space-cli","src","schema","query.rs"],"content":"// src/schema/query.rs\n\nuse crate::schema::loader;\n\n/// Search services by keyword (case-insensitive)\npub fn search_services(query: \u0026str) -\u003e Vec\u003c(String, String, String)\u003e {\n    let Ok(schema) = loader::schema() else {\n        return vec![];\n    };\n    let query_lower = query.to_lowercase();\n\n    let mut results = Vec::new();\n\n    for (category_name, services) in [\n        (\"Database\", \u0026schema.services.databases),\n        (\"Cache\", \u0026schema.services.databases),\n        (\"Auth\", \u0026schema.services.auth_providers),\n        (\"Storage\", \u0026schema.services.storage),\n        (\"Monitoring\", \u0026schema.services.monitoring_logging),\n        (\"Payments\", \u0026schema.services.payments),\n        (\"AI/ML\", \u0026schema.services.ai_ml),\n        (\"Email/SMS\", \u0026schema.services.email_sms),\n    ] {\n        for (id, config) in services {\n            let display = config.display_name.as_deref().unwrap_or(id).to_string();\n            if id.to_lowercase().contains(\u0026query_lower)\n                || display.to_lowercase().contains(\u0026query_lower)\n                || config\n                    .category\n                    .as_ref()\n                    .is_some_and(|c| c.to_lowercase().contains(\u0026query_lower))\n            {\n                results.push((id.clone(), display, category_name.to_string()));\n            }\n        }\n    }\n\n    results.sort_by_key(|(_, display, _)| display.clone());\n    results\n}\n\n/// Search frameworks by language and keyword\npub fn search_frameworks(language_id: \u0026str, query: \u0026str) -\u003e Vec\u003c(String, String)\u003e {\n    let Ok(schema) = loader::schema() else {\n        return vec![];\n    };\n    let Some(lang) = schema.languages.get(language_id) else {\n        return vec![];\n    };\n\n    let query_lower = query.to_lowercase();\n\n    lang.frameworks\n        .iter()\n        .filter(|(id, fw)| {\n            let display = fw.display_name.as_deref().unwrap_or(id);\n            id.to_lowercase().contains(\u0026query_lower)\n                || display.to_lowercase().contains(\u0026query_lower)\n        })\n        .map(|(id, fw)| {\n            let display = fw.display_name.as_deref().unwrap_or(id).to_string();\n            (id.clone(), display)\n        })\n        .collect()\n}\n\n/// Filter blueprints by tags\npub fn filter_by_tag(tag: \u0026str) -\u003e Vec\u003c(String, String, String)\u003e {\n    let Ok(schema) = loader::schema() else {\n        return vec![];\n    };\n\n    schema\n        .stacks\n        .iter()\n        .filter(|(_, bp)| bp.tags.iter().any(|t| t == tag))\n        .map(|(id, bp)| (id.clone(), bp.name.clone(), bp.description.clone()))\n        .collect()\n}\n\n/// Get all unique tags from blueprints\npub fn list_tags() -\u003e Vec\u003cString\u003e {\n    let Ok(schema) = loader::schema() else {\n        return vec![];\n    };\n\n    let mut tags: Vec\u003c_\u003e = schema\n        .stacks\n        .values()\n        .flat_map(|bp| bp.tags.iter().cloned())\n        .collect();\n    tags.sort();\n    tags.dedup();\n    tags\n}\n","traces":[{"line":6,"address":[6047776,6049957,6050286],"length":1,"stats":{"Line":2}},{"line":7,"address":[6146311,6146388],"length":1,"stats":{"Line":4}},{"line":8,"address":[6146377],"length":1,"stats":{"Line":0}},{"line":10,"address":[6146445],"length":1,"stats":{"Line":2}},{"line":12,"address":[6146462],"length":1,"stats":{"Line":2}},{"line":14,"address":[6147203,6146876,6147297],"length":1,"stats":{"Line":6}},{"line":15,"address":[6146533],"length":1,"stats":{"Line":2}},{"line":16,"address":[6146575],"length":1,"stats":{"Line":2}},{"line":17,"address":[6146610],"length":1,"stats":{"Line":2}},{"line":18,"address":[6146655],"length":1,"stats":{"Line":2}},{"line":19,"address":[6146700],"length":1,"stats":{"Line":2}},{"line":20,"address":[6146745],"length":1,"stats":{"Line":2}},{"line":21,"address":[6048304],"length":1,"stats":{"Line":2}},{"line":22,"address":[6146835],"length":1,"stats":{"Line":2}},{"line":24,"address":[6147568,6147392,6148744],"length":1,"stats":{"Line":5}},{"line":25,"address":[6147744],"length":1,"stats":{"Line":2}},{"line":26,"address":[6147930,6147998],"length":1,"stats":{"Line":4}},{"line":27,"address":[6148175],"length":1,"stats":{"Line":1}},{"line":28,"address":[6148431,6148379],"length":1,"stats":{"Line":3}},{"line":30,"address":[6148383],"length":1,"stats":{"Lin
